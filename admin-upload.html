<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 문서 업로드 · Office AI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
    }

    /* ── 로그인 화면 ── */
    #loginScreen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .login-box {
      background: #1a1f2e;
      border: 1px solid #2d3748;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .login-box .logo { font-size: 40px; margin-bottom: 12px; }
    .login-box h2 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
    .login-box p { font-size: 13px; color: #64748b; margin-bottom: 28px; }

    .login-box input {
      width: 100%;
      background: #0f1117;
      border: 1px solid #2d3748;
      border-radius: 10px;
      padding: 14px 16px;
      color: #e2e8f0;
      font-size: 15px;
      margin-bottom: 14px;
      outline: none;
      transition: border-color 0.2s;
      letter-spacing: 4px;
    }
    .login-box input:focus { border-color: #667eea; }

    .login-btn {
      width: 100%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .login-btn:hover { opacity: 0.9; }

    .login-error {
      color: #fc8181;
      font-size: 13px;
      margin-top: 12px;
      display: none;
    }

    /* ── 메인 화면 ── */
    #mainScreen { display: none; }

    header {
      background: #1a1f2e;
      border-bottom: 1px solid #2d3748;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-left .icon { font-size: 24px; }
    .header-left h1 { font-size: 18px; font-weight: 700; }
    .header-left span { font-size: 12px; color: #667eea; background: rgba(102,126,234,0.15); padding: 3px 10px; border-radius: 20px; }

    .logout-btn {
      background: transparent;
      border: 1px solid #2d3748;
      color: #94a3b8;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .logout-btn:hover { border-color: #fc8181; color: #fc8181; }

    .main-content {
      max-width: 800px;
      margin: 40px auto;
      padding: 0 24px;
    }

    /* ── 설정 섹션 ── */
    .section {
      background: #1a1f2e;
      border: 1px solid #2d3748;
      border-radius: 14px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    @media (max-width: 560px) { .form-row { grid-template-columns: 1fr; } }

    .form-group label {
      display: block;
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 6px;
    }

    .form-group select,
    .form-group input[type="text"] {
      width: 100%;
      background: #0f1117;
      border: 1px solid #2d3748;
      border-radius: 8px;
      padding: 10px 12px;
      color: #e2e8f0;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group select:focus,
    .form-group input[type="text"]:focus { border-color: #667eea; }

    /* ── 드래그 드롭 영역 ── */
    #dropZone {
      border: 2px dashed #2d3748;
      border-radius: 12px;
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.25s;
      position: relative;
    }
    #dropZone:hover, #dropZone.dragover {
      border-color: #667eea;
      background: rgba(102,126,234,0.06);
    }
    #dropZone .drop-icon { font-size: 42px; margin-bottom: 12px; }
    #dropZone .drop-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
    #dropZone .drop-sub { font-size: 13px; color: #64748b; margin-bottom: 16px; }
    #dropZone .drop-types {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }
    #dropZone .type-badge {
      background: #0f1117;
      border: 1px solid #2d3748;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      color: #94a3b8;
    }
    #fileInput { display: none; }

    /* ── 파일 목록 ── */
    #fileList { margin-top: 16px; display: flex; flex-direction: column; gap: 8px; }

    .file-item {
      background: #0f1117;
      border: 1px solid #2d3748;
      border-radius: 10px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .file-item .file-icon { font-size: 22px; flex-shrink: 0; }
    .file-item .file-info { flex: 1; min-width: 0; }
    .file-item .file-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-item .file-size { font-size: 12px; color: #64748b; margin-top: 2px; }
    .file-item .file-remove {
      background: none;
      border: none;
      color: #64748b;
      cursor: pointer;
      font-size: 18px;
      flex-shrink: 0;
      transition: color 0.2s;
      line-height: 1;
    }
    .file-item .file-remove:hover { color: #fc8181; }

    /* ── 업로드 버튼 ── */
    #uploadBtn {
      width: 100%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    #uploadBtn:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
    #uploadBtn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* ── 결과 로그 ── */
    #resultLog {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .log-item {
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 14px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .log-item.pending { background: rgba(100,116,139,0.15); border: 1px solid #2d3748; color: #94a3b8; }
    .log-item.uploading { background: rgba(102,126,234,0.1); border: 1px solid rgba(102,126,234,0.3); color: #a5b4fc; }
    .log-item.success { background: rgba(52,211,153,0.1); border: 1px solid rgba(52,211,153,0.3); color: #6ee7b7; }
    .log-item.error { background: rgba(252,129,129,0.1); border: 1px solid rgba(252,129,129,0.3); color: #fca5a5; }

    .log-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
    .log-content .log-name { font-weight: 600; margin-bottom: 3px; }
    .log-content .log-detail { font-size: 12px; opacity: 0.8; }

    /* 스피너 */
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(165,180,252,0.3);
      border-top-color: #a5b4fc;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
      margin-top: 2px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 상태 요약 ── */
    #summary {
      background: #1a1f2e;
      border: 1px solid #2d3748;
      border-radius: 14px;
      padding: 20px 24px;
      margin-bottom: 20px;
      display: none;
    }
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      text-align: center;
    }
    .summary-num { font-size: 28px; font-weight: 700; }
    .summary-label { font-size: 12px; color: #64748b; margin-top: 4px; }
    .num-total { color: #a5b4fc; }
    .num-success { color: #6ee7b7; }
    .num-error { color: #fca5a5; }

    /* ── 카테고리 미선택 경고 ── */
    .select-required {
      border-color: #f59e0b !important;
    }
    .required-badge {
      font-size: 11px;
      color: #f59e0b;
      background: rgba(245,158,11,0.12);
      border: 1px solid rgba(245,158,11,0.3);
      border-radius: 4px;
      padding: 2px 7px;
      margin-left: 8px;
      vertical-align: middle;
    }

    /* ── 기타 직접 입력 영역 ── */
    #customCategorySection {
      display: none;
      margin-top: 14px;
      padding: 16px;
      background: rgba(102,126,234,0.06);
      border: 1px dashed rgba(102,126,234,0.35);
      border-radius: 10px;
    }
    #customCategorySection .custom-title {
      font-size: 12px;
      color: #a5b4fc;
      font-weight: 600;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #customCategorySection .form-row { margin-top: 0; }

    /* ── 카테고리 로딩 상태 ── */
    .cat-loading {
      font-size: 12px;
      color: #64748b;
      margin-top: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .cat-loading .mini-spinner {
      width: 10px; height: 10px;
      border: 2px solid rgba(100,116,139,0.3);
      border-top-color: #64748b;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    /* ── 업로드 가능 상태 표시 ── */
    #readyIndicator {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #64748b;
      margin-bottom: 14px;
    }
    #readyIndicator .check { font-size: 14px; }
    #readyIndicator .ready { color: #6ee7b7; }
    #readyIndicator .not-ready { color: #64748b; }
  </style>
</head>
<body>

<!-- ── 로그인 화면 ── -->
<div id="loginScreen">
  <div class="login-box">
    <div class="logo">🔐</div>
    <h2>관리자 로그인</h2>
    <p>문서 업로드 관리자 페이지입니다</p>
    <input type="password" id="pwInput" placeholder="관리자 키를 입력하세요" />
    <button class="login-btn" onclick="doLogin()">로그인</button>
    <div class="login-error" id="loginError">비밀번호가 올바르지 않습니다.</div>
  </div>
</div>

<!-- ── 메인 화면 ── -->
<div id="mainScreen">
  <header>
    <div class="header-left">
      <span class="icon">📁</span>
      <h1>문서 업로드</h1>
      <span>관리자</span>
    </div>
    <button class="logout-btn" onclick="doLogout()">로그아웃</button>
  </header>

  <div class="main-content">

    <!-- 요약 -->
    <div id="summary">
      <div class="summary-grid">
        <div><div class="summary-num num-total" id="sumTotal">0</div><div class="summary-label">전체</div></div>
        <div><div class="summary-num num-success" id="sumSuccess">0</div><div class="summary-label">성공</div></div>
        <div><div class="summary-num num-error" id="sumError">0</div><div class="summary-label">실패</div></div>
      </div>
    </div>

    <!-- 설정 -->
    <div class="section">
      <div class="section-title">⚙️ 업로드 설정</div>
      <div class="form-row">
        <div class="form-group">
          <label>카테고리 (RAG 테이블) <span class="required-badge">필수</span></label>
          <select id="categorySelect" onchange="onCategoryChange()" class="select-required">
            <option value="">── 카테고리를 선택해주세요 ──</option>
            <optgroup label="기본 카테고리">
              <option value="documents_admin_upload|admin_general|일반 업무 문서">📋 일반 업무 문서</option>
              <option value="documents_ks_certification|ks_certification|KS 인증 문서">🏆 KS 인증 문서</option>
              <option value="documents_business|business|비즈니스 문서">💼 비즈니스 문서</option>
              <option value="documents_technical|technical|기술 문서">🔧 기술 문서</option>
              <option value="documents_company_a|company_a|회사문서 A">🏢 회사문서 A</option>
              <option value="documents_company_b|company_b|회사문서 B">🏢 회사문서 B</option>
              <option value="documents_company_c|company_c|회사문서 C">🏢 회사문서 C</option>
            </optgroup>
            <optgroup label="이전 업로드 카테고리" id="prevOptGroup">
              <!-- 구글시트에서 동적 로드 -->
            </optgroup>
            <option value="__custom__|custom|기타">✏️ 기타 (직접 입력)</option>
          </select>
          <div id="catLoadStatus"></div>
        </div>
        <div class="form-group">
          <label>프로젝트명 (선택)</label>
          <input type="text" id="projectNameInput" placeholder="예: 2026년 KS 심사 자료" />
        </div>
      </div>

      <!-- 기타 직접 입력 영역 -->
      <div id="customCategorySection">
        <div class="custom-title">✏️ 새 카테고리 직접 입력</div>
        <div class="form-row">
          <div class="form-group">
            <label>카테고리명 <span class="required-badge">필수</span></label>
            <input type="text" id="customCategoryName" placeholder="예: 법무 문서"
              oninput="checkUploadReady()" />
          </div>
          <div class="form-group">
            <label>RAG 테이블명 <span class="required-badge">필수</span></label>
            <input type="text" id="customTableName" placeholder="예: documents_legal"
              oninput="onTableNameInput()" />
            <div style="font-size:11px;color:#64748b;margin-top:5px;">
              영문·숫자·밑줄만 사용 · <code style="color:#a5b4fc;">documents_</code> 로 시작 권장
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 파일 드롭 -->
    <div class="section">
      <div class="section-title">📂 파일 선택</div>
      <div id="dropZone" onclick="document.getElementById('fileInput').click()">
        <div class="drop-icon">☁️</div>
        <div class="drop-title">파일을 드래그하거나 클릭해서 선택</div>
        <div class="drop-sub">한 번에 여러 파일 업로드 가능</div>
        <div class="drop-types">
          <span class="type-badge">PDF</span>
          <span class="type-badge">TXT</span>
          <span class="type-badge">DOCX</span>
          <span class="type-badge">MD</span>
          <span class="type-badge">CSV</span>
          <span class="type-badge">XLSX</span>
        </div>
      </div>
      <input type="file" id="fileInput" multiple accept=".pdf,.txt,.docx,.doc,.md,.csv,.xlsx,.xls,.pptx,.ppt,.hwp" />
      <div id="fileList"></div>
    </div>

    <!-- 준비 상태 표시 -->
    <div id="readyIndicator">
      <span class="check not-ready" id="checkCategory">⬜</span>
      <span id="labelCategory" style="margin-right:16px;">카테고리 선택</span>
      <span class="check not-ready" id="checkFiles">⬜</span>
      <span id="labelFiles">파일 선택</span>
    </div>

    <!-- 업로드 버튼 -->
    <button id="uploadBtn" onclick="startUpload()" disabled>
      <span>📤</span> 업로드 시작
    </button>

    <!-- 결과 로그 -->
    <div id="resultLog"></div>

  </div>
</div>

<script>
  // ── 설정 ──────────────────────────────────────────
  const WEBHOOK_URL = "https://jknetworks.app.n8n.cloud/webhook/admin-upload";
  let ADMIN_KEY = '';  // 서버에서 검증 - HTML에 키 없음

  // ── 로그인 ────────────────────────────────────────
  window.addEventListener('DOMContentLoaded', () => {
    const savedKey = sessionStorage.getItem('admin_key');
    if (savedKey) {
      ADMIN_KEY = savedKey;
      showMain();
    }
    document.getElementById('pwInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
  });

  async function doLogin() {
    const key = document.getElementById('pwInput').value.trim();
    if (!key) return;

    const loginBtn = document.querySelector('.login-btn');
    const errorEl = document.getElementById('loginError');
    loginBtn.disabled = true;
    loginBtn.textContent = '검증 중...';
    errorEl.style.display = 'none';

    try {
      // 서버(n8n)에 키 검증 — 빈 파일 아닌 실제 요청으로 확인
      const res = await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ admin_key: key, _validate_only: true })
      });

      if (res.status === 401 || res.status === 403) {
        throw new Error('invalid');
      }

      // 성공 (200 또는 기타) → 키 저장 후 진입
      ADMIN_KEY = key;
      sessionStorage.setItem('admin_key', key);
      showMain();
    } catch (e) {
      errorEl.textContent = '관리자 키가 올바르지 않습니다.';
      errorEl.style.display = 'block';
      document.getElementById('pwInput').value = '';
      document.getElementById('pwInput').focus();
    } finally {
      loginBtn.disabled = false;
      loginBtn.textContent = '로그인';
    }
  }

  function doLogout() {
    ADMIN_KEY = '';
    sessionStorage.removeItem('admin_key');
    document.getElementById('mainScreen').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('pwInput').value = '';
  }

  function showMain() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainScreen').style.display = 'block';
    loadCategoriesFromSheets();  // 구글시트에서 카테고리 동적 로드
  }

  // ── 구글시트에서 카테고리 동적 로드 ──────────────────
  const CATEGORIES_URL = "https://jknetworks.app.n8n.cloud/webhook/admin-categories";

  async function loadCategoriesFromSheets() {
    const statusEl = document.getElementById('catLoadStatus');
    const group = document.getElementById('prevOptGroup');
    group.innerHTML = '';

    statusEl.innerHTML = '<div class="cat-loading"><div class="mini-spinner"></div> 이전 업로드 카테고리 불러오는 중...</div>';

    try {
      const res = await fetch(CATEGORIES_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ admin_key: ADMIN_KEY })
      });

      if (!res.ok) { statusEl.innerHTML = ''; return; }

      const data = await res.json();
      const cats = data.categories || [];

      if (cats.length === 0) {
        statusEl.innerHTML = '<div class="cat-loading" style="color:#475569;">이전 업로드 카테고리 없음</div>';
        setTimeout(() => { statusEl.innerHTML = ''; }, 2000);
        return;
      }

      cats.forEach(c => {
        const opt = document.createElement('option');
        opt.value = `${c.tableName}|${c.tableName}|${c.label}`;
        opt.textContent = `📁 ${c.label}`;
        group.appendChild(opt);
      });

      statusEl.innerHTML = `<div class="cat-loading" style="color:#6ee7b7;">✓ 카테고리 ${cats.length}개 로드됨</div>`;
      setTimeout(() => { statusEl.innerHTML = ''; }, 2000);

    } catch {
      statusEl.innerHTML = '';
    }
  }

  // ── 카테고리 ──────────────────────────────────────
  function onCategoryChange() {
    const val = document.getElementById('categorySelect').value;
    const customSection = document.getElementById('customCategorySection');
    const selectEl = document.getElementById('categorySelect');

    if (val === '__custom__') {
      customSection.style.display = 'block';
      selectEl.classList.remove('select-required');
    } else if (val === '') {
      customSection.style.display = 'none';
      selectEl.classList.add('select-required');
    } else {
      customSection.style.display = 'none';
      selectEl.classList.remove('select-required');
    }
    checkUploadReady();
  }

  function onTableNameInput() {
    // 테이블명 자동 정리: 영문·숫자·밑줄만 허용, 소문자 변환
    const el = document.getElementById('customTableName');
    el.value = el.value.toLowerCase().replace(/[^a-z0-9_]/g, '_');
    checkUploadReady();
  }

  function getCategoryValues() {
    const val = document.getElementById('categorySelect').value;
    if (val === '__custom__') {
      const name = document.getElementById('customCategoryName').value.trim();
      const table = document.getElementById('customTableName').value.trim();
      return { tableName: table, projectId: table || 'custom', projectLabel: name };
    }
    if (!val) return null;
    const parts = val.split('|');
    return { tableName: parts[0], projectId: parts[1], projectLabel: parts[2] };
  }

  function isCategoryReady() {
    const val = document.getElementById('categorySelect').value;
    if (!val) return false;
    if (val === '__custom__') {
      const name = document.getElementById('customCategoryName').value.trim();
      const table = document.getElementById('customTableName').value.trim();
      return name.length > 0 && table.length > 0;
    }
    return true;
  }

  function checkUploadReady() {
    const catOk = isCategoryReady();
    const fileOk = selectedFiles.length > 0;

    // 카테고리 체크 표시
    const checkCat = document.getElementById('checkCategory');
    const labelCat = document.getElementById('labelCategory');
    if (catOk) {
      checkCat.textContent = '✅'; checkCat.className = 'check ready';
      const cat = getCategoryValues();
      labelCat.textContent = cat ? cat.projectLabel : '카테고리 선택';
    } else {
      checkCat.textContent = '⬜'; checkCat.className = 'check not-ready';
      labelCat.textContent = '카테고리 선택';
    }

    // 파일 체크 표시
    const checkFile = document.getElementById('checkFiles');
    const labelFile = document.getElementById('labelFiles');
    if (fileOk) {
      checkFile.textContent = '✅'; checkFile.className = 'check ready';
      labelFile.textContent = `파일 ${selectedFiles.length}개 선택됨`;
    } else {
      checkFile.textContent = '⬜'; checkFile.className = 'check not-ready';
      labelFile.textContent = '파일 선택';
    }

    document.getElementById('uploadBtn').disabled = !(catOk && fileOk);
  }

  // ── 파일 선택 ─────────────────────────────────────
  let selectedFiles = [];

  document.getElementById('fileInput').addEventListener('change', e => {
    addFiles(Array.from(e.target.files));
    e.target.value = '';
  });

  const dropZone = document.getElementById('dropZone');
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    addFiles(Array.from(e.dataTransfer.files));
  });

  function addFiles(files) {
    files.forEach(f => {
      if (!selectedFiles.find(x => x.name === f.name && x.size === f.size)) {
        selectedFiles.push(f);
      }
    });
    renderFileList();
  }

  function removeFile(idx) {
    selectedFiles.splice(idx, 1);
    renderFileList();
  }

  function renderFileList() {
    const list = document.getElementById('fileList');
    checkUploadReady();

    if (selectedFiles.length === 0) { list.innerHTML = ''; return; }

    list.innerHTML = selectedFiles.map((f, i) => `
      <div class="file-item">
        <span class="file-icon">${getFileIcon(f.name)}</span>
        <div class="file-info">
          <div class="file-name">${f.name}</div>
          <div class="file-size">${formatSize(f.size)}</div>
        </div>
        <button class="file-remove" onclick="removeFile(${i})" title="제거">✕</button>
      </div>
    `).join('');
  }

  function getFileIcon(name) {
    const ext = name.split('.').pop().toLowerCase();
    const icons = { pdf: '📄', txt: '📝', docx: '📘', doc: '📘', md: '📑', csv: '📊', xlsx: '📊', xls: '📊', pptx: '📙', ppt: '📙', hwp: '📃' };
    return icons[ext] || '📄';
  }

  function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
  }

  // ── 업로드 ────────────────────────────────────────
  let isUploading = false;

  async function startUpload() {
    if (isUploading || selectedFiles.length === 0) return;

    // 카테고리 유효성 검사
    if (!isCategoryReady()) {
      document.getElementById('categorySelect').classList.add('select-required');
      document.getElementById('categorySelect').focus();
      return;
    }

    isUploading = true;

    const cat = getCategoryValues();
    const tableName = cat.tableName;
    const projectId = cat.projectId;
    const projectName = document.getElementById('projectNameInput').value.trim() || cat.projectLabel;
    const isCustomCat = document.getElementById('categorySelect').value === '__custom__|custom|기타';
    const customLabel = isCustomCat ? document.getElementById('customCategoryName').value.trim() : null;

    const files = [...selectedFiles];
    selectedFiles = [];
    renderFileList();

    document.getElementById('uploadBtn').disabled = true;
    document.getElementById('resultLog').innerHTML = '';

    // 요약 초기화
    const summary = document.getElementById('summary');
    summary.style.display = 'block';
    let successCount = 0, errorCount = 0;
    updateSummary(files.length, 0, 0);

    // 각 파일 로그 항목 생성
    const logItems = files.map((f, i) => {
      const el = document.createElement('div');
      el.className = 'log-item pending';
      el.id = `log-${i}`;
      el.innerHTML = `<span class="log-icon">⏳</span><div class="log-content"><div class="log-name">${f.name}</div><div class="log-detail">대기 중...</div></div>`;
      document.getElementById('resultLog').appendChild(el);
      return el;
    });

    // 순차 업로드
    for (let i = 0; i < files.length; i++) {
      const file = files[i];
      const logEl = logItems[i];

      // 업로드 중 상태
      logEl.className = 'log-item uploading';
      logEl.innerHTML = `<div class="spinner"></div><div class="log-content"><div class="log-name">${file.name}</div><div class="log-detail">업로드 중...</div></div>`;

      try {
        const base64 = await fileToBase64(file);
        const uploadId = `upload_${Date.now()}_${i}`;

        const res = await fetch(WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            admin_key: ADMIN_KEY,
            fileContent: base64,
            filename: file.name,
            mimeType: file.type || (file.name.endsWith('.hwp') ? 'application/x-hwp' : 'application/octet-stream'),
            uploadId,
            timestamp: new Date().toISOString(),
            tableName,
            projectId,
            projectName
          })
        });

        // 인증 실패 시 로그아웃
        if (res.status === 401 || res.status === 403) {
          doLogout();
          throw new Error('인증이 만료되었습니다. 다시 로그인해주세요.');
        }

        // 빈 응답 또는 JSON 파싱 실패 방어 처리
        let data = {};
        const rawText = await res.text();
        if (rawText) {
          try { data = JSON.parse(rawText); } catch (_) {
            throw new Error(`서버 응답 파싱 실패: ${rawText.slice(0, 100)}`);
          }
        } else {
          throw new Error(`서버가 빈 응답을 반환했습니다 (HTTP ${res.status}) — n8n 워크플로우를 확인하세요.`);
        }

        if (res.ok && data.success) {
          successCount++;
          logEl.className = 'log-item success';
          logEl.innerHTML = `<span class="log-icon">✅</span><div class="log-content"><div class="log-name">${file.name}</div><div class="log-detail">업로드 완료 · ${formatSize(data.fileSize || file.size)} · 테이블: ${data.tableName || tableName}</div></div>`;
          // 커스텀 카테고리 첫 성공 시 드롭다운 갱신
          if (isCustomCat && customLabel && successCount === 1) {
            loadCategoriesFromSheets();
          }
        } else {
          throw new Error(data.message || `HTTP ${res.status}`);
        }
      } catch (err) {
        errorCount++;
        logEl.className = 'log-item error';
        logEl.innerHTML = `<span class="log-icon">❌</span><div class="log-content"><div class="log-name">${file.name}</div><div class="log-detail">실패: ${err.message}</div></div>`;
      }

      updateSummary(files.length, successCount, errorCount);
    }

    isUploading = false;
    document.getElementById('uploadBtn').disabled = false;
  }

  function updateSummary(total, success, error) {
    document.getElementById('sumTotal').textContent = total;
    document.getElementById('sumSuccess').textContent = success;
    document.getElementById('sumError').textContent = error;
  }

  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }
</script>
