<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAG 시스템 (검색 증강 생성) - Office AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0f172a;
      --bg-card: #1e293b;
      --primary: #3b82f6;
      --primary-glow: rgba(59, 130, 246, 0.4);
      --gradient-main: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      --text-white: #f8fafc;
      --text-dim: #94a3b8;
      --border: rgba(255,255,255,0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: var(--bg-dark);
      color: var(--text-white);
      height: 100vh;
      display: flex;
      justify-content: center;
      overflow: hidden;
    }

    .chat-wrapper {
      width: 100%;
      max-width: 960px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }

    /* Header */
    .demo-header {
      background: rgba(15, 23, 42, 0.95);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      backdrop-filter: blur(10px);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-dim);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      transition: all 0.2s;
    }

    .back-btn:hover {
      color: var(--text-white);
      border-color: rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.05);
    }

    .back-btn svg {
      width: 16px;
      height: 16px;
    }

    .header-divider {
      width: 1px;
      height: 20px;
      background: var(--border);
    }

    .header-logo {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-dim);
    }

    .header-logo span { color: var(--primary); }

    .header-center {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .ai-avatar {
      width: 32px;
      height: 32px;
      background: var(--gradient-main);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .header-title {
      font-size: 0.95rem;
      font-weight: 600;
    }

    .header-sub {
      font-size: 0.75rem;
      color: var(--text-dim);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .status-indicator {
      width: 8px;
      height: 8px;
      background: #22c55e;
      border-radius: 50%;
      box-shadow: 0 0 8px #22c55e;
    }

    .status-text {
      font-size: 0.8rem;
      color: var(--text-dim);
    }

    /* ── Category Tabs ── */
    .category-bar {
      background: rgba(15, 23, 42, 0.9);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      display: flex;
      gap: 0.25rem;
      align-items: stretch;
      flex-shrink: 0;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .category-bar::-webkit-scrollbar { display: none; }

    .cat-tab {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.65rem 1rem;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-dim);
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
      font-family: inherit;
    }

    .cat-tab:hover {
      color: var(--text-white);
      background: rgba(255,255,255,0.04);
    }

    .cat-tab.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
      background: rgba(59, 130, 246, 0.06);
    }

    .cat-icon { font-size: 1rem; }

    /* Session bar */
    .session-bar {
      background: rgba(30, 41, 59, 0.8);
      border-bottom: 1px solid var(--border);
      padding: 6px 1.5rem;
      display: flex;
      gap: 1rem;
      align-items: center;
      flex-shrink: 0;
    }

    .session-bar label {
      font-size: 11px;
      color: var(--text-dim);
      white-space: nowrap;
    }

    .session-bar input {
      flex: 1;
      padding: 4px 10px;
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 12px;
      font-family: monospace;
      color: var(--text-white);
      max-width: 180px;
    }

    .session-bar input:focus {
      outline: none;
      border-color: var(--primary);
    }

    .cat-badge {
      font-size: 11px;
      color: var(--primary);
      background: rgba(59,130,246,0.1);
      border: 1px solid rgba(59,130,246,0.25);
      border-radius: 12px;
      padding: 2px 8px;
      white-space: nowrap;
    }

    .session-hint {
      font-size: 11px;
      color: var(--text-dim);
      margin-left: auto;
      white-space: nowrap;
    }

    /* Messages */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

    /* Welcome */
    .welcome-card {
      margin: auto;
      text-align: center;
      max-width: 520px;
      padding: 2rem;
      background: rgba(30, 41, 59, 0.5);
      border: 1px solid var(--border);
      border-radius: 16px;
    }

    .welcome-icon {
      width: 56px;
      height: 56px;
      background: var(--gradient-main);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin: 0 auto 1rem;
    }

    .welcome-card h3 {
      font-size: 1.2rem;
      margin-bottom: 0.5rem;
    }

    .welcome-card p {
      font-size: 0.9rem;
      color: var(--text-dim);
      line-height: 1.6;
      margin-bottom: 1.2rem;
    }

    .sample-questions {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .sample-q {
      padding: 0.6rem 1rem;
      background: rgba(59, 130, 246, 0.08);
      border: 1px solid rgba(59, 130, 246, 0.2);
      border-radius: 8px;
      font-size: 0.85rem;
      color: var(--text-dim);
      cursor: pointer;
      text-align: left;
      transition: all 0.2s;
      font-family: inherit;
    }

    .sample-q:hover {
      background: rgba(59, 130, 246, 0.15);
      color: var(--text-white);
      border-color: var(--primary);
    }

    /* Message bubbles */
    .message {
      display: flex;
      flex-direction: column;
      max-width: 78%;
    }

    .message.user {
      align-self: flex-end;
      align-items: flex-end;
    }

    .message.bot {
      align-self: flex-start;
      align-items: flex-start;
    }

    .msg-label {
      font-size: 11px;
      color: var(--text-dim);
      margin-bottom: 4px;
      padding: 0 4px;
    }

    .bubble {
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.65;
      word-break: break-word;
    }

    .message.user .bubble {
      background: var(--gradient-main);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .message.bot .bubble {
      background: var(--bg-card);
      color: var(--text-white);
      border-bottom-left-radius: 4px;
      border: 1px solid var(--border);
      white-space: pre-wrap;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }

    .message.error .bubble {
      background: rgba(239, 68, 68, 0.1);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    /* Formatted bot response */
    .resp-section-header {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text-white);
      margin: 1rem 0 0.5rem;
      padding-bottom: 0.45rem;
      border-bottom: 1px solid rgba(59,130,246,0.2);
    }
    .resp-section-header:first-child { margin-top: 0; }

    .resp-dot {
      color: var(--primary);
      font-size: 1rem;
      flex-shrink: 0;
    }

    .resp-para {
      font-size: 0.88rem;
      color: var(--text-dim);
      line-height: 1.75;
      margin: 0.6rem 0;
      text-align: justify;
    }

    .message.bot .bubble strong {
      color: var(--text-white);
      font-weight: 600;
    }

    .message.bot .bubble br { line-height: 1.8; }

    .message.bot .bubble div:not(:last-child) { margin-bottom: 0.4rem; }

    .resp-list {
      list-style: none;
      margin: 0.3rem 0 0.3rem 0.2rem;
    }

    .resp-list li {
      position: relative;
      padding: 0.2rem 0 0.2rem 1.1rem;
      font-size: 0.875rem;
      color: var(--text-dim);
      line-height: 1.65;
    }

    .resp-list li::before {
      content: '–';
      position: absolute;
      left: 0;
      color: var(--primary);
      font-weight: 700;
    }

    /* Source document cards */
    .source-docs {
      margin-top: 0.85rem;
      padding-top: 0.75rem;
      border-top: 1px solid rgba(255,255,255,0.07);
    }

    .source-docs-label {
      font-size: 0.7rem;
      color: var(--text-dim);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }

    .source-file-cards {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .source-file-card {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      background: rgba(59,130,246,0.07);
      border: 1px solid rgba(59,130,246,0.22);
      border-radius: 6px;
      padding: 0.38rem 0.7rem;
      font-size: 0.78rem;
      color: #93c5fd;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.18s, border-color 0.18s, color 0.18s;
      max-width: 100%;
    }

    .source-file-card:hover {
      background: rgba(59,130,246,0.18);
      border-color: rgba(59,130,246,0.5);
      color: #bfdbfe;
    }

    .source-file-card.downloading {
      opacity: 0.6;
      cursor: wait;
    }

    .source-file-card .src-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 240px;
    }

    .source-file-card .src-dl {
      font-size: 0.65rem;
      opacity: 0.7;
      flex-shrink: 0;
    }

    .resp-refs {
      margin-top: 0.9rem;
      padding-top: 0.6rem;
      border-top: 1px solid rgba(255,255,255,0.06);
      font-size: 0.8rem;
      color: var(--text-dim);
    }

    .bubble a {
      color: #60a5fa;
      word-break: break-all;
      font-size: 0.8rem;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .bubble a:hover { color: var(--primary); }

    .msg-meta {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 4px;
      padding: 0 4px;
    }

    .token-badge {
      display: inline-block;
      background: rgba(59, 130, 246, 0.1);
      color: var(--primary);
      border: 1px solid rgba(59, 130, 246, 0.2);
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      margin-top: 4px;
    }

    /* Typing indicator */
    .typing-wrap { align-self: flex-start; }

    .typing {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 12px 16px;
      background: var(--bg-card);
      border-radius: 14px;
      border-bottom-left-radius: 4px;
      border: 1px solid var(--border);
    }

    .dot {
      width: 6px;
      height: 6px;
      background: var(--primary);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-6px); opacity: 1; }
    }

    /* Input area */
    .input-area {
      border-top: 1px solid var(--border);
      padding: 1rem 1.5rem;
      display: flex;
      gap: 0.75rem;
      background: rgba(15, 23, 42, 0.9);
      flex-shrink: 0;
    }

    #messageInput {
      flex: 1;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text-white);
      resize: none;
      height: 44px;
      max-height: 120px;
      overflow-y: auto;
      transition: border-color 0.2s;
    }

    #messageInput::placeholder { color: var(--text-dim); }

    #messageInput:focus {
      outline: none;
      border-color: var(--primary);
    }

    #sendBtn {
      background: var(--gradient-main);
      color: white;
      border: none;
      border-radius: 10px;
      width: 44px;
      height: 44px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    #sendBtn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 15px var(--primary-glow);
    }

    #sendBtn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    #sendBtn svg { width: 18px; height: 18px; }

    /* Disclaimer */
    .disclaimer {
      text-align: center;
      font-size: 11px;
      color: var(--text-dim);
      padding: 6px;
      border-top: 1px solid var(--border);
      background: rgba(15, 23, 42, 0.5);
      flex-shrink: 0;
    }

    /* Mobile */
    @media (max-width: 600px) {
      .demo-header { padding: 0 1rem; }
      .header-center .header-sub { display: none; }
      .session-hint { display: none; }
      .category-bar { padding: 0 0.5rem; }
      .cat-tab { padding: 0.6rem 0.75rem; font-size: 0.8rem; }
      .messages { padding: 1rem; }
      .message { max-width: 90%; }
      .input-area { padding: 0.75rem 1rem; }
    }
  </style>
</head>
<body>
<div class="chat-wrapper">

  <!-- Header -->
  <header class="demo-header">
    <div class="header-left">
      <a href="index.html" class="back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
        메인으로
      </a>
      <div class="header-divider"></div>
      <div class="header-logo">office-ai<span>.app</span></div>
    </div>

    <div class="header-center">
      <div class="ai-avatar" id="headerAvatar">🤖</div>
      <div>
        <div class="header-title" id="headerTitle">RAG 시스템</div>
        <div class="header-sub" id="headerSub">검색 증강 생성 · 카테고리를 선택하고 질문하세요</div>
      </div>
    </div>

    <div class="header-right">
      <div class="status-indicator"></div>
      <span class="status-text">온라인</span>
    </div>
  </header>

  <!-- Category Tabs -->
  <div class="category-bar">
    <button class="cat-tab active" data-cat="ks_certification" onclick="selectCategory(this)">
      <span class="cat-icon">🏆</span> KS인증
    </button>
    <button class="cat-tab" data-cat="business" onclick="selectCategory(this)">
      <span class="cat-icon">📋</span> 비즈니스
    </button>
    <button class="cat-tab" data-cat="technical" onclick="selectCategory(this)">
      <span class="cat-icon">🔧</span> 기술문서
    </button>
    <button class="cat-tab" data-cat="admin_upload" onclick="selectCategory(this)">
      <span class="cat-icon">📁</span> 업무관리
    </button>
    <button class="cat-tab" data-cat="company_a" onclick="selectCategory(this)">
      <span class="cat-icon">🏢</span> 회사문서 A
    </button>
    <button class="cat-tab" data-cat="company_b" onclick="selectCategory(this)">
      <span class="cat-icon">🏢</span> 회사문서 B
    </button>
    <button class="cat-tab" data-cat="company_c" onclick="selectCategory(this)">
      <span class="cat-icon">🏢</span> 회사문서 C
    </button>
  </div>

  <!-- Session bar -->
  <div class="session-bar">
    <label>세션 ID</label>
    <input type="text" id="sessionId" value="demo-001" placeholder="세션 ID">
    <span class="cat-badge" id="catBadge">🏆 KS인증</span>
    <span class="session-hint">💡 같은 세션 ID = 대화 유지</span>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages">
    <div class="welcome-card" id="welcomeCard">
      <div class="welcome-icon" id="welcomeIcon">🏆</div>
      <h3 id="welcomeTitle">KS 인증 RAG 시스템에 오신 걸 환영합니다</h3>
      <p id="welcomeDesc">KS 인증 심사 규격, 준비 서류, 심사 주기 등<br>KS 관련 질문은 무엇이든 답변해 드립니다.</p>
      <div class="sample-questions" id="sampleQuestions">
        <button class="sample-q" onclick="askSample(this)">KS 인증 심사 주기가 어떻게 되나요?</button>
        <button class="sample-q" onclick="askSample(this)">KS Q 8001 인증 취득에 필요한 서류는?</button>
        <button class="sample-q" onclick="askSample(this)">KS 인증 갱신 절차를 알려주세요</button>
      </div>
    </div>
  </div>

  <!-- Input area -->
  <div class="input-area">
    <textarea id="messageInput" placeholder="KS 인증에 관해 질문하세요... (Enter: 전송, Shift+Enter: 줄바꿈)"></textarea>
    <button id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>

  <div class="disclaimer">
    이 서비스는 체험용입니다 · RAG 시스템 답변은 참고용이며 최종 판단은 전문가와 상담하세요
  </div>

<script>
  const WEBHOOK_URL = "https://jknetworks.app.n8n.cloud/webhook/rag-category-chat";

  // API 키 로드: sessionStorage 우선, URL 파라미터는 fallback 후 즉시 제거
  const urlParams = new URLSearchParams(window.location.search);
  const urlKey  = urlParams.get('api_key');
  const urlName = urlParams.get('name') || '';

  // URL에 키가 있으면 sessionStorage로 이전 후 URL에서 즉시 제거
  if (urlKey) {
    sessionStorage.setItem('rag_api_key', urlKey);
    if (urlName) sessionStorage.setItem('rag_user_name', urlName);
    // 브라우저 히스토리에서 키 제거 (뒤로가기해도 URL에 키 없음)
    const cleanUrl = window.location.pathname;
    history.replaceState(null, '', cleanUrl);
  }

  const API_KEY   = sessionStorage.getItem('rag_api_key') || null;
  const USER_NAME = sessionStorage.getItem('rag_user_name') || urlName;

  // API 키 없으면 등록 페이지로 안내
  if (!API_KEY) {
    document.addEventListener('DOMContentLoaded', () => {
      const chatMessages = document.getElementById('chatMessages');
      if (chatMessages) {
        chatMessages.innerHTML = `
          <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:20px;padding:40px 20px;text-align:center;">
            <div style="font-size:48px;">🔑</div>
            <div style="font-size:18px;font-weight:600;color:#e2e8f0;">API 키가 필요합니다</div>
            <div style="font-size:14px;color:#94a3b8;line-height:1.6;">
              무료 체험을 이용하려면 먼저 등록이 필요합니다.<br>
              이름과 이메일만 입력하면 바로 시작할 수 있어요!
            </div>

  function getTime() {
    return new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
  }

  function formatBotResponse(text) {
    const escapeHtml = (str) => {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    };

    let formatted = escapeHtml(text);
    formatted = formatted.replace(/\n/g, '<br>');
    formatted = formatted.replace(/^(\d+\.\s)/gm, '<strong>$1</strong>');
    formatted = formatted.replace(/^[-•]\s/gm, '<span style="color: var(--primary); font-weight: bold;">• </span>');
    formatted = formatted.replace(/\*\*(.*?)\*\*/g, '<strong style="color: var(--text-white);">$1</strong>');
    formatted = formatted.replace(/__(.*?)__/g, '<strong style="color: var(--text-white);">$1</strong>');
    formatted = formatted.replace(/^###\s(.+)$/gm, '<div class="resp-section-header"><span class="resp-dot">●</span>$1</div>');
    formatted = formatted.replace(/^##\s(.+)$/gm, '<div class="resp-section-header"><span class="resp-dot">●</span>$1</div>');
    formatted = formatted.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank">$1</a>');

    const paragraphs = formatted.split('<br><br>');
    if (paragraphs.length > 1) {
      formatted = paragraphs.map(p => p.trim() ? `<div class="resp-para">${p}</div>` : '').join('');
    }

    return formatted;
  }

  function removeWelcome() {
    const w = document.getElementById('welcomeCard');
    if (w) w.remove();

  function addMessage(text, type, tokensRemaining, sources) {
    removeWelcome();

    const div = document.createElement('div');
    div.className = `message ${type}`;

    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = type === 'user' ? '나' : CATEGORIES[currentCategory].icon + ' RAG 시스템';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    if (type === 'bot') {
      bubble.innerHTML = formatBotResponse(text);
      if (sources && sources.length > 0) {
        bubble.appendChild(renderSources(sources));
      }
    } else if (type === 'error') {
      bubble.innerHTML = text.replace(/\n/g, '<br>');
    } else {
      bubble.textContent = text;
    }

    const meta = document.createElement('div');
    meta.className = 'msg-meta';
    meta.textContent = getTime();

    div.appendChild(label);
    div.appendChild(bubble);
    div.appendChild(meta);

    if (type === 'bot' && tokensRemaining !== undefined) {
      const badge = document.createElement('span');
      badge.className = 'token-badge';
      badge.textContent = `잔여 토큰: ${tokensRemaining.toLocaleString()}`;
      div.appendChild(badge);
    }

    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function getFileIcon(filename) {
    if (!filename) return '📄';
    const ext = filename.split('.').pop().toLowerCase();
    const icons = {
      'xlsx': '📊', 'xls': '📊',
      'docx': '📝', 'doc': '📝',
      'pdf': '📕',
      'pptx': '📊', 'ppt': '📊',
      'hwp': '📝', 'hwpx': '📝',
      'txt': '📄', 'csv': '📊',
      'zip': '📦', 'rar': '📦',
      'png': '🖼', 'jpg': '🖼', 'jpeg': '🖼'
    };
    return icons[ext] || '📄';
  }

  function renderSources(sources) {
    const wrap = document.createElement('div');
    wrap.className = 'source-docs';

    const labelEl = document.createElement('div');
    labelEl.className = 'source-docs-label';
    labelEl.innerHTML = '📎 참조된 내부 문서';
    wrap.appendChild(labelEl);

    const cards = document.createElement('div');
    cards.className = 'source-file-cards';

    sources.forEach(src => {
      const card = document.createElement('a');
      card.className = 'source-file-card';
      card.href = '#';
      card.title = `${src.filename} 다운로드`;
      card.innerHTML = `
        <span class="file-icon">${getFileIcon(src.filename)}</span>
        <span class="src-name">${src.filename}</span>
        <span class="src-dl">⬇</span>
      `;
      card.addEventListener('click', (e) => {
        e.preventDefault();
        if (!card.classList.contains('downloading')) {
          downloadSourceFile(src, card);
        }
      });
      cards.appendChild(card);
    });

    wrap.appendChild(cards);
    return wrap;
  }

  const DOWNLOAD_URL = "https://jknetworks.app.n8n.cloud/webhook/file-download";

  async function downloadSourceFile(src, cardEl) {
    // drive_url이 sources 배열에 포함된 경우 webhook 없이 직접 열기
    if (src.drive_url) {
      cardEl.classList.add('downloading');
      cardEl.querySelector('.src-dl').textContent = '⏳';
      window.open(src.drive_url, '_blank');
      setTimeout(() => {
        cardEl.querySelector('.src-dl').textContent = '✅';
        cardEl.classList.remove('downloading');
        setTimeout(() => { cardEl.querySelector('.src-dl').textContent = '⬇'; }, 3000);
      }, 400);
      return;
    }

    // drive_url 없을 때 fallback: 기존 webhook 방식
    cardEl.classList.add('downloading');
    cardEl.querySelector('.src-dl').textContent = '⏳';

    try {
      const res = await fetch(DOWNLOAD_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          api_key: API_KEY,
          filename: src.filename,
          tableName: src.tableName || ''
        })
      });

      if (!res.ok) throw new Error(`서버 오류 (${res.status})`);

      const data = await res.json();

      if (data.downloadUrl) {
        window.open(data.downloadUrl, '_blank');
      } else if (data.fileContent) {
        const blob = b64toBlob(data.fileContent, data.mimeType || 'application/octet-stream');
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = src.filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      } else {
        throw new Error('다운로드 URL을 받지 못했습니다.');
      }

      cardEl.querySelector('.src-dl').textContent = '✅';
    } catch (err) {
      cardEl.querySelector('.src-dl').textContent = '❌';
      alert(`다운로드 실패: ${err.message}`);
    } finally {
      cardEl.classList.remove('downloading');
      setTimeout(() => { cardEl.querySelector('.src-dl').textContent = '⬇'; }, 3000);
    }
  }

  function b64toBlob(b64Data, contentType) {
    const byteChars = atob(b64Data);
    const byteArrays = [];
    for (let i = 0; i < byteChars.length; i += 512) {
      const slice = byteChars.slice(i, i + 512);
      const byteNumbers = new Array(slice.length);
      for (let j = 0; j < slice.length; j++) byteNumbers[j] = slice.charCodeAt(j);
      byteArrays.push(new Uint8Array(byteNumbers));
    }
    return new Blob(byteArrays, { type: contentType });
  }

  function showTyping() {
    removeWelcome();
    const wrap = document.createElement('div');
    wrap.className = 'typing-wrap';

  function removeTyping() {

  async function sendMessage() {
    const message = inputEl.value.trim();
    const sessionId = document.getElementById('sessionId').value.trim() || 'demo-001';

    if (!message) return;
    if (!API_KEY) {
      window.location.href = '/register.html';
      return;
    }

    inputEl.value = '';
    sendBtn.disabled = true;

    addMessage(message, 'user');
    showTyping();

    try {
      const res = await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          api_key: API_KEY,
          session_id: sessionId,
          message: message,
          category: currentCategory
        })
      });

      const data = await res.json();
      removeTyping();

      if (!res.ok) {
        if (res.status === 401 || res.status === 403) {
          const msg = data.message || '';
          if (msg.includes('No tokens remaining') || msg.includes('tokens')) {
            addMessage(`사용 가능한 토큰이 모두 소진되었습니다.\n\n토큰 추가 구매 문의:\n제이케이네트웍스 대표 노진광\n<a href="tel:010-3127-4528" style="color:#60a5fa;font-weight:700;">📞 010-3127-4528</a>`, 'error');
          } else if (msg.includes('expired')) {
            addMessage(`API 키가 만료되었습니다.\n새로운 키 발급은 관리자에게 문의해 주세요.`, 'error');
          } else if (msg.includes('inactive')) {
            addMessage(`계정이 비활성 상태입니다.\n관리자에게 문의해 주세요.`, 'error');
          } else {
            addMessage(`인증에 실패했습니다. (${res.status})\n유효한 API 키로 다시 시도해 주세요.`, 'error');
          }
        } else {
          addMessage(`서버 오류가 발생했습니다. (${res.status})\n잠시 후 다시 시도해 주세요.`, 'error');
        }
        return;
      }

      if (data.success) {
        addMessage(data.response, 'bot', data.tokens_remaining, data.sources || []);
      } else {
        addMessage(`오류: ${data.message || '알 수 없는 오류가 발생했습니다.'}`, 'error');
      }
    } catch (err) {
      removeTyping();
      console.error('[RAG Chat Error]', err);
      const isNetworkErr = err instanceof TypeError && err.message.includes('fetch');
      const msg = isNetworkErr
        ? `연결 오류가 발생했습니다.\n네트워크 상태를 확인하거나 잠시 후 다시 시도해 주세요.`
        : `오류가 발생했습니다.\n잠시 후 다시 시도해 주세요. (${err.message})`;
      addMessage(msg, 'error');
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }
