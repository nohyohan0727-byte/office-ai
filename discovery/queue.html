<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>승인 큐 — Discovery</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 min-h-screen">

<header class="bg-white border-b border-gray-200 sticky top-0 z-50">
  <div class="max-w-5xl mx-auto px-4 py-3 flex items-center gap-3">
    <a href="index.html" class="text-gray-400 hover:text-gray-600">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
    </a>
    <h1 class="text-lg font-bold text-gray-900">승인 큐</h1>
    <span id="queueCount" class="text-xs bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded-full"></span>
  </div>
</header>

<main class="max-w-5xl mx-auto px-4 py-6">
  <div id="queueList" class="space-y-3"></div>
</main>

<script src="js/env.js"></script>
<script src="js/auth-guard.js"></script>
<script src="js/discovery-api.js"></script>
<script>
async function loadQueue() {
  try {
    const items = await API.getApprovedQueue();
    document.getElementById('queueCount').textContent = `${items.length}건`;
    const list = document.getElementById('queueList');
    if (!items.length) {
      list.innerHTML = '<p class="text-center text-gray-400 py-10">승인된 주제가 없습니다</p>';
      return;
    }
    list.innerHTML = items.map(item => {
      const a = item.sc_analysis || {};
      const t = a.sc_trends || {};
      const rev = Array.isArray(item.sc_reviews) ? item.sc_reviews[0] : item.sc_reviews;
      const priorityColors = { high: 'bg-red-100 text-red-700', normal: 'bg-gray-100 text-gray-600', low: 'bg-blue-100 text-blue-700' };
      const priorityLabels = { high: '높음', normal: '보통', low: '낮음' };
      const fmtLabels = { info: '정보형', storytelling: '스토리텔링', character: '캐릭터', review: '리뷰', tutorial: '튜토리얼' };
      return `
      <div class="bg-white rounded-xl border border-gray-200 p-5">
        <div class="flex items-start justify-between mb-3">
          <div>
            <div class="flex items-center gap-2 mb-1">
              <span class="text-xs bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded-full font-medium">승인됨</span>
              ${rev?.priority ? `<span class="text-xs px-2 py-0.5 rounded-full ${priorityColors[rev.priority] || ''}">${priorityLabels[rev.priority] || rev.priority}</span>` : ''}
              <span class="text-xs text-gray-400">${item.date}</span>
            </div>
            <h3 class="font-semibold text-gray-900">${t.title || '—'}</h3>
          </div>
          <div class="text-right">
            <div class="text-2xl font-bold text-indigo-600">${a.opportunity_score || 0}</div>
            <div class="text-xs text-gray-400">점수</div>
          </div>
        </div>
        ${a.suggested_angle ? `<p class="text-sm text-gray-600 bg-indigo-50 rounded-lg px-3 py-2 mb-3">${a.suggested_angle}</p>` : ''}
        <div class="flex gap-2 flex-wrap text-xs">
          ${a.suggested_format ? `<span class="bg-purple-100 text-purple-700 px-2 py-0.5 rounded-full">${fmtLabels[a.suggested_format] || a.suggested_format}</span>` : ''}
          ${rev?.style_hint ? `<span class="bg-amber-100 text-amber-700 px-2 py-1 rounded-full">스타일: ${rev.style_hint}</span>` : ''}
          ${rev?.reviewer_note ? `<span class="bg-gray-100 text-gray-600 px-2 py-1 rounded-full">메모: ${rev.reviewer_note}</span>` : ''}
        </div>
        ${rev?.reviewed_at ? `<p class="text-xs text-gray-400 mt-2">검토: ${new Date(rev.reviewed_at).toLocaleDateString('ko-KR')}</p>` : ''}
      </div>`;
    }).join('');
  } catch(e) {
    document.getElementById('queueList').innerHTML = `<p class="text-red-500 text-sm">${e.message}</p>`;
  }
}

loadQueue();
</script>
</body>
</html>
