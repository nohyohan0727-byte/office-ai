<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📊 보드게임 정보 — 가라온 브로즈</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/config.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:   #0b0b1a;
      --card: #151526;
      --card2:#1e1e38;
      --g:  #00ff88;
      --b:  #00d4ff;
      --p:  #cc44ff;
      --y:  #ffd700;
      --r:  #ff4466;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); min-height:100vh; font-family:'Nunito',sans-serif; color:#ddd; }

    /* ── 헤더 ── */
    header {
      background:var(--card); border-bottom:2px solid var(--b);
      padding:14px 20px; display:flex; align-items:center; gap:14px;
      position:sticky; top:0; z-index:50;
      box-shadow:0 0 20px #00d4ff22;
    }
    .back-btn {
      background:transparent; border:1px solid #333; color:#888;
      border-radius:10px; padding:8px 14px; font-family:'Nunito',sans-serif;
      font-weight:700; cursor:pointer; font-size:14px; transition:all .15s;
    }
    .back-btn:hover { border-color:var(--b); color:var(--b); }
    .header-title { font-family:'Nunito',sans-serif; font-size:16px; font-weight:900; color:var(--b); flex:1; }
    .add-btn {
      background:var(--g); color:var(--bg); border:none; border-radius:12px;
      padding:10px 18px; font-family:'Nunito',sans-serif; font-weight:900;
      font-size:14px; cursor:pointer; transition:all .15s;
      box-shadow:0 0 10px #00ff8866;
    }
    .add-btn:hover { filter:brightness(1.15); }

    /* ── 탭 ── */
    .tabs { display:flex; gap:0; padding:16px 20px 0; border-bottom:1px solid #222; }
    .tab {
      padding:10px 24px; font-weight:900; font-size:14px; cursor:pointer;
      border-radius:12px 12px 0 0; border:2px solid transparent;
      border-bottom:none; transition:all .15s; color:#555;
    }
    .tab.active-board    { border-color:var(--b); background:var(--card); color:var(--b); margin-bottom:-1px; }
    .tab.active-hand     { border-color:var(--p); background:var(--card); color:var(--p); margin-bottom:-1px; }
    .tab.active-visitor  { border-color:var(--g); background:var(--card); color:var(--g); margin-bottom:-1px; }
    .tab.active-callmenu { border-color:var(--y); background:var(--card); color:var(--y); margin-bottom:-1px; }
    .tab:not(.active-board):not(.active-hand):not(.active-visitor):not(.active-callmenu):hover { color:#999; }

    /* ── 호출 메뉴 관리 ── */
    .callmenu-list { padding:0 20px 80px; }
    .callmenu-item {
      background:var(--card); border:2px solid #222; border-radius:14px;
      padding:14px 18px; margin-bottom:10px;
      display:flex; align-items:center; gap:12px;
      transition:border-color .2s;
    }
    .callmenu-item:hover { border-color:var(--y); }
    .cmi-emoji { font-size:28px; flex-shrink:0; }
    .cmi-label { font-weight:900; font-size:15px; color:#ddd; flex:1; }
    .cmi-inactive { opacity:.4; }
    .n8n-section {
      background:var(--card); border:2px solid #ffd70033; border-radius:16px;
      padding:20px; margin:0 20px 20px;
    }
    .n8n-label { font-size:12px; color:var(--y); font-weight:700; margin-bottom:8px; }

    /* ── 검색 ── */
    .search-row { padding:16px 20px 8px; display:flex; gap:10px; }
    .search-input {
      flex:1; background:var(--card); border:1px solid #333; border-radius:10px;
      padding:10px 14px; color:#fff; font-family:'Nunito',sans-serif;
      font-weight:700; font-size:14px; outline:none; transition:border .15s;
    }
    .search-input:focus { border-color:var(--b); }

    /* ── 카테고리 필터 ── */
    .cat-filter-row {
      display:flex; gap:8px; padding:0 20px 12px; flex-wrap:wrap;
      overflow-x:auto; -webkit-overflow-scrolling:touch;
    }
    .cat-filter-row:empty, .cat-filter-row.hidden { display:none; }
    .cf-chip {
      flex-shrink:0; padding:5px 14px; border-radius:20px; font-size:12px;
      font-weight:700; border:1px solid #333; background:var(--card);
      color:#777; cursor:pointer; transition:all .15s; white-space:nowrap;
    }
    .cf-chip:hover { border-color:#666; color:#ccc; }
    .cf-chip.on { border-color:var(--b); background:#00d4ff18; color:var(--b); }

    /* ── 통계 ── */
    .stats { display:flex; gap:10px; padding:0 20px 16px; flex-wrap:wrap; }
    .stat-chip {
      background:var(--card); border:1px solid #222; border-radius:10px;
      padding:8px 14px; font-size:12px; color:#888;
    }
    .stat-chip strong { color:#ddd; font-size:14px; margin-right:4px; }

    /* ── 게임 그리드 ── */
    .grid {
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(340px, 1fr));
      gap:14px; padding:0 20px 80px;
    }

    /* ── 게임 카드 ── */
    .game-card {
      background:var(--card); border-radius:16px; border:2px solid #222;
      padding:18px; transition:border-color .2s, box-shadow .2s;
      position:relative;
    }
    .game-card:hover { border-color:var(--b); box-shadow:0 0 12px #00d4ff33; }
    .gc-head { display:flex; align-items:flex-start; gap:12px; margin-bottom:12px; }
    .gc-icon { font-size:36px; flex-shrink:0; }
    .gc-info { flex:1; min-width:0; }
    .gc-name { font-weight:900; font-size:16px; color:#fff; margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .gc-name-en { font-size:11px; color:#555; margin-bottom:6px; }
    .gc-tags { display:flex; flex-wrap:wrap; gap:4px; }
    .tag {
      font-size:10px; padding:2px 8px; border-radius:20px; font-weight:700;
      background:#1e1e38; color:#888; border:1px solid #333;
    }
    .tag.cat { background:#00d4ff11; color:var(--b); border-color:#00d4ff33; }

    .gc-thumb-wrap {
      position:relative; width:100%; height:150px; border-radius:10px;
      margin-bottom:10px; overflow:hidden; background:#111;
    }
    .gc-thumb-bg {
      position:absolute; inset:0; width:100%; height:100%;
      object-fit:cover; filter:blur(12px) brightness(0.5) saturate(1.4);
      transform:scale(1.1);
    }
    .gc-thumb {
      position:absolute; inset:0; width:100%; height:100%;
      object-fit:contain; display:block;
    }

    .gc-meta { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:12px; }
    .meta-item { font-size:12px; color:#666; }
    .meta-item span { color:#ccc; font-weight:700; }

    .gc-bars { margin-bottom:14px; }
    .bar-row { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
    .bar-label { font-size:11px; color:#666; width:40px; flex-shrink:0; }
    .bar-track { flex:1; background:#0d0d1f; border-radius:4px; height:8px; overflow:hidden; }
    .bar-fill { height:100%; border-radius:4px; transition:width .6s ease; }
    .bar-val { font-size:11px; color:#888; width:20px; text-align:right; flex-shrink:0; }

    .gc-actions { display:flex; gap:8px; }
    .btn-edit {
      flex:1; padding:9px; border-radius:10px; border:1px solid var(--b);
      background:transparent; color:var(--b); font-family:'Nunito',sans-serif;
      font-weight:700; font-size:13px; cursor:pointer; transition:all .15s;
    }
    .btn-edit:hover { background:#00d4ff22; }
    .btn-del {
      padding:9px 12px; border-radius:10px; border:1px solid var(--r);
      background:transparent; color:var(--r); font-family:'Nunito',sans-serif;
      font-weight:700; font-size:13px; cursor:pointer; transition:all .15s;
    }
    .btn-del:hover { background:#ff446622; }

    /* ── 이용 불가 ── */
    .unavailable { opacity:.45; }
    .unavailable-badge {
      position:absolute; top:12px; left:12px; background:#ff446622;
      color:var(--r); border:1px solid var(--r); border-radius:20px;
      font-size:10px; padding:2px 8px; font-weight:700; z-index:2;
    }

    /* ── 카드 우상단 편집 아이콘 ── */
    .gc-edit-icon {
      position:absolute; top:8px; right:10px; z-index:3;
      background:transparent; border:none; font-size:15px; cursor:pointer;
      opacity:.4; transition:opacity .2s; padding:4px;
    }
    .game-card:hover .gc-edit-icon { opacity:1; }

    /* ── 상세 모달 ── */
    .detail-modal-bd {
      position:fixed; inset:0; background:#000a; z-index:1000;
      display:flex; align-items:center; justify-content:center;
      opacity:0; pointer-events:none; transition:opacity .2s;
      padding:16px;
    }
    .detail-modal-bd.open { opacity:1; pointer-events:all; }
    .detail-modal {
      background:var(--card); border-radius:20px; border:2px solid var(--b);
      width:100%; max-width:520px; max-height:90vh; overflow-y:auto;
      transform:scale(.95); transition:transform .2s;
    }
    .detail-modal-bd.open .detail-modal { transform:scale(1); }
    .detail-head {
      position:sticky; top:0; background:var(--card); z-index:1;
      display:flex; align-items:center; gap:10px; padding:16px 18px 12px;
      border-bottom:1px solid #222;
    }
    .detail-body { padding:18px; }
    .detail-section { margin-bottom:18px; }
    .detail-label { font-size:11px; color:#666; text-transform:uppercase; letter-spacing:.05em; margin-bottom:6px; }
    .detail-value { font-size:14px; color:#ddd; line-height:1.6; white-space:pre-wrap; }
    .detail-meta-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .detail-meta-item { background:#0d0d1f; border-radius:10px; padding:10px 12px; }
    .detail-meta-label { font-size:10px; color:#555; margin-bottom:3px; }
    .detail-meta-val { font-size:16px; font-weight:900; color:#fff; }
    .detail-cats { display:flex; flex-wrap:wrap; gap:6px; }
    .yt-link-btn {
      display:flex; align-items:center; gap:8px; padding:11px 18px;
      background:#ff000022; border:1px solid #ff4444; border-radius:12px;
      color:#ff6b6b; font-weight:700; font-size:13px; cursor:pointer;
      text-decoration:none; font-family:'Nunito',sans-serif;
      transition:background .15s; width:100%; justify-content:center;
    }
    .yt-link-btn:hover { background:#ff000044; }

    /* ── 빈 상태 ── */
    .empty { text-align:center; padding:60px 20px; color:#444; }
    .empty-icon { font-size:56px; margin-bottom:16px; }
    .empty-txt { font-family:'Press Start 2P',monospace; font-size:8px; }

    /* ── 로딩 ── */
    .loading { text-align:center; padding:60px; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .spinner { width:40px; height:40px; border:3px solid #222; border-top-color:var(--b); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 16px; }

    /* ── 모달 ── */
    .modal-bd {
      position:fixed; inset:0; background:rgba(0,0,0,.88); backdrop-filter:blur(6px);
      z-index:200; display:flex; align-items:center; justify-content:center;
      padding:16px; opacity:0; pointer-events:none; transition:opacity .2s;
    }
    .modal-bd.open { opacity:1; pointer-events:all; }
    .modal {
      background:var(--card); border-radius:20px; padding:28px;
      max-width:560px; width:100%; max-height:92vh; overflow-y:auto;
      border:2px solid var(--b); box-shadow:0 0 40px #00d4ff33;
      transform:scale(.95); transition:transform .2s;
    }
    .modal-bd.open .modal { transform:scale(1); }
    .modal-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; }
    .modal-title {
      font-family:'Nunito',sans-serif; font-size:17px; font-weight:900;
      color:var(--b); letter-spacing:-.3px;
    }
    .modal-close { background:transparent; border:none; color:#666; font-size:22px; cursor:pointer; transition:color .15s; }
    .modal-close:hover { color:#ddd; }

    /* 폼 */
    .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .form-group { display:flex; flex-direction:column; gap:6px; }
    .form-group.full { grid-column:1/-1; }
    .form-label { font-size:12px; color:#888; font-weight:700; }
    .form-input, .form-select, .form-textarea {
      background:var(--bg); border:2px solid #333; border-radius:10px;
      padding:10px 12px; color:#fff; font-family:'Nunito',sans-serif;
      font-weight:700; font-size:14px; outline:none; transition:border .15s;
      width:100%;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color:var(--b); }
    .form-select option { background:var(--card2); }
    .form-textarea { resize:vertical; min-height:80px; }
    .form-range { width:100%; accent-color:var(--b); }

    /* ── BGG 자동완성 ── */
    .ac-wrap { position:relative; }
    .ac-drop {
      position:absolute; top:100%; left:0; right:0; z-index:100;
      background:var(--card2); border:2px solid var(--b); border-radius:12px;
      margin-top:4px; max-height:260px; overflow-y:auto;
      box-shadow:0 8px 24px #000a; display:none;
    }
    .ac-drop.open { display:block; }
    .ac-item {
      display:flex; align-items:center; gap:10px; padding:10px 14px;
      cursor:pointer; border-bottom:1px solid #1e1e38; transition:background .1s;
    }
    .ac-item:last-child { border-bottom:none; }
    .ac-item:hover { background:#00d4ff11; }
    .ac-thumb { width:36px; height:36px; border-radius:6px; object-fit:cover; background:#1e1e38; flex-shrink:0; }
    .ac-name { font-weight:800; font-size:13px; color:#ddd; }
    .ac-year { font-size:11px; color:#555; }
    .ac-loading { padding:14px; text-align:center; color:#555; font-size:13px; }
    .bgg-badge {
      display:inline-flex; align-items:center; gap:4px;
      background:#00ff8811; border:1px solid var(--g); color:var(--g);
      border-radius:6px; padding:3px 8px; font-size:11px; font-weight:700;
      margin-left:8px; cursor:pointer; vertical-align:middle;
    }
    .bgg-badge:hover { background:#00ff8833; }
    .range-val { font-size:12px; color:var(--b); font-weight:900; text-align:right; }

    /* 카테고리 체크박스 */
    .cat-grid { display:flex; flex-wrap:wrap; gap:8px; }
    .cat-chip {
      padding:6px 12px; border-radius:20px; border:2px solid #333; background:transparent;
      color:#777; font-size:12px; font-weight:700; cursor:pointer; transition:all .15s;
    }
    .cat-chip.on { border-color:var(--b); color:var(--b); background:#00d4ff11; }

    /* 제출 버튼 */
    .form-btns { display:flex; gap:10px; margin-top:24px; }
    .btn-cancel {
      flex:1; padding:12px; border-radius:12px; border:1px solid #333;
      background:transparent; color:#888; font-family:'Nunito',sans-serif;
      font-weight:700; font-size:15px; cursor:pointer;
    }
    .btn-submit {
      flex:2; padding:12px; border-radius:12px; border:none;
      background:var(--g); color:var(--bg); font-family:'Nunito',sans-serif;
      font-weight:900; font-size:15px; cursor:pointer;
      box-shadow:0 0 12px #00ff8855; transition:filter .15s;
    }
    .btn-submit:hover { filter:brightness(1.15); }
    .btn-submit:disabled { background:#333; color:#666; box-shadow:none; cursor:not-allowed; }

    /* ── 토스트 ── */
    .toast {
      position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px);
      background:var(--card); border:2px solid var(--g); border-radius:14px;
      padding:12px 24px; font-weight:700; font-size:14px; color:var(--g);
      z-index:300; transition:transform .3s; white-space:nowrap;
      box-shadow:0 0 20px #00ff8844;
    }
    .toast.show { transform:translateX(-50%) translateY(0); }
    .toast.err  { border-color:var(--r); color:var(--r); box-shadow:0 0 20px #ff446644; }

    /* ── 리뷰 평점 배지 ── */
    .review-badge {
      display:inline-flex; align-items:center; gap:4px;
      background:#ffd70011; border:1px solid #ffd70033;
      color:var(--y); border-radius:20px; font-size:11px; font-weight:700;
      padding:3px 10px; margin-bottom:10px;
    }

    /* ── 방문자 그리드 ── */
    .visitor-grid {
      display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
      gap:12px; padding:0 20px 80px;
    }
    .visitor-card-admin {
      background:var(--card); border-radius:14px; border:2px solid #222;
      padding:16px; transition:border-color .2s; position:relative;
    }
    .visitor-card-admin:hover { border-color:var(--g); }
    .vca-avatar { font-size:40px; text-align:center; margin-bottom:8px; }
    .vca-name { font-weight:900; font-size:15px; color:#fff; text-align:center; margin-bottom:2px; }
    .vca-age  { font-size:11px; color:#555; text-align:center; margin-bottom:4px; }
    .vca-memo { font-size:12px; color:#666; text-align:center; margin-bottom:10px; min-height:16px; }
    .vca-actions { display:flex; gap:6px; }

    /* ── 방문 기록 섹션 ── */
    .visit-history-section { margin:0 20px 80px; }
    .vh-header {
      background:var(--card2); border:1px solid #333; border-radius:12px;
      padding:12px 16px; font-weight:700; font-size:14px; color:#aaa;
      cursor:pointer; display:flex; justify-content:space-between;
      align-items:center; transition:color .15s;
    }
    .vh-header:hover { color:#fff; }
    .vh-toggle-icon { font-size:11px; transition:transform .2s; }
    .vh-body { display:none; padding:8px 0; }
    .vh-body.open { display:block; }
    .vh-date-group { margin-bottom:16px; }
    .vh-date-label {
      font-size:12px; color:var(--g); font-weight:700;
      padding:4px 0 8px; border-bottom:1px solid #1e1e38; margin-bottom:8px;
    }
    .vh-visitor-chips { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:4px; }
    .vh-chip {
      background:#1e1e38; border:1px solid #333; border-radius:20px;
      padding:4px 12px; font-size:12px; font-weight:700; color:#ccc;
      display:flex; align-items:center; gap:6px;
    }
    .vh-chip-emoji { font-size:16px; }
    .vh-time { font-size:11px; color:#555; margin-top:2px; }
    .vh-snack-row {
      font-size:11px; color:#888; padding:2px 0 0 2px;
    }

    /* ── 아바타 선택 그리드 ── */
    .avatar-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(54px,1fr)); gap:8px; }
    .avatar-opt {
      width:54px; height:54px; border-radius:14px; background:var(--card2);
      border:2px solid transparent; font-size:28px; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      transition:all .12s;
    }
    .avatar-opt:hover { border-color:#555; transform:scale(1.08); }
    .avatar-opt.selected { border-color:var(--g); background:#00ff8811; box-shadow:0 0 10px #00ff8844; }

    /* 성별 & 연령대 버튼 pill */
    .pill-group { display:flex; gap:8px; flex-wrap:wrap; }
    .pill-btn {
      padding:8px 18px; border-radius:20px; border:2px solid #333;
      background:var(--card2); color:#888; font-family:'Nunito',sans-serif;
      font-weight:800; font-size:14px; cursor:pointer; transition:all .15s;
    }
    .pill-btn:hover { border-color:#555; color:#ddd; }
    .pill-btn.on { border-color:var(--p); color:var(--p); background:#cc44ff18; box-shadow:0 0 8px #cc44ff44; }

    /* ── 후기/QR 모달 ── */
    .modal2-bd {
      position:fixed; inset:0; background:rgba(0,0,0,.88); backdrop-filter:blur(6px);
      z-index:300; display:flex; align-items:center; justify-content:center;
      padding:16px; opacity:0; pointer-events:none; transition:opacity .2s;
    }
    .modal2-bd.open { opacity:1; pointer-events:all; }
    .modal2 {
      background:var(--card); border-radius:20px; padding:24px;
      max-width:440px; width:100%; max-height:88vh; overflow-y:auto;
      transform:scale(.95); transition:transform .2s;
    }
    .modal2-bd.open .modal2 { transform:scale(1); }

    /* 후기 아이템 */
    .review-item {
      display:flex; gap:10px; align-items:flex-start;
      padding:12px 0; border-bottom:1px solid #1e1e38;
    }
    .review-item:last-child { border-bottom:none; }
    .ri-avatar { font-size:28px; flex-shrink:0; }
    .ri-body { flex:1; min-width:0; }
    .ri-name { font-weight:900; font-size:13px; color:#ddd; }
    .ri-stars { color:var(--y); font-size:13px; }
    .ri-comment { font-size:12px; color:#888; margin-top:3px; line-height:1.5; }
    .ri-date { font-size:10px; color:#444; margin-top:3px; }

    /* 후기 추가 폼 */
    .review-add-form { border-top:2px solid #1e1e38; margin-top:16px; padding-top:16px; }
    .rv-visitor-select {
      width:100%; background:var(--bg); border:2px solid #333; border-radius:10px;
      padding:10px 12px; color:#fff; font-family:'Nunito',sans-serif;
      font-weight:700; font-size:14px; outline:none; margin-bottom:12px;
    }
    .rv-visitor-select:focus { border-color:var(--g); }
    .rv-stars { display:flex; gap:6px; margin-bottom:10px; }
    .rv-star {
      font-size:28px; cursor:pointer; color:#333; transition:color .1s;
      user-select:none;
    }
    .rv-star.on { color:var(--y); }
    .rv-comment {
      width:100%; background:var(--bg); border:2px solid #333; border-radius:10px;
      padding:10px 12px; color:#fff; font-family:'Nunito',sans-serif;
      font-weight:700; font-size:13px; outline:none; resize:none; min-height:60px;
      margin-bottom:12px;
    }
    .rv-comment:focus { border-color:var(--g); }
    .rv-submit {
      width:100%; padding:11px; border-radius:10px; border:none;
      background:var(--g); color:var(--bg); font-family:'Nunito',sans-serif;
      font-weight:900; font-size:14px; cursor:pointer; transition:filter .15s;
    }
    .rv-submit:disabled { background:#333; color:#666; cursor:not-allowed; }

    /* QR 이미지 */
    .qr-wrap { text-align:center; padding:16px 0; }
    .qr-wrap img { border-radius:12px; background:#fff; padding:8px; }
    .qr-url { font-size:11px; color:#555; margin-top:8px; word-break:break-all; }

    /* ── YouTube 검색 ── */
    .yt-trigger-btn {
      background:#ff000022; border:1px solid #ff4444; color:#ff6666;
      border-radius:8px; padding:3px 10px; font-family:'Nunito',sans-serif;
      font-size:11px; font-weight:700; cursor:pointer; transition:all .15s; white-space:nowrap;
    }
    .yt-trigger-btn:hover { background:#ff000044; color:#ff8888; }
    .yt-modal-bd {
      position:fixed; inset:0; background:rgba(0,0,0,.9); backdrop-filter:blur(6px);
      z-index:500; display:flex; align-items:center; justify-content:center;
      padding:16px; opacity:0; pointer-events:none; transition:opacity .2s;
    }
    .yt-modal-bd.open { opacity:1; pointer-events:all; }
    .yt-modal {
      background:var(--card); border-radius:20px;
      max-width:520px; width:100%; max-height:85vh;
      border:2px solid #ff4444; box-shadow:0 0 40px #ff000033;
      display:flex; flex-direction:column;
      transform:scale(.95); transition:transform .2s;
    }
    .yt-modal-bd.open .yt-modal { transform:scale(1); }
    .yt-modal-head {
      padding:16px 20px; border-bottom:1px solid #222;
      display:flex; align-items:center; gap:12px; flex-shrink:0;
    }
    .yt-modal-title { font-family:'Press Start 2P',monospace; font-size:8px; color:#ff4444; flex:1; line-height:1.8; }
    .yt-results { overflow-y:auto; padding:16px; flex:1; }
    .yt-card {
      display:flex; gap:12px; padding:12px; border:1px solid #222;
      border-radius:12px; margin-bottom:10px;
      transition:all .15s; align-items:flex-start;
    }
    .yt-card:hover { border-color:#ff4444; background:#ff000011; }
    .yt-thumb { width:100px; height:56px; border-radius:8px; object-fit:cover; flex-shrink:0; background:#111; }
    .yt-info { flex:1; min-width:0; }
    .yt-title {
      font-weight:900; font-size:13px; color:#ddd; margin-bottom:4px;
      overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
    }
    .yt-channel { font-size:11px; color:#555; margin-bottom:4px; }
    .yt-desc {
      font-size:11px; color:#666; line-height:1.4;
      overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
    }
    .yt-card-btns { display:flex; gap:6px; margin-top:6px; }
    .yt-select-btn {
      background:#ff4444; color:#fff; border:none; border-radius:6px;
      padding:4px 10px; font-size:11px; font-weight:700; cursor:pointer;
      font-family:'Nunito',sans-serif; white-space:nowrap; transition:filter .15s;
    }
    .yt-select-btn:hover { filter:brightness(1.2); }
    .yt-view-btn {
      background:#333; color:#aaa; border:none; border-radius:6px;
      padding:4px 10px; font-size:11px; font-weight:700; cursor:pointer;
      font-family:'Nunito',sans-serif; white-space:nowrap;
    }
    .yt-loading { text-align:center; padding:40px; color:#555; font-size:14px; line-height:2; }
    .yt-no-key { text-align:center; padding:24px 20px; }
    .yt-key-note { font-size:13px; color:#888; line-height:1.8; margin-bottom:20px; }
    .yt-key-note a { color:#ff6666; }
    .yt-key-input {
      width:100%; background:var(--card2); border:1px solid #444; border-radius:8px;
      padding:10px 12px; color:#ddd; font-family:'Nunito',sans-serif; font-size:13px;
      margin-bottom:10px; outline:none;
    }
    .yt-key-input:focus { border-color:#ff4444; }
    .yt-key-save {
      background:#ff4444; color:#fff; border:none; border-radius:8px;
      padding:10px 20px; font-weight:900; cursor:pointer;
      font-family:'Nunito',sans-serif; font-size:14px; transition:filter .15s;
    }
    .yt-key-save:hover { filter:brightness(1.15); }
    .yt-open-link {
      display:inline-block; margin-top:14px; color:#ff6666;
      font-size:13px; cursor:pointer; text-decoration:underline;
    }

    /* ── 반응형 ── */
    @media(max-width:480px) {
      .form-grid { grid-template-columns:1fr; }
      .grid { grid-template-columns:1fr; }
      .header-title { font-size:7px; }
    }
    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-track { background:var(--bg); }
    ::-webkit-scrollbar-thumb { background:var(--b); border-radius:2px; }
  </style>
</head>
<body>

  <!-- 헤더 -->
  <header>
    <button class="back-btn" onclick="location.href='./index.html'">🏠 홈</button>
    <div class="header-title">보드게임 정보</div>
    <button class="add-btn" id="add-btn">+ 게임 추가</button>
  </header>

  <!-- 탭 -->
  <div class="tabs">
    <div class="tab active-board" id="tab-board"    onclick="switchTab('board')">🎲 보드게임</div>
    <div class="tab" id="tab-hand"                  onclick="switchTab('hand')">✋ 맨손게임</div>
    <div class="tab" id="tab-visitor"               onclick="switchTab('visitor')">👥 방문자</div>
  </div>

  <!-- 검색 -->
  <div class="search-row">
    <input class="search-input" id="search" placeholder="🔍 게임 이름 검색..." oninput="currentTab==='visitor' ? renderVisitorList() : renderList()">
  </div>
  <!-- 카테고리 필터 -->
  <div class="cat-filter-row hidden" id="cat-filter-row"></div>

  <!-- 통계 -->
  <div class="stats" id="stats"></div>

  <!-- 게임 목록 -->
  <div id="list-area">
    <div class="loading"><div class="spinner"></div></div>
  </div>

  <!-- 모달 -->
  <div class="modal-bd" id="modal">
    <div class="modal">
      <div class="modal-head">
        <div class="modal-title" id="modal-title">게임 추가</div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <form id="game-form" onsubmit="submitForm(event)">
        <div id="form-fields"></div>
        <div class="form-btns">
          <button type="button" class="btn-cancel" onclick="closeModal()">취소</button>
          <button type="submit" class="btn-submit" id="submit-btn">저장</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 후기 모달 -->
  <div class="modal2-bd" id="review-modal" onclick="mayClose2(event,'review-modal')">
    <div class="modal2">
      <div class="modal-head">
        <div style="display:flex;flex-direction:column;gap:2px;">
          <div style="font-size:11px;color:#555;font-weight:700;">💬 REVIEW</div>
          <div class="modal-title" id="rv-modal-title" style="color:var(--y);font-size:19px;">게임 후기</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <button class="btn-edit" style="border-color:var(--b);color:var(--b);padding:7px 12px;font-size:12px;" onclick="openQR(rvGameId,rvGameType,rvGameName)">📱 QR</button>
          <button class="modal-close" onclick="closeModal2('review-modal')">✕</button>
        </div>
      </div>
      <div id="rv-list"></div>
      <div class="review-add-form">
        <div style="font-size:15px;font-weight:900;color:var(--g);margin-bottom:12px;">✏️ 후기 추가하기</div>
        <select class="rv-visitor-select" id="rv-visitor"></select>
        <div class="rv-stars" id="rv-stars">
          <span class="rv-star" data-v="1" onclick="setRvStar(1)">★</span>
          <span class="rv-star" data-v="2" onclick="setRvStar(2)">★</span>
          <span class="rv-star" data-v="3" onclick="setRvStar(3)">★</span>
          <span class="rv-star" data-v="4" onclick="setRvStar(4)">★</span>
          <span class="rv-star" data-v="5" onclick="setRvStar(5)">★</span>
        </div>
        <textarea class="rv-comment" id="rv-comment" placeholder="한마디 후기 (선택)"></textarea>
        <button class="rv-submit" id="rv-submit" onclick="submitGameReview()">💬 후기 등록</button>
      </div>
    </div>
  </div>

  <!-- QR 모달 -->
  <div class="modal2-bd" id="qr-modal" onclick="mayClose2(event,'qr-modal')">
    <div class="modal2" style="max-width:320px;">
      <div class="modal-head">
        <div style="display:flex;flex-direction:column;gap:2px;">
          <div style="font-size:11px;color:#555;font-weight:700;">📱 QR CODE</div>
          <div class="modal-title" id="qr-title" style="color:var(--b);font-size:19px;">QR 코드</div>
        </div>
        <button class="modal-close" onclick="closeModal2('qr-modal')">✕</button>
      </div>
      <div class="qr-wrap">
        <img id="qr-img" src="" alt="QR" width="200" height="200">
        <div class="qr-url" id="qr-url"></div>
      </div>
      <div style="font-size:12px;color:#555;text-align:center;margin-top:8px;">스캔하면 후기 페이지로 이동해요!</div>
    </div>
  </div>

  <!-- 토스트 -->
  <div class="toast" id="toast"></div>

  <!-- 게임 상세 모달 (읽기전용) -->
  <div class="detail-modal-bd" id="detail-modal" onclick="if(event.target===this)closeGameDetail()">
    <div class="detail-modal" id="detail-modal-inner"></div>
  </div>

  <!-- YouTube 검색 모달 -->
  <div class="yt-modal-bd" id="yt-modal" onclick="if(event.target===this)closeYTModal()">
    <div class="yt-modal">
      <div class="yt-modal-head">
        <span style="font-size:22px;">▶️</span>
        <div class="yt-modal-title" id="yt-modal-title">YouTube 검색</div>
        <button class="modal-close" onclick="closeYTModal()">✕</button>
      </div>
      <div class="yt-results" id="yt-results">
        <div class="yt-loading">🔍 검색 중...</div>
      </div>
    </div>
  </div>

  <script>
    /* ══════════════════════════════════════
       상태
       ══════════════════════════════════════ */
    let currentTab  = 'board';   // 'board' | 'hand' | 'visitor'
    let _selCats    = [];        // 선택된 카테고리 필터 (빈 배열 = 전체)
    let allGames    = [];
    let editingId   = null;

    // 방문자
    let allVisitors  = [];
    let editingVid   = null;
    let selAvatar    = '🧑';

    // 후기 모달
    let rvGameId     = null;
    let rvGameType   = null;
    let rvGameName   = '';
    let rvRating     = 0;

    const AVATARS = ['🧑','👦','👧','👨','👩','👴','👵','🧒','🤖','👾',
                     '🦊','🐯','🐸','🐧','🦁','🐻','🐼','🐨','🐺','🦋',
                     '🐲','🦄','⚡','🌟','🍀','🎯','🎮','🔥','👑','💎'];

    const BOARD_CATS = ['전략','카드','파티','협력','추리','경제','주사위','블러핑','어린이','균형/스킬','경쟁','기억','창의','언어','공포','롤플레이'];
    const HAND_CATS  = ['언어','신체','추리','창의','조용','시끌벅적','팀전','교육'];
    const DIFF_LABEL = ['','쉬움','보통','약간 어려움','어려움','매우 어려움'];
    const FUN_LABEL  = ['','별로','그저 그래','괜찮아','재미있어','최고야!'];

    /* ══════════════════════════════════════
       초기화
       ══════════════════════════════════════ */
    async function init() {
      if (sessionStorage.getItem('gb_auth') !== '1') {
        location.href = './index.html'; return;
      }
      await load();
      document.getElementById('add-btn').onclick = () => {
        if (currentTab === 'visitor')  openVisitorModal(null);
        else if (currentTab === 'callmenu') openCallMenuModal(null);
        else openModal(null);
      };
    }

    /* ══════════════════════════════════════
       데이터 로드
       ══════════════════════════════════════ */
    async function load() {
      const tbl = currentTab === 'board' ? 'board_games' : 'hand_games';
      const [gameRes, rvRes] = await Promise.all([
        getDB().from(tbl).select('*').order('name'),
        getDB().from('game_reviews').select('game_id,rating').eq('game_type', currentTab)
      ]);
      if (gameRes.error) {
        showToast('로드 실패: ' + gameRes.error.message, true);
        const hint = gameRes.error.message.includes('exist')
          ? '<div style="font-size:11px;color:#555;margin-top:8px;">db/schema.sql 을 Supabase에서 실행해 주세요</div>'
          : '';
        document.getElementById('list-area').innerHTML = `
          <div class="empty">
            <div class="empty-icon">⚠️</div>
            <div class="empty-txt">LOAD ERROR</div>
            ${hint}
          </div>`;
        return;
      }
      allGames = gameRes.data || [];

      // 리뷰 집계
      window._reviewMap = {};
      (rvRes.data || []).forEach(r => {
        const key = `${r.game_id}_${currentTab}`;
        if (!window._reviewMap[key]) window._reviewMap[key] = { sum:0, cnt:0 };
        window._reviewMap[key].sum += r.rating;
        window._reviewMap[key].cnt += 1;
      });
      Object.keys(window._reviewMap).forEach(k => {
        const rv = window._reviewMap[k];
        rv.avg = (rv.sum / rv.cnt).toFixed(1);
      });

      renderStats();
      renderCatFilter();
      renderList();
    }

    /* ══════════════════════════════════════
       탭 전환
       ══════════════════════════════════════ */
    function switchTab(tab) {
      currentTab = tab;
      document.getElementById('search').value = '';
      document.getElementById('tab-board').className   = 'tab' + (tab==='board'   ? ' active-board'   : '');
      document.getElementById('tab-hand').className    = 'tab' + (tab==='hand'    ? ' active-hand'    : '');
      document.getElementById('tab-visitor').className  = 'tab' + (tab==='visitor'  ? ' active-visitor'  : '');
      document.getElementById('stats').innerHTML = '';

      _selCats = [];
      renderCatFilter();
      const addBtn = document.getElementById('add-btn');
      if (tab === 'visitor') {
        addBtn.textContent = '+ 방문자 추가';
        document.getElementById('search').placeholder = '🔍 방문자 이름 검색...';
        document.getElementById('list-area').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
        loadVisitors();
      } else if (tab === 'callmenu') {
        addBtn.textContent = '+ 메뉴 추가';
        document.getElementById('search').style.display = 'none';
        document.getElementById('list-area').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
        loadCallMenu();
      } else {
        addBtn.textContent = '+ 게임 추가';
        document.getElementById('search').placeholder = '🔍 게임 이름 검색...';
        document.getElementById('search').style.display = '';
        document.getElementById('list-area').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
        load();
      }
    }

    /* ══════════════════════════════════════
       통계 렌더
       ══════════════════════════════════════ */
    function renderStats() {
      const avail = allGames.filter(g => g.is_available !== false);
      const avgFun = allGames.length
        ? (allGames.reduce((s,g) => s + (g.fun_score||0), 0) / allGames.length).toFixed(1)
        : '-';
      document.getElementById('stats').innerHTML = `
        <div class="stat-chip"><strong>${allGames.length}</strong>총 게임</div>
        <div class="stat-chip"><strong>${avail.length}</strong>이용 가능</div>
        <div class="stat-chip"><strong>${avgFun}</strong>평균 재미도</div>
      `;
    }

    /* ══════════════════════════════════════
       목록 렌더
       ══════════════════════════════════════ */
    function renderCatFilter() {
      const row = document.getElementById('cat-filter-row');
      const cats = currentTab === 'board' ? BOARD_CATS : currentTab === 'hand' ? HAND_CATS : null;
      if (!cats) { row.classList.add('hidden'); return; }
      row.classList.remove('hidden');
      row.innerHTML = ['전체', ...cats].map(c => {
        const isAll = c === '전체';
        const on = isAll ? _selCats.length === 0 : _selCats.includes(c);
        return `<div class="cf-chip${on?' on':''}" onclick="toggleFilterCat('${c}')">${c}</div>`;
      }).join('');
    }

    function toggleFilterCat(cat) {
      if (cat === '전체') { _selCats = []; }
      else {
        const idx = _selCats.indexOf(cat);
        if (idx >= 0) _selCats.splice(idx, 1);
        else _selCats.push(cat);
      }
      renderCatFilter();
      renderList();
    }

    function renderList() {
      const q = document.getElementById('search').value.toLowerCase();
      let filtered = allGames.filter(g =>
        g.name.toLowerCase().includes(q) || (g.name_en||'').toLowerCase().includes(q)
      );
      if (_selCats.length > 0) {
        filtered = filtered.filter(g =>
          (g.categories || []).some(c => _selCats.includes(c))
        );
      }

      if (!filtered.length) {
        document.getElementById('list-area').innerHTML = `
          <div class="empty">
            <div class="empty-icon">${q ? '🔍' : '🎲'}</div>
            <div class="empty-txt">${q ? 'NOT FOUND' : 'NO GAMES YET'}</div>
          </div>`;
        return;
      }

      window._gameMap = {};
      filtered.forEach(g => { window._gameMap[g.id] = g; });

      const html = filtered.map(g => gameCardHTML(g)).join('');
      document.getElementById('list-area').innerHTML = `<div class="grid">${html}</div>`;
    }

    /* ── 게임 카드 HTML ── */
    function gameCardHTML(g) {
      const isBoard   = currentTab === 'board';
      const avail     = g.is_available !== false;
      const cats      = (g.categories || []).map(c => `<span class="tag cat">${c}</span>`).join('');
      const diffPct   = isBoard ? ((g.difficulty||1) / 5 * 100) : null;
      const funPct    = ((g.fun_score||1) / 5 * 100);
      const diffColor = isBoard ? `hsl(${120 - (g.difficulty||1)*20},70%,50%)` : null;
      const funColor  = `hsl(${(g.fun_score||1)*24},80%,55%)`;
      const rv        = window._reviewMap?.[`${g.id}_${currentTab}`];
      const rvBadge   = rv ? `<div class="review-badge">⭐ ${rv.avg} <span style="color:#888;">(${rv.cnt}개 후기)</span></div>` : '';

      return `
        <div class="game-card${avail ? '' : ' unavailable'}">
          ${!avail ? '<div class="unavailable-badge">이용불가</div>' : ''}
          <button class="gc-edit-icon" title="수정" onclick="openModal(window._gameMap[${g.id}])">✏️</button>
          ${rvBadge}
          ${g.image_url ? `<div class="gc-thumb-wrap"><img class="gc-thumb-bg" src="${esc(g.image_url)}" loading="lazy" aria-hidden="true"><img class="gc-thumb" src="${esc(g.image_url)}" loading="lazy" onerror="this.closest('.gc-thumb-wrap').style.display='none'"></div>` : ''}
          <div class="gc-head">
            <div class="gc-icon">${isBoard ? '🎲' : '✋'}</div>
            <div class="gc-info">
              <div class="gc-name" title="${esc(g.name)}">${esc(g.name)}</div>
              ${g.name_en ? `<div class="gc-name-en">${esc(g.name_en)}</div>` : ''}
              <div class="gc-tags">${cats}</div>
            </div>
          </div>

          <div class="gc-meta">
            <div class="meta-item">👥 <span>${g.min_players}~${g.max_players}명</span></div>
            <div class="meta-item">⏱ <span>${g.play_time_min||'?'}분</span></div>
            ${g.age_min ? `<div class="meta-item">🎂 <span>${g.age_min}세+</span></div>` : ''}
            ${g.materials ? `<div class="meta-item">📦 <span>${esc(g.materials)}</span></div>` : ''}
          </div>

          <div class="gc-bars">
            ${isBoard && diffPct !== null ? `
            <div class="bar-row">
              <div class="bar-label">난이도</div>
              <div class="bar-track"><div class="bar-fill" style="width:${diffPct}%;background:${diffColor}"></div></div>
              <div class="bar-val">${g.difficulty||'-'}</div>
            </div>` : ''}
            <div class="bar-row">
              <div class="bar-label">재미도</div>
              <div class="bar-track"><div class="bar-fill" style="width:${funPct}%;background:${funColor}"></div></div>
              <div class="bar-val">${g.fun_score||'-'}</div>
            </div>
          </div>

          <div class="gc-actions">

            <button class="btn-del"  onclick="deleteGame(${g.id})">🗑</button>

    function esc(s) {
      return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

       ══════════════════════════════════════ */
    async function deleteGame(id) {
      if (!confirm('정말 삭제할까요?')) return;
      const tbl = currentTab === 'board' ? 'board_games' : 'hand_games';
      const { error } = await getDB().from(tbl).delete().eq('id', id);
      if (error) { showToast('삭제 실패: ' + error.message, true); return; }
      showToast('🗑 삭제 완료!');
      await load();
    }

    /* ══════════════════════════════════════
       YouTube 검색
       ══════════════════════════════════════ */
    function openYTSearch() {
      const name = (document.getElementById('f-name')?.value || '').trim();
      if (!name) { showToast('게임 이름을 먼저 입력해 주세요', true); return; }
      document.getElementById('yt-modal').classList.add('open');
      document.getElementById('yt-modal-title').textContent = `"${name}" YouTube 검색`;
      document.getElementById('yt-results').innerHTML = '<div class="yt-loading">🔍 검색 중...</div>';
      searchYouTube(name);
    }

    function closeYTModal() {
      document.getElementById('yt-modal').classList.remove('open');
    }

    function searchYouTube(query) {
      const q = encodeURIComponent(query + ' 보드게임 방법');
      const ytUrl = `https://www.youtube.com/results?search_query=${q}`;
      document.getElementById('yt-results').innerHTML = `
        <div style="text-align:center;padding:24px 0;">
          <div style="font-size:36px;margin-bottom:12px;">🎬</div>
          <div style="color:#aaa;font-size:14px;line-height:1.8;margin-bottom:20px;">
            유튜브에서 <strong style="color:#fff;">"${esc(query)} 보드게임 방법"</strong> 검색 결과를 열어드릴게요.<br>
            마음에 드는 영상의 URL을 복사해서 아래 YouTube URL 칸에 붙여넣으세요.
          </div>
          <button onclick="window.open('${ytUrl}','_blank')"
            style="background:#ff0000;color:#fff;border:none;border-radius:12px;padding:12px 28px;
                   font-family:'Nunito',sans-serif;font-weight:900;font-size:15px;cursor:pointer;">
            ▶ YouTube에서 검색 열기
          </button>
        </div>`;
    }

    function renderYTResults(items, query) {
      if (!items.length) {
        document.getElementById('yt-results').innerHTML = '<div class="yt-loading">검색 결과가 없어요 😅</div>';
        return;
      }
      const safeQ = encodeURIComponent(query + ' 보드게임');
      document.getElementById('yt-results').innerHTML =
        `<div style="font-size:11px;color:#555;margin-bottom:12px;text-align:right;">
           <a style="color:#ff6666;cursor:pointer;" onclick="window.open('https://www.youtube.com/results?search_query=${safeQ}','_blank')">
             → 유튜브에서 더 보기
           </a>
         </div>` +
        items.map(item => {
          const vid   = item.id?.videoId || '';
          const s     = item.snippet || {};
          const thumb = s.thumbnails?.medium?.url || s.thumbnails?.default?.url || '';
          return `
            <div class="yt-card">
              <img class="yt-thumb" src="${thumb}" alt="" loading="lazy">
              <div class="yt-info">
                <div class="yt-title">${esc(s.title||'')}</div>
                <div class="yt-channel">${esc(s.channelTitle||'')}</div>
                <div class="yt-desc">${esc(s.description||'')}</div>
                <div class="yt-card-btns">
                  <button class="yt-select-btn" onclick="selectYTVideo('${vid}')">✓ URL 선택</button>
                  <button class="yt-view-btn" onclick="window.open('https://www.youtube.com/watch?v=${vid}','_blank')">▶ 보기</button>
                </div>
              </div>
            </div>`;
        }).join('');
    }

    function selectYTVideo(videoId) {
      const ytInput = document.getElementById('f-youtube');
      if (ytInput) {
        ytInput.value = `https://www.youtube.com/watch?v=${videoId}`;
        showToast('✅ YouTube URL 입력 완료!');
      }
      closeYTModal();
    }

       토스트
       ══════════════════════════════════════ */
    let toastTimer;
    function showToast(msg, isErr=false) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className   = 'toast' + (isErr ? ' err' : '');
      requestAnimationFrame(() => t.classList.add('show'));
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
    }

    /* 모달 외부 클릭 닫기 */
    document.getElementById('modal').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeModal();

      if (e.target === e.currentTarget) closeModal2(id);
    }
    function closeModal2(id) {
      document.getElementById(id).classList.remove('open');
    }

    async function loadVisitors() {
      const { data, error } = await getDB().from('visitors').select('*').order('name');
      if (error) {
        document.getElementById('list-area').innerHTML =
          '<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-txt">LOAD ERROR</div></div>';
        return;
      }
      allVisitors = data || [];
      renderVisitorList();
    }

    function vLabel(v) {
      const nick = v.nickname || v.name || '?';
      return v.nickname && v.name ? `${v.nickname}<span style="font-size:11px;color:#666;"> (${v.name})</span>` : nick;
    }
    function vSearchText(v) {
      return ((v.nickname||'') + ' ' + (v.name||'')).toLowerCase();
    }

    function renderVisitorList() {
      const q = document.getElementById('search').value.toLowerCase();
      const filtered = allVisitors.filter(v => vSearchText(v).includes(q));
      if (!filtered.length) {
        document.getElementById('list-area').innerHTML = `
          <div class="empty">
            <div class="empty-icon">${q ? '🔍' : '👥'}</div>
            <div class="empty-txt">${q ? 'NOT FOUND' : 'NO VISITORS YET'}</div>
          </div>`;
        return;
      }
      document.getElementById('list-area').innerHTML = `
        <div class="visitor-grid">
          ${filtered.map(v => `
            <div class="visitor-card-admin">
              <div class="vca-avatar">${v.avatar || '🧑'}</div>
              <div class="vca-name">${vLabel(v)}</div>
              ${v.age ? `<div class="vca-age">${v.age}세</div>` : '<div class="vca-age"></div>'}

            <div style="color:#555;font-size:13px;padding:16px;text-align:center;">로딩 중...</div>
          </div>

    async function loadVisitHistory() {
      const db = getDB();
      if (!db) return;
      try {
        // 방문 기록 + 방문자 정보
        const { data: logs } = await db
          .from('visit_logs')
          .select('*, visitors(id,name,nickname,avatar)')
          .order('visit_date', { ascending: false })
          .limit(90);
        // 호출 기록
        const { data: calls } = await db
          .from('call_history')
          .select('*')
          .order('called_at', { ascending: false })
          .limit(200);

        const callsByDate = {};
        (calls || []).forEach(c => {
          const d = (c.visit_date || (c.called_at||'').slice(0,10));
          if (!callsByDate[d]) callsByDate[d] = [];
          callsByDate[d].push(c);
        });

        const grouped = {};
        (logs || []).forEach(l => {
          const d = l.visit_date;
          if (!grouped[d]) grouped[d] = [];
          grouped[d].push(l);
        });

        const body = document.getElementById('visit-history-body');
        if (!Object.keys(grouped).length) {
          body.innerHTML = '<div style="color:#555;font-size:13px;padding:12px;text-align:center;">방문 기록이 없어요</div>';
          return;
        }

        body.innerHTML = Object.keys(grouped).sort((a,b)=>b.localeCompare(a)).map(date => {
          const visitors = grouped[date];
          const dayCallsRaw = callsByDate[date] || [];
          const snackSummary = dayCallsRaw.length
            ? dayCallsRaw.map(c=>`${c.menu_emoji||'📦'}${c.menu_label}${c.qty>1?' x'+c.qty:''}`).join(' · ')
            : null;
          return `
            <div class="vh-date-group">
              <div class="vh-date-label">📅 ${date}</div>
              <div class="vh-visitor-chips">
                ${visitors.map(l => {
                  const v = l.visitors || {};
                  const nick = v.nickname || v.name || '?';
                  const fullName = v.nickname && v.name ? `${v.nickname}(${v.name})` : nick;
                  const dur = l.duration_min ? `${Math.floor(l.duration_min/60)}h${l.duration_min%60}m` : null;
                  return `<div class="vh-chip">
                    <span class="vh-chip-emoji">${v.avatar||'🧑'}</span>
                    <span>${esc(fullName)}${dur?` <span style="color:#00ff88;font-size:10px;">${dur}</span>`:''}</span>
                  </div>`;
                }).join('')}
              </div>
              ${snackSummary ? `<div class="vh-snack-row">🍿 ${snackSummary}</div>` : ''}
            </div>`;
        }).join('');
      } catch(e) { console.warn('방문기록 로드 실패:', e); }
    }

    const AI_WEBHOOK = 'https://jknetworks.app.n8n.cloud/webhook/garaon-bg-search';
    let _acTimer = null;

    function debounceGameSearch(val) {
      clearTimeout(_acTimer);
      const drop = document.getElementById('ac-drop');
      if (!drop) return;
      if (val.length < 2) { drop.classList.remove('open'); return; }
      drop.innerHTML = '<div class="ac-loading">🤖 AI 검색 중...</div>';
      drop.classList.add('open');
      _acTimer = setTimeout(() => searchGame(val), 600);
    }

    async function searchGame(q) {
      const drop = document.getElementById('ac-drop');
      if (!drop) return;
      try {
        const r = await fetch(AI_WEBHOOK, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query: q })
        });
        if (!r.ok) {
          drop.innerHTML = `<div class="ac-loading" style="color:#ff6b6b;">⚠️ AI 연결 오류 (${r.status})<br><small>n8n에서 워크플로우를 ON/OFF 해주세요</small></div>`;
          return;
        }
        const d = await r.json();
        if (d.error) {
          drop.innerHTML = `<div class="ac-loading">검색 결과 없음: "${esc(q)}"</div>`;
          return;
        }
        const displayName = d.name_ko || d.name_en || q;
        const info = [
          d.min_players && d.max_players ? `👥 ${d.min_players}-${d.max_players}명` : '',
          d.play_time_min ? `⏱ ${d.play_time_min}분` : '',
          d.age_min ? `🎂 ${d.age_min}세+` : '',
        ].filter(Boolean).join('  ');
        drop.innerHTML = `
          <div class="ac-item" onclick='selectGame(${JSON.stringify(d).replace(/'/g,"&#39;")})'>
            <div style="display:flex;flex-direction:column;flex:1;gap:4px;">
              <div class="ac-name">${esc(displayName)}</div>
              ${d.name_en ? `<div class="ac-year">${esc(d.name_en)}</div>` : ''}
              ${info ? `<div style="font-size:11px;color:var(--b);margin-top:2px;">${info}</div>` : ''}
            </div>
            <span style="font-size:10px;color:#a78bfa;">AI</span>
          </div>`;
      } catch(e) {
        drop.innerHTML = `<div class="ac-loading" style="color:#ff6b6b;">오류: ${esc(e.message)}</div>`;
      }
    }

    function selectGame(d) {
      const drop = document.getElementById('ac-drop');
      if (drop) drop.classList.remove('open');
      const displayName = d.name_ko || d.name_en || '';
      document.getElementById('f-name').value = displayName;
      const nameEnEl = document.getElementById('f-name-en'); if (d.name_en && nameEnEl) nameEnEl.value = d.name_en;
      if (d.description) document.getElementById('f-desc').value = d.description;
      if (d.min_players) document.getElementById('f-min').value = d.min_players;
      if (d.max_players) document.getElementById('f-max').value = d.max_players;
      if (d.play_time_min) document.getElementById('f-time').value = d.play_time_min;
      if (d.age_min)     document.getElementById('f-age').value     = d.age_min;
      if (d.rules)       document.getElementById('f-rules').value   = d.rules;
      if (d.tips)        document.getElementById('f-tips').value    = d.tips;
      const imgEl = document.getElementById('f-image'); if (d.image_url && imgEl) imgEl.value = d.image_url;
      if (d.youtube_url) document.getElementById('f-youtube').value = d.youtube_url;
      if (d.categories?.length) {
        document.querySelectorAll('.cat-chip').forEach(btn => {
          if (d.categories.includes(btn.textContent.trim())) btn.classList.add('on');
        });
      }
      if (document.getElementById('yt-results')) searchYouTube(displayName);
      if (d.image_url) updateImgPreview(d.image_url);
      showToast('✅ AI 정보 자동 입력 완료!');
      // 브라우저에서 Wikipedia 이미지 조회 (n8n Cloud IP 차단 우회)
      if (d.name_en) fetchWikiImage(d.name_en);
    }

    function updateImgPreview(url) {
      const wrap = document.getElementById('img-preview');
      const el   = document.getElementById('img-preview-el');
      if (!wrap || !el) return;
      if (url) {
        el.src = url;
        wrap.style.display = '';
      } else {
        wrap.style.display = 'none';
      }
    }

    async function fetchWikiImage(nameEn) {
      try {
        const res = await fetch(
          'https://en.wikipedia.org/api/rest_v1/page/summary/' + encodeURIComponent(nameEn),
          { headers: { 'Accept': 'application/json' } }
        );
        if (!res.ok) return;
        const d = await res.json();
        const url = d.thumbnail?.source || d.originalimage?.source;
        if (!url) return;
        const imgEl = document.getElementById('f-image');
        if (imgEl && !imgEl.value) {   // 이미 값이 있으면 덮어쓰지 않음
          imgEl.value = url;
          updateImgPreview(url);
        }
      } catch(e) { /* 무시 */ }
    }

    async function uploadGameImage(input) {
      const file = input.files?.[0];
      if (!file) return;
      const status = document.getElementById('img-upload-status');
      status.style.display = '';
      status.textContent = '⏳ 업로드 중...';

      const ext  = file.name.split('.').pop();
      const path = `games/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
      const { data, error } = await getDB().storage.from('game-images').upload(path, file, { upsert: true });

      if (error) {
        status.textContent = '❌ 업로드 실패: ' + error.message;
        return;
      }
      const { data: pub } = getDB().storage.from('game-images').getPublicUrl(path);
      const url = pub.publicUrl;
      document.getElementById('f-image').value = url;
      updateImgPreview(url);
      status.textContent = '✅ 업로드 완료!';
      setTimeout(() => { status.style.display = 'none'; }, 2000);
    }

    async function testAIWebhook() {
      showToast('🤖 AI 연결 테스트 중...');
      try {
        const r = await fetch(AI_WEBHOOK, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query: '젠가' })
        });
        if (r.ok) {
          const d = await r.json();
          if (d.name_ko || d.name_en) {
            showToast(`✅ AI 연결 OK! "${d.name_ko||d.name_en}" 정보 수신됨`);
          } else {
            showToast('⚠️ 응답 받았지만 데이터 없음', true);
          }
        } else {
          showToast(`❌ 오류 ${r.status} — n8n에서 워크플로우를 OFF→ON 해주세요`, true);
        }
      } catch(e) {
        showToast('❌ 연결 실패: ' + e.message, true);
      }
    }

    // 클릭 외부 시 드롭다운 닫기
    document.addEventListener('click', e => {
      if (!e.target.closest('.ac-wrap')) {
        document.getElementById('ac-drop')?.classList.remove('open');
      }
    });
  </script>
</body>
</html>
