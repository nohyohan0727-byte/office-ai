<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎲 게임 추천 — 가라온브로스</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/config.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:   #0b0b1a; --card: #151526; --card2: #1e1e38;
      --g:    #00ff88; --p:   #ff006e; --b: #00d4ff; --y: #ffd700; --pp: #cc44ff;
      --text: #e8e8f0; --dim: #8888aa; --border: rgba(255,255,255,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); font-family: 'Nunito', sans-serif; color: var(--text); min-height: 100vh; }

    .header { background: rgba(11,11,26,0.95); border-bottom: 1px solid var(--border); padding: 0 1.25rem; height: 52px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 44px; z-index: 100; backdrop-filter: blur(10px); }
    .header-title { font-family: 'Press Start 2P', monospace; font-size: 0.75rem; color: var(--b); }
    .header-back { color: var(--dim); font-size: 0.85rem; text-decoration: none; border: 1px solid var(--border); padding: 0.3rem 0.75rem; border-radius: 6px; transition: all 0.2s; }
    .header-back:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }

    .main { max-width: 680px; margin: 0 auto; padding: 1.75rem 1.25rem 4rem; }

    /* 스텝 */
    .step { display: none; animation: fadeIn 0.28s ease; }
    .step.active { display: block; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

    /* 홈 */
    .home-title { font-family: 'Press Start 2P', monospace; font-size: 0.9rem; color: var(--y); text-align: center; line-height: 2.2; margin-bottom: 2rem; padding-top: 1rem; }
    .choice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .choice-card { background: var(--card); border: 2px solid var(--border); border-radius: 18px; padding: 2rem 1.25rem; text-align: center; cursor: pointer; transition: all 0.22s; }
    .choice-card.board:hover { border-color: var(--pp); box-shadow: 0 0 20px #cc44ff33; transform: translateY(-3px); }
    .choice-card.hand:hover  { border-color: var(--b);  box-shadow: 0 0 20px #00d4ff33; transform: translateY(-3px); }
    .choice-emoji { font-size: 2.5rem; display: block; margin-bottom: 0.75rem; }
    .choice-title { font-weight: 900; font-size: 1.05rem; margin-bottom: 0.35rem; }
    .choice-card.board .choice-title { color: var(--pp); }
    .choice-card.hand  .choice-title { color: var(--b); }
    .choice-desc { font-size: 0.95rem; color: var(--dim); line-height: 1.5; }

    /* 멤버 선택 */
    .member-title { font-family: 'Press Start 2P', monospace; font-size: 0.85rem; color: var(--g); text-align: center; line-height: 2.2; margin-bottom: 1.5rem; padding-top: 0.5rem; }
    .member-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; margin-bottom: 1.5rem; }
    .member-card { background: var(--card); border: 2px solid var(--border); border-radius: 14px; padding: 1rem 0.5rem; text-align: center; cursor: pointer; transition: all 0.18s; }
    .member-card:hover { border-color: rgba(255,255,255,0.2); }
    .member-card.on { border-color: var(--g); background: rgba(0,255,136,0.07); box-shadow: 0 0 12px rgba(0,255,136,0.2); }
    .mc-avatar { font-size: 2rem; margin-bottom: 0.4rem; display: block; }
    .mc-name { font-weight: 900; font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .mc-age { font-size: 0.85rem; color: var(--dim); margin-top: 0.15rem; }
    .mc-check { font-size: 0.85rem; color: var(--g); min-height: 1rem; margin-top: 0.25rem; }
    .member-loading { text-align: center; color: var(--dim); padding: 2rem; font-size: 0.85rem; }

    /* 필터 */
    .filter-title { font-weight: 900; font-size: 1.1rem; margin-bottom: 1.5rem; }
    .filter-title span { color: var(--pp); }
    .filter-title.blue span { color: var(--b); }
    .filter-group { margin-bottom: 1.5rem; }
    .filter-label { font-size: 0.95rem; color: var(--dim); font-weight: 700; margin-bottom: 0.6rem; display: block; }
    .pills { display: flex; flex-wrap: wrap; gap: 0.45rem; }
    .pill { -webkit-appearance: none; appearance: none; background: var(--card2); border: 1px solid var(--border); border-radius: 50px; padding: 0.4rem 0.95rem; font-size: 0.95rem; cursor: pointer; transition: all 0.18s; user-select: none; font-family: inherit; }
    .pill:hover { border-color: rgba(255,255,255,0.22); }
    .pill.on { background: var(--pp); color: #000; border-color: var(--pp); font-weight: 800; }
    .pill.on.blue { background: var(--b); border-color: var(--b); }

    /* 오늘 멤버 표시 칩 */
    .today-chips { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1rem; }
    .today-chip { background: rgba(0,255,136,0.1); border: 1px solid rgba(0,255,136,0.3); border-radius: 20px; padding: 0.25rem 0.65rem; font-size: 0.9rem; color: var(--g); }

    /* 버튼 */
    .btn-row { display: flex; gap: 0.75rem; margin-top: 2rem; flex-wrap: wrap; }
    .btn { display: inline-flex; align-items: center; gap: 0.35rem; padding: 0.7rem 1.5rem; border-radius: 10px; border: none; cursor: pointer; font-size: 0.9rem; font-weight: 800; font-family: inherit; transition: all 0.2s; }
    .btn-go   { background: var(--pp); color: #000; }
    .btn-go:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .btn-go.green { background: var(--g); }
    .btn-go.blue { background: var(--b); }
    .btn-back { background: var(--card2); color: var(--text); border: 1px solid var(--border); }
    .btn-back:hover { border-color: rgba(255,255,255,0.2); }
    .btn-skip { background: transparent; color: var(--dim); border: 1px solid var(--border); font-size: 0.8rem; }

    /* 결과 */
    .result-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; flex-wrap: wrap; gap: 0.5rem; }
    .result-title { font-weight: 900; font-size: 1.1rem; }
    .result-count { font-size: 0.95rem; color: var(--dim); }
    .result-members { font-size: 0.9rem; color: var(--g); width: 100%; }

    .game-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 1.15rem 1.35rem; margin-bottom: 0.85rem; cursor: pointer; transition: all 0.2s; }
    .game-card:hover { border-color: rgba(255,255,255,0.18); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.3); }
    .game-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 0.75rem; }
    .game-name { font-weight: 900; font-size: 1rem; }
    .game-name-en { font-size: 0.88rem; color: var(--dim); margin-top: 0.1rem; }
    .game-score { color: var(--y); font-size: 0.95rem; white-space: nowrap; flex-shrink: 0; text-align: right; }
    .game-score small { display: block; font-size: 0.82rem; color: var(--dim); }
    .tags { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-top: 0.65rem; }
    .tag { background: var(--card2); border-radius: 50px; padding: 0.22rem 0.6rem; font-size: 0.85rem; color: var(--dim); }
    .tag.purple { background: rgba(204,68,255,0.12); color: var(--pp); }
    .tag.blue   { background: rgba(0,212,255,0.12);  color: var(--b); }
    .tag.green  { background: rgba(0,255,136,0.12);  color: var(--g); }
    .tag.yellow { background: rgba(255,215,0,0.12);  color: var(--y); }
    .tag.red    { background: rgba(255,68,102,0.12); color: #ff4466; }
    .game-desc { font-size: 0.95rem; color: var(--dim); margin-top: 0.6rem; line-height: 1.5; }

    /* 모달 */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.72); z-index: 200; backdrop-filter: blur(5px); align-items: center; justify-content: center; padding: 1rem; }
    .overlay.open { display: flex; }
    .modal { background: var(--card); border: 1px solid var(--border); border-radius: 20px; width: 100%; max-width: 540px; max-height: 88vh; overflow-y: auto; padding: 1.65rem; position: relative; }
    .modal-x { position: absolute; top: 1rem; right: 1rem; background: var(--card2); border: none; border-radius: 50%; width: 30px; height: 30px; color: var(--dim); cursor: pointer; font-size: 1rem; }
    .modal-name { font-size: 1.25rem; font-weight: 900; margin-bottom: 0.2rem; }
    .modal-en   { color: var(--dim); font-size: 0.95rem; margin-bottom: 1.1rem; }
    .modal-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1.25rem; }
    .msec { margin-bottom: 1.1rem; }
    .msec-title { font-size: 0.9rem; font-weight: 800; color: var(--pp); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 0.45rem; }
    .msec-title.blue { color: var(--b); }
    .msec-title.green { color: var(--g); }
    .msec-body { font-size: 0.88rem; color: var(--dim); line-height: 1.7; white-space: pre-line; }
    .tip-box { background: rgba(255,215,0,0.08); border: 1px solid rgba(255,215,0,0.2); border-radius: 8px; padding: 0.7rem 0.9rem; font-size: 0.86rem; color: var(--y); line-height: 1.6; }
    .material-box { background: rgba(0,212,255,0.07); border: 1px solid rgba(0,212,255,0.2); border-radius: 8px; padding: 0.6rem 0.9rem; font-size: 0.84rem; color: var(--b); margin-bottom: 1rem; }

    /* 후기 미리보기 (모달 내) */
    .review-preview { border-top: 1px solid var(--border); margin-top: 1rem; padding-top: 1rem; }
    .rp-item { display: flex; gap: 0.5rem; margin-bottom: 0.6rem; font-size: 0.95rem; }
    .rp-star { color: var(--y); flex-shrink:0; }
    .rp-text { color: var(--dim); }

    .empty { text-align: center; padding: 3.5rem 1rem; color: var(--dim); }
    .empty span { font-size: 2.8rem; display: block; margin-bottom: 0.9rem; }

    /* 로딩 */
    .page-loading { text-align: center; padding: 4rem 1rem; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .spinner { width:36px; height:36px; border:3px solid #222; border-top-color:var(--b); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 12px; }

    @media (max-width: 480px) {
      .choice-grid { grid-template-columns: 1fr; }
      .member-grid { grid-template-columns: repeat(3, 1fr); }
      .modal { padding: 1.25rem; border-radius: 16px; }
    }
  </style>
</head>
<body>

<header class="header">
  <div class="header-title">GAME RECOMMEND</div>
  <a href="index.html" class="header-back">🏠 홈</a>
</header>

<main class="main">

  <!-- 로딩 -->
  <div class="step active" id="s-loading">
    <div class="page-loading"><div class="spinner"></div><div style="color:var(--dim);font-size:0.85rem;">게임 데이터 로딩중...</div></div>
  </div>

  <!-- STEP 0: 오늘 멤버 -->
  <section class="step" id="s0">
    <div class="member-title">오늘 누가<br>왔어요? 👥</div>
    <div class="member-grid" id="member-grid">
      <div class="member-loading">방문자 로딩 중...</div>
    </div>
    <div class="btn-row">
      <button class="btn btn-skip" onclick="go('s1')">⏭ 건너뛰기</button>
      <button class="btn btn-go green" onclick="confirmMembers()">✅ 선택 완료</button>
    </div>
  </section>

  <!-- STEP 1: 모드 선택 -->
  <section class="step" id="s1">
    <div class="home-title">오늘 뭐 하고<br>놀 거야? 🎮</div>

    <!-- 선택된 멤버 표시 -->
    <div id="s1-members" style="margin-bottom:1rem;"></div>

    <div class="choice-grid">
      <div class="choice-card board" onclick="go('s-board')">
        <span class="choice-emoji">🎲</span>
        <div class="choice-title">보드게임</div>
        <div class="choice-desc">보유 게임 중에서<br>딱 맞는 거 추천!</div>
      </div>
      <div class="choice-card hand" onclick="go('s-hand')">
        <span class="choice-emoji">✋</span>
        <div class="choice-title">맨손 게임</div>
        <div class="choice-desc">도구 없이 바로<br>할 수 있는 게임!</div>
      </div>
    </div>
  </section>

  <!-- STEP 2: 보드게임 필터 -->
  <section class="step" id="s-board">
    <div class="filter-title"><span>🎲 보드게임</span> 추천 설정</div>

    <div class="filter-group">
      <label class="filter-label">👥 인원수</label>
      <div class="pills" id="fp-bg-players">
        <button class="pill" data-v="2" onclick="pick(this,'fp-bg-players')">2명</button>
        <button class="pill" data-v="3" onclick="pick(this,'fp-bg-players')">3명</button>
        <button class="pill" data-v="4" onclick="pick(this,'fp-bg-players')">4명</button>
        <button class="pill" data-v="5" onclick="pick(this,'fp-bg-players')">5명</button>
        <button class="pill" data-v="6" onclick="pick(this,'fp-bg-players')">6명</button>
        <button class="pill" data-v="99" onclick="pick(this,'fp-bg-players')">7명+</button>
      </div>
    </div>

    <div class="filter-group">
      <label class="filter-label">🕹 게임 종류 (복수 선택)</label>
      <div class="pills" id="fp-bg-cat">
        <button class="pill" onclick="tog(this)">전략</button>
        <button class="pill" onclick="tog(this)">카드</button>
        <button class="pill" onclick="tog(this)">파티</button>
        <button class="pill" onclick="tog(this)">협력</button>
        <button class="pill" onclick="tog(this)">추리</button>
        <button class="pill" onclick="tog(this)">경제</button>
        <button class="pill" onclick="tog(this)">주사위</button>
        <button class="pill" onclick="tog(this)">어린이</button>
      </div>
    </div>

    <div class="filter-group">
      <label class="filter-label">🧠 난이도</label>
      <div class="pills" id="fp-bg-diff">
        <button class="pill" data-v="1" onclick="pick(this,'fp-bg-diff')">쉬움만</button>
        <button class="pill" data-v="3" onclick="pick(this,'fp-bg-diff')">보통까지</button>
        <button class="pill" data-v="5" onclick="pick(this,'fp-bg-diff')">상관없음</button>
      </div>
    </div>

    <div class="filter-group">
      <label class="filter-label">⏱ 플레이 시간</label>
      <div class="pills" id="fp-bg-time">
        <button class="pill" data-v="20" onclick="pick(this,'fp-bg-time')">20분 이내</button>
        <button class="pill" data-v="30" onclick="pick(this,'fp-bg-time')">30분 이내</button>
        <button class="pill" data-v="60" onclick="pick(this,'fp-bg-time')">1시간 이내</button>
        <button class="pill" data-v="999" onclick="pick(this,'fp-bg-time')">상관없음</button>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-back" onclick="go('s1')">← 뒤로</button>
      <button class="btn btn-go" onclick="runBoard()">🎲 추천받기</button>
    </div>
  </section>

  <!-- STEP 3: 맨손 게임 필터 -->
  <section class="step" id="s-hand">
    <div class="filter-title blue"><span>✋ 맨손 게임</span> 추천 설정</div>

    <div class="filter-group">
      <label class="filter-label">👥 인원수</label>
      <div class="pills" id="fp-hg-players">
        <button class="pill" data-v="3" onclick="pick(this,'fp-hg-players')">3명</button>
        <button class="pill" data-v="4" onclick="pick(this,'fp-hg-players')">4명</button>
        <button class="pill" data-v="6" onclick="pick(this,'fp-hg-players')">6명</button>
        <button class="pill" data-v="10" onclick="pick(this,'fp-hg-players')">10명+</button>
      </div>
    </div>

    <div class="filter-group">
      <label class="filter-label">🎭 분위기 (복수 선택)</label>
      <div class="pills" id="fp-hg-cat">
        <button class="pill" onclick="tog(this)">시끌벅적</button>
        <button class="pill" onclick="tog(this)">조용</button>
        <button class="pill" onclick="tog(this)">신체</button>
        <button class="pill" onclick="tog(this)">언어</button>
        <button class="pill" onclick="tog(this)">추리</button>
        <button class="pill" onclick="tog(this)">창의</button>
        <button class="pill" onclick="tog(this)">두뇌</button>
      </div>
    </div>

    <div class="filter-group">
      <label class="filter-label">⏱ 플레이 시간</label>
      <div class="pills" id="fp-hg-time">
        <button class="pill" data-v="10" onclick="pick(this,'fp-hg-time')">10분 이내</button>
        <button class="pill" data-v="20" onclick="pick(this,'fp-hg-time')">20분 이내</button>
        <button class="pill" data-v="999" onclick="pick(this,'fp-hg-time')">상관없음</button>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-back" onclick="go('s1')">← 뒤로</button>
      <button class="btn btn-go blue" onclick="runHand()">✋ 추천받기</button>
    </div>
  </section>

  <!-- STEP 4: 결과 -->
  <section class="step" id="s-results">
    <div class="result-meta">
      <div class="result-title" id="r-title"></div>
      <div class="result-count" id="r-count"></div>
      <div class="result-members" id="r-members"></div>
    </div>
    <div id="r-list"></div>
    <div class="btn-row">
      <button class="btn btn-back" onclick="goBack()">← 다시 설정</button>
      <button class="btn btn-back" onclick="go('s0')">🏠 처음으로</button>
    </div>
  </section>

</main>

<!-- 모달 -->
<div class="overlay" id="overlay" onclick="mayClose(event)">
  <div class="modal" id="modal">
    <button class="modal-x" onclick="closeModal()">✕</button>
    <div class="modal-name" id="m-name"></div>
    <div class="modal-en"   id="m-en"></div>
    <div class="modal-tags" id="m-meta"></div>
    <div class="material-box" id="m-mat" style="display:none"></div>
    <div class="msec">
      <div class="msec-title">📋 게임 소개</div>
      <div class="msec-body" id="m-desc"></div>
    </div>
    <div class="msec">
      <div class="msec-title blue">📖 규칙</div>
      <div class="msec-body" id="m-rules"></div>
    </div>
    <div class="tip-box" id="m-tips" style="display:none"></div>
    <div class="review-preview" id="m-reviews" style="display:none">
      <div class="msec-title green">💬 후기</div>
      <div id="m-reviews-list"></div>
    </div>
  </div>
</div>

<script>
  /* ── 상태 ── */
  let _mode         = 'board';
  let _allBoard     = [];
  let _allHand      = [];
  let _allVisitors  = [];
  let _todayMembers = [];   // 선택된 방문자 id 목록
  let _reviewMap    = {};   // key: `${game_id}_${type}` → { avg, cnt, byVisitor:{vid: avg} }
  let _gameModal    = null; // 현재 모달 열린 게임

  /* ── 초기화 ── */
  async function initData() {
    try {
      const [bgRes, hgRes, vRes] = await Promise.all([
        getDB().from('board_games').select('*').eq('is_available', true).order('name'),
        getDB().from('hand_games').select('*').order('name'),
        getDB().from('visitors').select('*').order('name'),
      ]);
      _allBoard    = bgRes.data   || [];
      _allHand     = hgRes.data   || [];
      _allVisitors = vRes.data    || [];

      // 리뷰 집계
      const { data: rvData } = await getDB().from('game_reviews').select('game_id,game_type,visitor_id,rating');
      buildReviewMap(rvData || []);
    } catch(e) {
      console.warn('DB 로드 실패, 빈 데이터로 진행합니다:', e);
      _allBoard = []; _allHand = []; _allVisitors = [];
    } finally {
      renderMemberGrid();
      go('s0');
    }
  }

  function buildReviewMap(reviews) {
    _reviewMap = {};
    reviews.forEach(r => {
      const key = `${r.game_id}_${r.game_type}`;
      if (!_reviewMap[key]) _reviewMap[key] = { sum:0, cnt:0, byVisitor:{} };
      _reviewMap[key].sum += r.rating;
      _reviewMap[key].cnt += 1;
      const bv = _reviewMap[key].byVisitor;
      if (!bv[r.visitor_id]) bv[r.visitor_id] = { sum:0, cnt:0 };
      bv[r.visitor_id].sum += r.rating;
      bv[r.visitor_id].cnt += 1;
    });
    Object.keys(_reviewMap).forEach(k => {
      const rv = _reviewMap[k];
      rv.avg = rv.sum / rv.cnt;
      Object.keys(rv.byVisitor).forEach(vid => {
        const bv = rv.byVisitor[vid];
        bv.avg = bv.sum / bv.cnt;
      });
    });
  }

  /* ── 멤버 그리드 렌더 ── */
  function renderMemberGrid() {
    const grid = document.getElementById('member-grid');
    if (!_allVisitors.length) {
      grid.innerHTML = '<div class="member-loading">등록된 방문자가 없어요<br><span style="font-size:0.75rem;color:#444;">건너뛰기를 눌러 추천받아요</span></div>';
      return;
    }
    grid.innerHTML = _allVisitors.map(v => `
      <div class="member-card" id="mc-${v.id}" onclick="toggleMember(${v.id})">
        <span class="mc-avatar">${v.avatar || '🧑'}</span>
        <div class="mc-name">${esc(v.name)}</div>
        ${v.age ? `<div class="mc-age">${v.age}세</div>` : ''}
        <div class="mc-check" id="mcc-${v.id}"></div>
      </div>
    `).join('');
  }

  function toggleMember(id) {
    const idx = _todayMembers.indexOf(id);
    if (idx >= 0) {
      _todayMembers.splice(idx, 1);
      document.getElementById('mc-' + id).classList.remove('on');
      document.getElementById('mcc-' + id).textContent = '';
    } else {
      _todayMembers.push(id);
      document.getElementById('mc-' + id).classList.add('on');
      document.getElementById('mcc-' + id).textContent = '✅';
    }
  }

  function confirmMembers() { go('s1'); }

  /* ── 네비게이션 ── */
  function go(stepId) {
    document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
    document.getElementById(stepId).classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });

    if (stepId === 's1') {
      const chip = document.getElementById('s1-members');
      if (_todayMembers.length) {
        const names = _todayMembers.map(id => {
          const v = _allVisitors.find(x => x.id === id);
          return v ? `<span class="today-chip">${v.avatar||'🧑'} ${v.name}</span>` : '';
        }).join('');
        chip.innerHTML = `<div class="today-chips">${names}</div>`;
      } else {
        chip.innerHTML = '';
      }
    }
  }
  function goBack() { go(_mode === 'board' ? 's-board' : 's-hand'); }

  /* ── 필터 pill ── */
  function pick(el, groupId) {
    document.querySelectorAll('#' + groupId + ' .pill').forEach(p => p.classList.remove('on'));
    el.classList.add('on');
  }
  function tog(el) { el.classList.toggle('on'); }

  function getV(groupId) {
    const el = document.querySelector('#' + groupId + ' .pill.on');
    return el ? Number(el.dataset.v) : null;
  }
  function getCats(groupId) {
    return [...document.querySelectorAll('#' + groupId + ' .pill.on')].map(p => p.textContent);
  }

  /* ── 스마트 점수 계산 ── */
  function smartScore(g, type) {
    const key = `${g.id}_${type}`;
    const rv  = _reviewMap[key];

    // 기본 점수: 리뷰 평점 우선, 없으면 fun_score
    let base = rv ? rv.avg * 2 : (g.fun_score || 3) * 2;   // 0~10

    // 오늘 멤버 기반 부스트
    let myBoost = 0;
    let myPlayCount = 0;
    if (_todayMembers.length && rv) {
      _todayMembers.forEach(vid => {
        const bv = rv.byVisitor[vid];
        if (bv) { myBoost += bv.avg * 1.5; myPlayCount++; }
      });
      if (myPlayCount > 0) myBoost = myBoost / myPlayCount;
    }

    // 신선도 보너스: 오늘 멤버 중 아무도 안 해본 게임
    let newBonus = 0;
    if (_todayMembers.length && rv) {
      const anyPlayed = _todayMembers.some(vid => rv.byVisitor[vid]);
      if (!anyPlayed) newBonus = 2;
    } else if (_todayMembers.length && !rv) {
      newBonus = 1; // 리뷰 자체가 없으면 (전혀 안 해본 게임)
      newBonus = 2;
    }

    // 연령 적합도 보너스: 최연소 멤버 나이와 age_min 차이가 작을수록 높은 점수
    let ageBonus = 0;
    const youngest = getYoungestAge();
    if (youngest && g.age_min) {
      const gap = youngest - g.age_min;
      if (gap >= 0 && gap <= 3) ageBonus = 2;       // 딱 맞는 연령대
      else if (gap > 3 && gap <= 6) ageBonus = 1;   // 약간 쉬운 편
    }

    return base + myBoost + newBonus + ageBonus;
  }

  /* ── 배지 계산 ── */
  function getBadges(g, type) {
    const key = `${g.id}_${type}`;
    const rv  = _reviewMap[key];
    const badges = [];

    if (_todayMembers.length) {
      const anyPlayed = rv && _todayMembers.some(vid => rv.byVisitor[vid]);
      if (!anyPlayed) badges.push('<span class="tag green">🆕 NEW</span>');
    }

    if (rv && rv.avg >= 4.5 && rv.cnt >= 3) {
      badges.push('<span class="tag yellow">❤️ 인기</span>');
    }
    if (rv && rv.cnt > 0) {
      badges.push(`<span class="tag" style="color:var(--y);">⭐ ${rv.avg.toFixed(1)} (${rv.cnt}개)</span>`);
    }

    return badges.join('');
  }

  /* ── 선택 멤버 최소 연령 ── */
  function getYoungestAge() {
    if (!_todayMembers.length) return null;
    const ages = _todayMembers.map(id => {
      const v = _allVisitors.find(x => x.id === id);
      if (!v) return null;
      if (v.age) return Number(v.age);
      // age_group 기반 추정
      if (v.age_group === '10대 미만') return 7;
      if (v.age_group === '10대') return 12;
      if (v.age_group === '20대 이상') return 20;
      return null;
    }).filter(a => a !== null);
    return ages.length ? Math.min(...ages) : null;
  }

  /* ── 추천 실행 ── */
  function filterAndSort(games, filters, type) {
    const youngestAge = getYoungestAge();
    return games.filter(g => {
      if (type === 'board' && g.is_available === false) return false;
      if (filters.players) {
        if (g.min_players > filters.players || g.max_players < filters.players) return false;
      }
      if (type === 'board' && filters.difficulty) {
        if (g.difficulty > filters.difficulty) return false;
      }
      if (filters.categories && filters.categories.length > 0) {
        if (!filters.categories.some(c => (g.categories||[]).includes(c))) return false;
      }
      if (filters.maxTime) {
        if ((g.play_time_min||0) > filters.maxTime) return false;
      }
      // 연령대 필터: 최연소 멤버가 age_min 미만이면 제외
      if (youngestAge && g.age_min && youngestAge < g.age_min) return false;
      return true;
    }).sort((a, b) => smartScore(b, type) - smartScore(a, type));
  }

  function runBoard() {
    _mode = 'board';
    const filters = {
      players:    getV('fp-bg-players'),
      difficulty: getV('fp-bg-diff') || 5,
      maxTime:    getV('fp-bg-time') || 999,
      categories: getCats('fp-bg-cat'),
    };
    renderResults(filterAndSort(_allBoard, filters, 'board'), 'board');
    go('s-results');
  }

  function runHand() {
    _mode = 'hand';
    const filters = {
      players:    getV('fp-hg-players'),
      maxTime:    getV('fp-hg-time') || 999,
      categories: getCats('fp-hg-cat'),
    };
    renderResults(filterAndSort(_allHand, filters, 'hand'), 'hand');
    go('s-results');
  }

  /* ── 결과 렌더 ── */
  function renderResults(games, type) {
    const isBoard = type === 'board';
    document.getElementById('r-title').innerHTML = isBoard ? '🎲 추천 보드게임' : '✋ 추천 맨손 게임';
    document.getElementById('r-count').textContent = games.length ? `${games.length}개 게임` : '';

    if (_todayMembers.length) {
      const names = _todayMembers.map(id => {
        const v = _allVisitors.find(x => x.id === id);
        return v ? `${v.avatar||'🧑'} ${v.name}${v.age ? '('+v.age+'세)' : ''}` : '';
      }).filter(Boolean).join(' · ');
      const youngest = getYoungestAge();
      const ageNote = youngest ? ` · 🎂 ${youngest}세+ 적합 게임` : '';
      document.getElementById('r-members').textContent = `오늘 멤버: ${names}${ageNote}`;
    } else {
      document.getElementById('r-members').textContent = '';
    }

    if (!games.length) {
      document.getElementById('r-list').innerHTML =
        '<div class="empty"><span>🤔</span><p>조건에 맞는 게임이 없어요.<br>필터를 더 넓게 해보세요!</p></div>';
      return;
    }

    document.getElementById('r-list').innerHTML = games.map(g => {
      const badges = getBadges(g, type);
      const rv = _reviewMap[`${g.id}_${type}`];
      const stars = rv
        ? '★'.repeat(Math.round(rv.avg)) + '☆'.repeat(5 - Math.round(rv.avg))
        : '★'.repeat(g.fun_score||0) + '☆'.repeat(5 - (g.fun_score||0));
      const scoreLabel = rv ? `${rv.avg.toFixed(1)}점` : `fun ${g.fun_score||'-'}`;
      return `
        <div class="game-card" onclick="openModal('${type}',${g.id})">
          <div class="game-top">
            <div>
              <div class="game-name">${esc(g.name)}</div>
              ${g.name_en ? `<div class="game-name-en">${esc(g.name_en)}</div>` : ''}
            </div>
            <div class="game-score">${stars}<small>${scoreLabel}</small></div>
          </div>
          <div class="tags">
            <span class="tag purple">${g.min_players}${g.max_players >= 99 ? '+' : '-' + g.max_players}명</span>
            <span class="tag blue">${(g.play_time_min||0) < 60 ? (g.play_time_min||'?') + '분' : Math.floor(g.play_time_min/60) + '시간'}</span>
            ${isBoard && g.difficulty ? `<span class="tag">${['','쉬움','쉬움','보통','어려움','최상'][g.difficulty]}</span>` : ''}
            ${(g.categories||[]).map(c => `<span class="tag">${c}</span>`).join('')}
            ${badges}
          </div>
          ${g.description ? `<div class="game-desc">${esc(g.description)}</div>` : ''}
        </div>`;
    }).join('');
  }

  /* ── 모달 ── */
  async function openModal(type, id) {
    const list = type === 'board' ? _allBoard : _allHand;
    const g = list.find(x => x.id === id);
    if (!g) return;
    _gameModal = { g, type };

    document.getElementById('m-name').textContent  = g.name;
    document.getElementById('m-en').textContent    = g.name_en || '';
    const rv = _reviewMap[`${g.id}_${type}`];
    document.getElementById('m-meta').innerHTML = `
      <span class="tag purple">${g.min_players}${g.max_players>=99?'+':'-'+g.max_players}명</span>
      <span class="tag blue">${(g.play_time_min||0)<60?(g.play_time_min||'?')+'분':Math.floor(g.play_time_min/60)+'시간'}</span>
      ${rv ? `<span class="tag" style="color:var(--y);">⭐ ${rv.avg.toFixed(1)} (${rv.cnt}개 후기)</span>` : `<span class="tag">재미 ${'★'.repeat(g.fun_score||0)}</span>`}
    `;
    const mat = document.getElementById('m-mat');
    if (g.materials && g.materials !== '없음') { mat.textContent = '🎒 준비물: ' + g.materials; mat.style.display = 'block'; }
    else mat.style.display = 'none';
    document.getElementById('m-desc').textContent  = g.description || '';
    document.getElementById('m-rules').textContent = g.rules || '';
    const tip = document.getElementById('m-tips');
    if (g.tips) { tip.textContent = '💡 ' + g.tips; tip.style.display = 'block'; }
    else tip.style.display = 'none';

    // 후기 로드
    const rvSec = document.getElementById('m-reviews');
    const rvList = document.getElementById('m-reviews-list');
    const { data: reviews } = await getDB()
      .from('game_reviews').select('visitor_emoji,visitor_name,rating,comment')
      .eq('game_id', id).eq('game_type', type)
      .order('played_at', { ascending: false }).limit(5);
    if (reviews && reviews.length) {
      rvList.innerHTML = reviews.map(r => `
        <div class="rp-item">
          <span>${r.visitor_emoji||'🧑'}</span>
          <span class="rp-star">${'★'.repeat(r.rating)}</span>
          <span class="rp-text">${r.visitor_name} ${r.comment ? '— ' + esc(r.comment) : ''}</span>
        </div>
      `).join('');
      rvSec.style.display = 'block';
    } else {
      rvSec.style.display = 'none';
    }

    document.getElementById('overlay').classList.add('open');
  }

  function closeModal() { document.getElementById('overlay').classList.remove('open'); }
  function mayClose(e) { if (e.target === document.getElementById('overlay')) closeModal(); }
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  initData();
</script>
  <script src="./js/music-player.js"></script>
</body>
