<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>LaunchKit Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#6366f1;--primary-dark:#4f46e5;--primary-light:#e0e7ff;
  --secondary:#0ea5e9;--accent:#8b5cf6;--success:#10b981;--warn:#f59e0b;--danger:#ef4444;
  --border:#e2e8f0;--text:#1e293b;--text2:#475569;--text3:#94a3b8;
  --bg:#f8fafc;--card:#ffffff;
}
body{font-family:'Pretendard',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* AUTH GATE */
.auth-gate{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.auth-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;width:100%;max-width:420px;text-align:center}
.auth-box h1{font-size:22px;font-weight:900;margin-bottom:6px}
.auth-box h1 span{color:var(--primary)}
.auth-box p{font-size:13px;color:var(--text3);margin-bottom:24px}
.auth-input{width:100%;padding:12px 16px;border:1px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;margin-bottom:12px;transition:.2s}
.auth-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(99,102,241,.12)}
.auth-btn{width:100%;padding:12px;background:var(--primary);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s}
.auth-btn:hover{background:var(--primary-dark)}
.auth-btn:disabled{opacity:.5;cursor:not-allowed}
.auth-error{color:var(--danger);font-size:13px;margin-top:8px;display:none}

/* ADMIN PANEL */
.admin-panel{display:none}
.top-bar{background:var(--card);border-bottom:1px solid var(--border);padding:14px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.top-bar h1{font-size:18px;font-weight:900}
.top-bar h1 span{color:var(--primary)}
.admin-badge{background:var(--danger);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;margin-left:8px;vertical-align:middle}
.logout-btn{padding:7px 16px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;background:#fff;color:var(--text2);font-family:inherit;transition:.2s}
.logout-btn:hover{color:var(--danger);border-color:var(--danger)}

.main{max-width:1200px;margin:0 auto;padding:24px 32px}

/* TABS */
.tab-nav{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:24px;overflow-x:auto}
.tab-btn{padding:10px 18px;font-size:14px;font-weight:600;color:var(--text3);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:.2s;white-space:nowrap;font-family:inherit}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--primary);border-bottom-color:var(--primary)}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* STAT CARDS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px}
.stat-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.stat-value{font-size:28px;font-weight:900}
.stat-sub{font-size:11px;color:var(--text3);margin-top:4px}

/* PLAN BAR */
.plan-bar{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:24px}
.plan-bar-title{font-size:13px;font-weight:700;margin-bottom:10px}
.bar-wrap{height:28px;background:var(--bg);border-radius:8px;overflow:hidden;display:flex}
.bar-seg{height:100%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;transition:.5s}
.bar-free{background:#94a3b8}.bar-pro{background:var(--primary)}.bar-max{background:var(--accent)}
.bar-legend{display:flex;gap:20px;margin-top:10px;font-size:12px;color:var(--text2)}
.bar-legend span{display:flex;align-items:center;gap:5px}
.dot{width:10px;height:10px;border-radius:3px;display:inline-block}

/* CARD */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:20px}
.card-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:14px;font-weight:800}
.card-body{padding:20px}

/* TABLE */
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--bg);color:var(--text3);font-weight:600;text-align:left;padding:10px 14px;border-bottom:1px solid var(--border);white-space:nowrap;font-size:12px}
td{padding:10px 14px;border-bottom:1px solid rgba(0,0,0,.04);vertical-align:middle}
tr:hover td{background:rgba(99,102,241,.02)}
.table-wrap{overflow-x:auto}

/* BADGES */
.badge{padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;display:inline-block}
.badge-free{background:#f1f5f9;color:#64748b}
.badge-pro{background:var(--primary-light);color:var(--primary)}
.badge-pro_max{background:#f3e8ff;color:var(--accent)}
.badge-active{background:#dcfce7;color:#16a34a}
.badge-inactive{background:#fee2e2;color:#dc2626}
.badge-monthly{background:#dbeafe;color:#2563eb}
.badge-yearly{background:#fef3c7;color:#92400e}

/* BUTTONS */
.btn{padding:6px 14px;border-radius:8px;border:none;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;transition:.2s;display:inline-flex;align-items:center;gap:5px}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-dark)}
.btn-success{background:var(--success);color:#fff}
.btn-danger{background:rgba(239,68,68,.1);color:var(--danger);border:1px solid rgba(239,68,68,.2)}
.btn-danger:hover{background:rgba(239,68,68,.2)}
.btn-secondary{background:var(--bg);color:var(--text2);border:1px solid var(--border)}
.btn-secondary:hover{background:#fff}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* FORMS */
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px}
.form-input,.form-select{width:100%;padding:9px 13px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;transition:.2s}
.form-input:focus,.form-select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.form-row{display:flex;gap:12px}
.form-row>*{flex:1}

/* SEARCH BAR */
.search-bar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.search-bar .form-input{max-width:300px}
.search-bar .form-select{max-width:160px}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border-radius:16px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-header{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-header h3{font-size:16px;font-weight:800}
.modal-close{width:28px;height:28px;border:none;background:var(--bg);border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.modal-body{padding:24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:200;transform:translateY(80px);opacity:0;transition:.3s;box-shadow:0 8px 24px rgba(0,0,0,.15)}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{background:#dcfce7;color:#16a34a;border:1px solid #86efac}
.toast.error{background:#fee2e2;color:#dc2626;border:1px solid #fca5a5}

/* LOADING */
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-center{text-align:center;padding:40px;color:var(--text3)}

/* PLAN CARDS */
.plan-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:20px}
.plan-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:.2s}
.plan-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.06)}
.plan-card.inactive{opacity:.55}
.plan-card-head{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.plan-card-name{font-size:15px;font-weight:800;display:flex;align-items:center;gap:8px}
.plan-card-body{padding:16px 20px}
.plan-card-row{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;color:var(--text2)}
.plan-card-row b{color:var(--text);font-weight:700}
.plan-card-event{background:#fef3c7;border:1px solid #fde68a;border-radius:8px;padding:8px 12px;margin-top:10px;font-size:12px;color:#92400e}
.plan-card-foot{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.badge-regular{background:#e0e7ff;color:#4f46e5}
.badge-event{background:#fef3c7;color:#92400e}

/* TOGGLE SWITCH */
.toggle{position:relative;width:44px;height:24px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:#cbd5e1;border-radius:24px;cursor:pointer;transition:.25s}
.toggle-slider:before{content:'';position:absolute;width:18px;height:18px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.25s}
.toggle input:checked+.toggle-slider{background:var(--success)}
.toggle input:checked+.toggle-slider:before{transform:translateX(20px)}

/* MODAL DIVIDER */
.modal-divider{border:none;border-top:1px solid var(--border);margin:18px 0}

/* TOKEN LOG INLINE */
.token-log-inline{max-height:200px;overflow-y:auto;margin-top:12px;border:1px solid var(--border);border-radius:8px}
.token-log-inline table{font-size:12px}

@media(max-width:768px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .plan-grid{grid-template-columns:1fr}
  .main{padding:16px}
  .form-row{flex-direction:column}
}
</style>
</head>
<body>

<!-- AUTH GATE -->
<div class="auth-gate" id="auth-gate">
  <div class="auth-box">
    <h1>Launch<span>Kit</span> Admin</h1>
    <p>관리자 API Key를 입력하세요</p>
    <input type="password" class="auth-input" id="admin-key-input" placeholder="lk_admin_..." onkeydown="if(event.key==='Enter')doAdminLogin()">
    <button class="auth-btn" onclick="doAdminLogin()" id="login-btn">로그인</button>
    <div class="auth-error" id="auth-error"></div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div class="admin-panel" id="admin-panel">
  <div class="top-bar">
    <h1>Launch<span>Kit</span> Admin<span class="admin-badge">ADMIN</span></h1>
    <button class="logout-btn" onclick="doAdminLogout()">로그아웃</button>
  </div>

  <div class="main">
    <div class="tab-nav">
      <button class="tab-btn active" onclick="switchTab('dashboard')">대시보드</button>
      <button class="tab-btn" onclick="switchTab('users')">유저 관리</button>
      <button class="tab-btn" onclick="switchTab('subs')">구독 관리</button>
      <button class="tab-btn" onclick="switchTab('projects')">프로젝트 관리</button>
    </div>

    <!-- TAB: DASHBOARD -->
    <div class="tab-panel active" id="tab-dashboard">
      <div class="stats" id="dash-stats">
        <div class="stat-card"><div class="stat-label">전체 유저</div><div class="stat-value" id="ds-total">-</div></div>
        <div class="stat-card"><div class="stat-label">활성 유저</div><div class="stat-value" id="ds-active">-</div></div>
        <div class="stat-card"><div class="stat-label">전체 프로젝트</div><div class="stat-value" id="ds-projects">-</div></div>
        <div class="stat-card"><div class="stat-label">총 토큰 사용</div><div class="stat-value" id="ds-tokens">-</div></div>
      </div>
      <div class="plan-bar">
        <div class="plan-bar-title">플랜별 분포</div>
        <div class="bar-wrap" id="plan-bar"></div>
        <div class="bar-legend">
          <span><i class="dot" style="background:#94a3b8"></i> Free <b id="pb-free">0</b></span>
          <span><i class="dot" style="background:var(--primary)"></i> Pro <b id="pb-pro">0</b></span>
          <span><i class="dot" style="background:var(--accent)"></i> Pro Max <b id="pb-max">0</b></span>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
        <div class="card">
          <div class="card-header"><div class="card-title">최근 가입자</div></div>
          <div class="card-body" style="padding:0"><div class="table-wrap"><table id="recent-table"><thead><tr><th>이름</th><th>이메일</th><th>플랜</th><th>가입일</th></tr></thead><tbody></tbody></table></div></div>
        </div>
        <div class="card">
          <div class="card-header"><div class="card-title">토큰 사용 Top 10</div></div>
          <div class="card-body" style="padding:0"><div class="table-wrap"><table id="toptoken-table"><thead><tr><th>이름</th><th>이메일</th><th>사용량</th><th>플랜</th></tr></thead><tbody></tbody></table></div></div>
        </div>
      </div>
    </div>

    <!-- TAB: USERS -->
    <div class="tab-panel" id="tab-users">
      <div class="search-bar">
        <input class="form-input" id="user-search" placeholder="이름 또는 이메일 검색..." onkeydown="if(event.key==='Enter')loadUsers()">
        <select class="form-select" id="user-plan-filter" onchange="loadUsers()">
          <option value="">전체 플랜</option>
          <option value="free">Free</option>
          <option value="pro">Pro</option>
          <option value="pro_max">Pro Max</option>
        </select>
        <button class="btn btn-primary" onclick="loadUsers()">검색</button>
        <button class="btn btn-success" onclick="openCreateUser()" style="margin-left:auto">+ 유저 생성</button>
      </div>
      <div class="card">
        <div class="card-body" style="padding:0">
          <div class="table-wrap">
            <table><thead><tr>
              <th>이름</th><th>이메일</th><th>플랜</th><th>토큰</th><th>결제주기</th><th>할인</th><th>상태</th><th>가입일</th><th>작업</th>
            </tr></thead><tbody id="users-tbody"></tbody></table>
          </div>
        </div>
      </div>
    </div>

    <!-- TAB: SUBS (구독 상품 카탈로그) -->
    <div class="tab-panel" id="tab-subs">
      <div class="search-bar">
        <button class="btn btn-success" onclick="openCreatePlan()" style="margin-left:auto">+ 구독 상품 추가</button>
      </div>
      <div class="plan-grid" id="plan-grid">
        <div class="loading-center"><div class="spinner"></div></div>
      </div>
    </div>

    <!-- TAB: PROJECTS -->
    <div class="tab-panel" id="tab-projects">
      <div class="search-bar">
        <input class="form-input" id="proj-user-filter" placeholder="유저 이메일로 필터..." onkeydown="if(event.key==='Enter')loadProjects()">
        <button class="btn btn-primary" onclick="loadProjects()">검색</button>
        <button class="btn btn-secondary" onclick="document.getElementById('proj-user-filter').value='';loadProjects()">전체 보기</button>
      </div>
      <div class="card">
        <div class="card-body" style="padding:0">
          <div class="table-wrap">
            <table><thead><tr>
              <th>ID</th><th>제목</th><th>유저</th><th>상태</th><th>유형</th><th>토큰</th><th>생성일</th><th>작업</th>
            </tr></thead><tbody id="projects-tbody"></tbody></table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- EDIT USER MODAL -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <div class="modal-header">
      <h3>유저 정보 수정</h3>
      <button class="modal-close" onclick="closeModal('edit-modal')">&times;</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-uid">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">이름</label>
          <input class="form-input" id="edit-name">
        </div>
        <div class="form-group">
          <label class="form-label">이메일</label>
          <input class="form-input" id="edit-email">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">플랜</label>
          <select class="form-select" id="edit-plan">
            <option value="free">Free (100 토큰)</option>
            <option value="pro">Pro (500 토큰)</option>
            <option value="pro_max">Pro Max (2,500 토큰)</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">결제주기</label>
          <select class="form-select" id="edit-cycle">
            <option value="monthly">월간</option>
            <option value="yearly">연간</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">할인율 (%)</label>
          <input class="form-input" id="edit-discount" type="number" min="0" max="100" value="0">
        </div>
        <div class="form-group">
          <label class="form-label">구독 종료일</label>
          <input class="form-input" id="edit-sub-end" type="date">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">비밀번호 변경 (빈칸이면 유지)</label>
        <input class="form-input" id="edit-password" type="password" placeholder="새 비밀번호 입력">
      </div>
      <hr class="modal-divider">
      <div style="font-size:13px;font-weight:700;margin-bottom:10px">토큰 충전 / 차감</div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">수량</label>
          <input type="number" class="form-input" id="edit-token-delta" value="100">
        </div>
        <div class="form-group">
          <label class="form-label">메모</label>
          <input class="form-input" id="edit-token-memo" placeholder="사유 입력">
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:12px">
        <button class="btn btn-success btn-sm" onclick="adjustTokensFromEdit(1)">충전</button>
        <button class="btn btn-danger btn-sm" onclick="adjustTokensFromEdit(-1)">차감</button>
        <button class="btn btn-secondary btn-sm" onclick="toggleTokenLogs()" style="margin-left:auto">토큰 로그</button>
      </div>
      <div class="token-log-inline" id="edit-token-logs" style="display:none">
        <table><thead><tr><th>일시</th><th>액션</th><th>변동</th><th>메모</th></tr></thead><tbody id="edit-token-logs-tbody"></tbody></table>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('edit-modal')">취소</button>
      <button class="btn btn-primary" onclick="saveEditUser()">저장</button>
    </div>
  </div>
</div>

<!-- CREATE USER MODAL -->
<div class="modal-overlay" id="create-modal">
  <div class="modal">
    <div class="modal-header">
      <h3>유저 생성</h3>
      <button class="modal-close" onclick="closeModal('create-modal')">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">이름 *</label>
          <input class="form-input" id="create-name">
        </div>
        <div class="form-group">
          <label class="form-label">이메일 *</label>
          <input class="form-input" id="create-email" type="email">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">비밀번호 *</label>
        <input class="form-input" id="create-password" type="password">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">플랜</label>
          <select class="form-select" id="create-plan">
            <option value="free">Free (100 토큰)</option>
            <option value="pro">Pro (500 토큰)</option>
            <option value="pro_max">Pro Max (2,500 토큰)</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">결제주기</label>
          <select class="form-select" id="create-cycle">
            <option value="monthly">월간</option>
            <option value="yearly">연간</option>
          </select>
        </div>
      </div>

<div class="toast" id="toast"></div>

<script src="js/config.js"></script>
<script>
// ─── CONFIG ───────────────────────────────
let adminKey = sessionStorage.getItem('lk_admin_key') || '';

// ─── ADMIN API ────────────────────────────
async function adminCall(action, data = {}) {
  const res = await fetch(LK_CONFIG.WEBHOOK_BASE + LK_CONFIG.WEBHOOKS.ADMIN, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ admin_key: adminKey, action, ...data }),
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

// ─── AUTH ─────────────────────────────────
async function doAdminLogin() {
  const key = document.getElementById('admin-key-input').value.trim();
  if (!key) return;
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('auth-error');
  btn.disabled = true; btn.textContent = '확인 중...'; err.style.display = 'none';
  try {
    const r = await fetch(LK_CONFIG.WEBHOOK_BASE + LK_CONFIG.WEBHOOKS.ADMIN, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ admin_key: key, action: 'validate' }),
    });
    const d = await r.json();
    if (d.success) {
      adminKey = key;
      sessionStorage.setItem('lk_admin_key', key);
      document.getElementById('auth-gate').style.display = 'none';
      document.getElementById('admin-panel').style.display = 'block';
      loadDashboard();
    } else {
      err.textContent = d.message || '인증 실패'; err.style.display = 'block';
    }
  } catch (e) {
    err.textContent = '서버 연결 오류'; err.style.display = 'block';
  }
  btn.disabled = false; btn.textContent = '로그인';
}

function doAdminLogout() {
  sessionStorage.removeItem('lk_admin_key');
  adminKey = '';
  document.getElementById('admin-panel').style.display = 'none';
  document.getElementById('auth-gate').style.display = 'flex';
  document.getElementById('admin-key-input').value = '';
}

// Auto-login if key in session
if (adminKey) {
  document.getElementById('auth-gate').style.display = 'none';
  document.getElementById('admin-panel').style.display = 'block';
  loadDashboard();
}

// ─── TABS ─────────────────────────────────
function switchTab(id) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', b.textContent.includes(
      id === 'dashboard' ? '대시보드' : id === 'users' ? '유저' : id === 'subs' ? '구독' : '프로젝트'
    ));
  });
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  if (id === 'dashboard') loadDashboard();
  else if (id === 'users') loadUsers();
  else if (id === 'subs') loadPlans();
  else if (id === 'projects') loadProjects();
}

// ─── TOAST ────────────────────────────────
function toast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + type + ' show';
  setTimeout(() => t.classList.remove('show'), 3000);
}

function esc(s) { return String(s || '').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
function fmtDate(d) { return d ? new Date(d).toLocaleDateString('ko-KR') : '-'; }
function planBadge(p) { return '<span class="badge badge-' + p + '">' + ({free:'Free',pro:'Pro',pro_max:'Pro Max'}[p]||p) + '</span>'; }

// ─── DASHBOARD ────────────────────────────
async function loadDashboard() {
  try {
    const r = await adminCall('dashboard');
    if (!r.success) return;
    const s = r.stats;
    document.getElementById('ds-total').textContent = s.total;
    document.getElementById('ds-active').textContent = s.active;
    document.getElementById('ds-projects').textContent = s.totalProjects;
    document.getElementById('ds-tokens').textContent = (s.totalTokensUsed || 0).toLocaleString();

    // Plan bar
    const total = s.total || 1;
    const bp = s.byPlan;
    document.getElementById('plan-bar').innerHTML =
      '<div class="bar-seg bar-free" style="width:' + (bp.free/total*100) + '%">' + (bp.free||'') + '</div>' +
      '<div class="bar-seg bar-pro" style="width:' + (bp.pro/total*100) + '%">' + (bp.pro||'') + '</div>' +
      '<div class="bar-seg bar-max" style="width:' + (bp.pro_max/total*100) + '%">' + (bp.pro_max||'') + '</div>';
    document.getElementById('pb-free').textContent = bp.free;
    document.getElementById('pb-pro').textContent = bp.pro;
    document.getElementById('pb-max').textContent = bp.pro_max;

    // Recent signups
    document.querySelector('#recent-table tbody').innerHTML = (s.recent || []).map(u =>
      '<tr><td>' + esc(u.name) + '</td><td>' + esc(u.email) + '</td><td>' + planBadge(u.plan) + '</td><td>' + fmtDate(u.created_at) + '</td></tr>'
    ).join('') || '<tr><td colspan="4" style="text-align:center;color:var(--text3)">데이터 없음</td></tr>';

    // Top token
    document.querySelector('#toptoken-table tbody').innerHTML = (s.topToken || []).map(u =>
      '<tr><td>' + esc(u.name) + '</td><td>' + esc(u.email) + '</td><td><b>' + (u.tokens_used||0) + '</b></td><td>' + planBadge(u.plan) + '</td></tr>'
    ).join('') || '<tr><td colspan="4" style="text-align:center;color:var(--text3)">데이터 없음</td></tr>';
  } catch (e) { toast('대시보드 로드 실패', 'error'); }
}

// ─── USERS ────────────────────────────────
async function loadUsers() {
  const tbody = document.getElementById('users-tbody');
  tbody.innerHTML = '<tr><td colspan="9" class="loading-center"><div class="spinner"></div></td></tr>';
  try {
    const r = await adminCall('list_users', {
      search: document.getElementById('user-search').value.trim(),
      plan_filter: document.getElementById('user-plan-filter').value,
    });
    if (!r.success) { tbody.innerHTML = '<tr><td colspan="9">오류</td></tr>'; return; }
    tbody.innerHTML = r.users.map(u => {
      const remain = (u.tokens_total||0) - (u.tokens_used||0);
      return '<tr>' +
        '<td><b>' + esc(u.name) + '</b></td>' +
        '<td>' + esc(u.email) + '</td>' +
        '<td>' + planBadge(u.plan) + '</td>' +
        '<td>' + remain + ' / ' + (u.tokens_total||0) + '</td>' +
        '<td><span class="badge badge-' + (u.billing_cycle||'monthly') + '">' + (u.billing_cycle==='yearly'?'연간':'월간') + '</span></td>' +
        '<td>' + (u.discount_rate||0) + '%</td>' +
        '<td><span class="badge badge-' + (u.is_active?'active':'inactive') + '">' + (u.is_active?'활성':'비활성') + '</span></td>' +
        '<td>' + fmtDate(u.created_at) + '</td>' +
        '<td style="white-space:nowrap">' +
          '<button class="btn btn-sm btn-secondary" onclick="openEditUser(\'' + u.id + '\',\'' + esc(u.name) + '\',\'' + esc(u.email) + '\',\'' + u.plan + '\',\'' + (u.billing_cycle||'monthly') + '\',' + (u.discount_rate||0) + ',\'' + (u.subscription_end||'') + '\')">수정</button> ' +
          '<button class="btn btn-sm btn-' + (u.is_active?'danger':'success') + '" onclick="toggleUser(\'' + u.id + '\')">' + (u.is_active?'비활성화':'활성화') + '</button> ' +
          '<button class="btn btn-sm btn-danger" onclick="deleteUser(\'' + u.id + '\',\'' + esc(u.name) + '\')">삭제</button>' +
        '</td></tr>';
    }).join('') || '<tr><td colspan="9" style="text-align:center;color:var(--text3);padding:30px">유저 없음</td></tr>';
  } catch (e) { tbody.innerHTML = '<tr><td colspan="9">로드 실패</td></tr>'; }
}

function openEditUser(id, name, email, plan, cycle, discount, subEnd) {
  document.getElementById('edit-uid').value = id;
  document.getElementById('edit-name').value = name;
  document.getElementById('edit-email').value = email;
  document.getElementById('edit-plan').value = plan;
  document.getElementById('edit-cycle').value = cycle || 'monthly';
  document.getElementById('edit-discount').value = discount || 0;
  document.getElementById('edit-sub-end').value = subEnd ? subEnd.slice(0,10) : '';
  document.getElementById('edit-password').value = '';
  document.getElementById('edit-modal').classList.add('show');
}

async function saveEditUser() {
  try {
    const data = {
      user_id: document.getElementById('edit-uid').value,
      name: document.getElementById('edit-name').value,
      email: document.getElementById('edit-email').value,
      plan: document.getElementById('edit-plan').value,
      billing_cycle: document.getElementById('edit-cycle').value,
      discount_rate: document.getElementById('edit-discount').value,
    };
    const subEnd = document.getElementById('edit-sub-end').value;
    if (subEnd) data.subscription_end = subEnd + 'T23:59:59Z';
    const pw = document.getElementById('edit-password').value;
    if (pw) data.password = pw;
    const r = await adminCall('edit_user', data);
    toast(r.message || '저장됨'); closeModal('edit-modal'); loadUsers();
  } catch (e) { toast('저장 실패', 'error'); }
}

function openCreateUser() {
  document.getElementById('create-name').value = '';
  document.getElementById('create-email').value = '';
  document.getElementById('create-password').value = '';
  document.getElementById('create-plan').value = 'free';
  document.getElementById('create-cycle').value = 'monthly';
  document.getElementById('create-discount').value = 0;
  document.getElementById('create-modal').classList.add('show');
}

async function saveCreateUser() {
  const name = document.getElementById('create-name').value.trim();
  const email = document.getElementById('create-email').value.trim();
  const password = document.getElementById('create-password').value;
  if (!name || !email || !password) { toast('이름, 이메일, 비밀번호를 입력하세요', 'error'); return; }
  try {
    const r = await adminCall('create_user', {
      name, email, password,
      plan: document.getElementById('create-plan').value,
      billing_cycle: document.getElementById('create-cycle').value,
      discount_rate: document.getElementById('create-discount').value,
    });
    if (r.success) {
      toast(r.message || '유저 생성됨'); closeModal('create-modal'); loadUsers();
    } else {
      toast(r.message || '생성 실패', 'error');
    }
  } catch (e) { toast('생성 실패', 'error'); }
}

async function toggleUser(id) {
  try {
    const r = await adminCall('toggle_user', { user_id: id });
    toast(r.message || '변경됨'); loadUsers();
  } catch (e) { toast('실패', 'error'); }
}

async function deleteUser(id, name) {
  if (!confirm(name + ' 유저를 삭제하시겠습니까? 모든 프로젝트도 함께 삭제됩니다.')) return;
  try {
    const r = await adminCall('delete_user', { user_id: id });
    toast(r.message || '삭제됨'); loadUsers();
  } catch (e) { toast('삭제 실패', 'error'); }
}

function closeModal(id) { document.getElementById(id).classList.remove('show'); }

// ─── SUBSCRIPTION PRODUCTS (구독 상품) ────
async function loadPlans() {
  const grid = document.getElementById('plan-grid');
  grid.innerHTML = '<div class="loading-center"><div class="spinner"></div></div>';
  try {
    const r = await adminCall('list_plans');
    if (!r.success) { grid.innerHTML = '<div class="loading-center">로드 실패</div>'; return; }
    const plans = r.plans || [];
    if (!plans.length) { grid.innerHTML = '<div class="loading-center">등록된 구독 상품이 없습니다.</div>'; return; }
    grid.innerHTML = plans.map(p => {
      const isEvent = p.plan_type === 'event';
      const now = new Date();
      const expired = isEvent && p.event_end && new Date(p.event_end) < now;
      return '<div class="plan-card ' + (!p.is_active ? 'inactive' : '') + '">' +
        '<div class="plan-card-head">' +
          '<div class="plan-card-name"><span class="badge badge-' + p.plan_type + '">' + (isEvent ? '이벤트' : '정기') + '</span> ' + esc(p.name) + '</div>' +
          '<label class="toggle"><input type="checkbox" ' + (p.is_active ? 'checked' : '') + ' onchange="togglePlan(\'' + p.id + '\')"><span class="toggle-slider"></span></label>' +
        '</div>' +
        '<div class="plan-card-body">' +
          (p.description ? '<div style="font-size:12px;color:var(--text3);margin-bottom:8px">' + esc(p.description) + '</div>' : '') +
          '<div class="plan-card-row"><span>플랜 키</span><b>' + esc(p.plan_key) + '</b></div>' +
          '<div class="plan-card-row"><span>토큰</span><b>' + (p.tokens || 0).toLocaleString() + '</b></div>' +
          '<div class="plan-card-row"><span>월간</span><b>' + (p.price_monthly || 0).toLocaleString() + '원</b></div>' +
          '<div class="plan-card-row"><span>연간</span><b>' + (p.price_yearly || 0).toLocaleString() + '원</b></div>' +
          (p.discount_rate ? '<div class="plan-card-row"><span>할인율</span><b style="color:var(--danger)">' + p.discount_rate + '%</b></div>' : '') +
          (isEvent ? '<div class="plan-card-event">' + (expired ? '<b style="color:var(--danger)">[만료]</b> ' : '') + fmtDate(p.event_start) + ' ~ ' + fmtDate(p.event_end) + '</div>' : '') +
        '</div>' +
        '<div class="plan-card-foot">' +
          '<button class="btn btn-sm btn-secondary" onclick=\'copyPlan(' + JSON.stringify(p).replace(/'/g, "&#39;") + ')\'>복사</button>' +
          '<button class="btn btn-sm btn-secondary" onclick=\'openEditPlan(' + JSON.stringify(p).replace(/'/g, "&#39;") + ')\'>수정</button>' +
          '<button class="btn btn-sm btn-danger" onclick="deletePlan(\'' + p.id + '\',\'' + esc(p.name) + '\')">삭제</button>' +
        '</div>' +
      '</div>';
    }).join('');
  } catch (e) { grid.innerHTML = '<div class="loading-center">로드 실패</div>'; }
}

function toggleEventFields() {
  document.getElementById('event-fields').style.display =
    document.getElementById('plan-type').value === 'event' ? 'block' : 'none';
}

function openCreatePlan() {
  document.getElementById('plan-modal-title').textContent = '구독 상품 추가';
  document.getElementById('plan-id').value = '';
  document.getElementById('plan-name').value = '';
  document.getElementById('plan-key').value = '';
  document.getElementById('plan-type').value = 'regular';
  document.getElementById('plan-tokens').value = 0;
  document.getElementById('plan-price-m').value = 0;
  document.getElementById('plan-price-y').value = 0;
  document.getElementById('plan-desc').value = '';
  document.getElementById('plan-discount').value = 0;
  document.getElementById('plan-event-start').value = '';
  document.getElementById('plan-event-end').value = '';
  document.getElementById('event-fields').style.display = 'none';
  document.getElementById('plan-modal').classList.add('show');
}

function openEditPlan(p) {
  document.getElementById('plan-modal-title').textContent = '구독 상품 수정';
  document.getElementById('plan-id').value = p.id;
  document.getElementById('plan-name').value = p.name;
  document.getElementById('plan-key').value = p.plan_key;
  document.getElementById('plan-type').value = p.plan_type;
  document.getElementById('plan-tokens').value = p.tokens || 0;
  document.getElementById('plan-price-m').value = p.price_monthly || 0;
  document.getElementById('plan-price-y').value = p.price_yearly || 0;
  document.getElementById('plan-desc').value = p.description || '';
  document.getElementById('plan-discount').value = p.discount_rate || 0;
  document.getElementById('plan-event-start').value = p.event_start ? p.event_start.slice(0,10) : '';
  document.getElementById('plan-event-end').value = p.event_end ? p.event_end.slice(0,10) : '';
  document.getElementById('event-fields').style.display = p.plan_type === 'event' ? 'block' : 'none';
  document.getElementById('plan-modal').classList.add('show');
}

function copyPlan(p) {
  document.getElementById('plan-modal-title').textContent = '구독 상품 복사';
  document.getElementById('plan-id').value = '';
  document.getElementById('plan-name').value = p.name + ' (복사)';
  document.getElementById('plan-key').value = p.plan_key + '_copy';
  document.getElementById('plan-type').value = p.plan_type;
  document.getElementById('plan-tokens').value = p.tokens || 0;
  document.getElementById('plan-price-m').value = p.price_monthly || 0;
  document.getElementById('plan-price-y').value = p.price_yearly || 0;
  document.getElementById('plan-desc').value = p.description || '';
  document.getElementById('plan-discount').value = p.discount_rate || 0;
  document.getElementById('plan-event-start').value = p.event_start ? p.event_start.slice(0,10) : '';
  document.getElementById('plan-event-end').value = p.event_end ? p.event_end.slice(0,10) : '';
  document.getElementById('event-fields').style.display = p.plan_type === 'event' ? 'block' : 'none';
  document.getElementById('plan-modal').classList.add('show');
}

async function savePlan() {
  const id = document.getElementById('plan-id').value;
  const name = document.getElementById('plan-name').value.trim();
  const plan_key = document.getElementById('plan-key').value.trim();
  if (!name || !plan_key) { toast('상품명과 플랜 키를 입력하세요', 'error'); return; }
  const data = {
    name, plan_key,
    plan_type: document.getElementById('plan-type').value,
    tokens: document.getElementById('plan-tokens').value,
    price_monthly: document.getElementById('plan-price-m').value,
    price_yearly: document.getElementById('plan-price-y').value,
    description: document.getElementById('plan-desc').value,
    discount_rate: document.getElementById('plan-discount').value,
  };
  const evStart = document.getElementById('plan-event-start').value;
  const evEnd = document.getElementById('plan-event-end').value;
  if (evStart) data.event_start = evStart + 'T00:00:00Z';
  if (evEnd) data.event_end = evEnd + 'T23:59:59Z';
  try {
    let r;
    if (id) {
      data.plan_id = id;
      r = await adminCall('update_plan', data);
    } else {
      r = await adminCall('create_plan', data);
    }
    toast(r.message || '저장됨'); closeModal('plan-modal'); loadPlans();
  } catch (e) { toast('저장 실패', 'error'); }
}

async function togglePlan(id) {
  try {
    const r = await adminCall('toggle_plan', { plan_id: id });
    toast(r.message || '변경됨'); loadPlans();
  } catch (e) { toast('실패', 'error'); }
}

async function deletePlan(id, name) {
  if (!confirm('"' + name + '" 구독 상품을 삭제하시겠습니까?')) return;
  try {
    const r = await adminCall('delete_plan', { plan_id: id });
    toast(r.message || '삭제됨'); loadPlans();
  } catch (e) { toast('삭제 실패', 'error'); }
}

// ─── USER TOKEN MGMT (edit modal) ────────
async function adjustTokensFromEdit(dir) {
  const uid = document.getElementById('edit-uid').value;
  if (!uid) return;
  const delta = Math.abs(parseInt(document.getElementById('edit-token-delta').value) || 0) * dir;
  const memo = document.getElementById('edit-token-memo').value || (dir > 0 ? '관리자 충전' : '관리자 차감');
  if (!delta) return;
  try {
    const r = await adminCall('adjust_tokens', { user_id: uid, delta, memo });
    toast(r.message || '조정됨');
    document.getElementById('edit-token-delta').value = 100;
    document.getElementById('edit-token-memo').value = '';
    loadTokenLogsInline(uid);
  } catch (e) { toast('실패', 'error'); }
}

function toggleTokenLogs() {
  const el = document.getElementById('edit-token-logs');
  if (el.style.display === 'none') {
    el.style.display = 'block';
    loadTokenLogsInline(document.getElementById('edit-uid').value);
  } else {
    el.style.display = 'none';
  }
}

async function loadTokenLogsInline(userId) {
  const tbody = document.getElementById('edit-token-logs-tbody');
  tbody.innerHTML = '<tr><td colspan="4" class="loading-center"><div class="spinner"></div></td></tr>';
  try {
    const r = await adminCall('token_logs', { user_id: userId });
    tbody.innerHTML = (r.logs || []).map(l =>
      '<tr><td>' + fmtDate(l.created_at) + '</td><td>' + esc(l.action) + '</td><td style="color:' + (l.tokens_delta > 0 ? 'var(--success)' : 'var(--danger)') + ';font-weight:700">' + (l.tokens_delta > 0 ? '+' : '') + l.tokens_delta + '</td><td>' + esc(l.memo) + '</td></tr>'
    ).join('') || '<tr><td colspan="4" style="text-align:center;color:var(--text3);padding:12px">로그 없음</td></tr>';
  } catch (e) { tbody.innerHTML = '<tr><td colspan="4">로드 실패</td></tr>'; }
}

// ─── PROJECTS ─────────────────────────────
async function loadProjects() {
  const tbody = document.getElementById('projects-tbody');
  tbody.innerHTML = '<tr><td colspan="8" class="loading-center"><div class="spinner"></div></td></tr>';
  const email = document.getElementById('proj-user-filter').value.trim();
  try {
    // If email filter, first find user_id
    let data = {};
    if (email) {
      const u = await adminCall('list_users', { search: email });
      if (u.success && u.users.length) data.user_id = u.users[0].id;
      else { tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:30px;color:var(--text3)">유저를 찾을 수 없습니다</td></tr>'; return; }
    }
    const r = await adminCall('list_projects', data);
    if (!r.success) { tbody.innerHTML = '<tr><td colspan="8">오류</td></tr>'; return; }
    const STATUS = {interview:'인터뷰',confirming:'확인중',generating:'생성중',ir_done:'IR완료',complete:'완료'};
    tbody.innerHTML = r.projects.map(p => {
      const types = [];
      if (p.ir_type) types.push('IR(' + p.ir_type + ')');
      if (p.landing_type) types.push('Landing(' + p.landing_type + ')');
      return '<tr>' +
        '<td>' + p.id + '</td>' +
        '<td><b>' + esc(p.title) + '</b></td>' +
        '<td>' + esc(p.user_email) + '</td>' +
        '<td>' + (STATUS[p.status]||p.status) + '</td>' +
        '<td>' + (types.join(', ')||'-') + '</td>' +
        '<td>' + (p.tokens_used||0) + '</td>' +
        '<td>' + fmtDate(p.created_at) + '</td>' +
        '<td><button class="btn btn-sm btn-danger" onclick="deleteProject(' + p.id + ',\'' + esc(p.title) + '\')">삭제</button></td>' +
        '</tr>';
    }).join('') || '<tr><td colspan="8" style="text-align:center;color:var(--text3);padding:30px">프로젝트 없음</td></tr>';
  } catch (e) { tbody.innerHTML = '<tr><td colspan="8">로드 실패</td></tr>'; }
}

async function deleteProject(id, title) {
  if (!confirm('"' + title + '" 프로젝트를 삭제하시겠습니까?')) return;
  try {
    const r = await adminCall('delete_project', { project_id: id });
    toast(r.message || '삭제됨'); loadProjects();
  } catch (e) { toast('삭제 실패', 'error'); }
}
</script>
</body>
