<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LaunchKit - 로그인 / 회원가입</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#6366f1;--primary-dark:#4f46e5;--primary-light:#e0e7ff;
  --border:#e2e8f0;--text:#1e293b;--text2:#475569;--text3:#94a3b8;
  --bg:#f8fafc;--error:#ef4444;--success:#10b981;
}
body{font-family:'Pretendard',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
a{text-decoration:none;color:inherit}

.page-wrap{flex:1;display:grid;grid-template-columns:1fr 1fr;min-height:100vh}

/* LEFT PANEL */
.left-panel{
  background:linear-gradient(160deg,#4f46e5 0%,#7c3aed 100%);
  padding:48px;display:flex;flex-direction:column;justify-content:space-between;
  color:#fff;
}
.logo{font-size:24px;font-weight:900}
.logo span{opacity:.7}
.left-content{flex:1;display:flex;flex-direction:column;justify-content:center;padding:40px 0}
.left-content h2{font-size:36px;font-weight:900;line-height:1.3;margin-bottom:16px}
.left-content p{font-size:16px;opacity:.8;line-height:1.6;margin-bottom:40px}
.left-features{display:flex;flex-direction:column;gap:16px}
.left-feat{display:flex;align-items:center;gap:12px;font-size:15px}
.left-feat-icon{
  width:36px;height:36px;border-radius:8px;
  background:rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;
}
.left-bottom{font-size:13px;opacity:.5}

/* RIGHT PANEL */
.right-panel{
  background:#fff;padding:48px;
  display:flex;flex-direction:column;justify-content:center;
}
.right-inner{max-width:400px;margin:0 auto;width:100%}
.tabs{display:flex;gap:0;margin-bottom:32px;border:1px solid var(--border);border-radius:10px;overflow:hidden}
.tab{
  flex:1;padding:12px;text-align:center;
  font-size:15px;font-weight:700;cursor:pointer;
  background:#fff;color:var(--text3);border:none;transition:.2s;
}
.tab.active{background:var(--primary);color:#fff}
.form-group{margin-bottom:20px}
label{display:block;font-size:13px;font-weight:700;color:var(--text2);margin-bottom:7px}
input[type=text],input[type=email],input[type=password]{
  width:100%;padding:12px 14px;border:1.5px solid var(--border);
  border-radius:9px;font-size:15px;font-family:'Pretendard',sans-serif;
  color:var(--text);outline:none;transition:.2s;background:#fff;
}
input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.submit-btn{
  width:100%;padding:14px;background:var(--primary);color:#fff;
  border:none;border-radius:10px;font-size:16px;font-weight:700;
  cursor:pointer;transition:.2s;font-family:'Pretendard',sans-serif;
  margin-top:4px;
}
.submit-btn:hover{background:var(--primary-dark)}
.submit-btn:disabled{opacity:.6;cursor:not-allowed}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--text3);font-size:13px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.form-footer{text-align:center;font-size:13px;color:var(--text3);margin-top:20px}
.form-footer a{color:var(--primary);font-weight:700}
.msg{
  padding:12px 14px;border-radius:8px;font-size:14px;margin-bottom:16px;
  display:none;
}
.msg.error{background:#fef2f2;color:var(--error);border:1px solid #fecaca}
.msg.success{background:#f0fdf4;color:var(--success);border:1px solid #bbf7d0}
.plan-select{margin-bottom:20px}
.plan-chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.plan-chip{
  padding:6px 14px;border-radius:8px;font-size:13px;font-weight:600;
  cursor:pointer;border:1.5px solid var(--border);background:#fff;
  color:var(--text2);transition:.2s;
}
.plan-chip.selected{border-color:var(--primary);background:var(--primary-light);color:var(--primary)}
.token-badge{
  display:inline-flex;align-items:center;gap:4px;
  font-size:11px;color:var(--text3);font-weight:500;
}
@media(max-width:768px){
  .page-wrap{grid-template-columns:1fr}
  .left-panel{display:none}
  .right-panel{padding:32px 24px}
}
</style>
</head>
<body>
<div class="page-wrap">

  <!-- LEFT -->
  <div class="left-panel">
    <a href="index.html" class="logo">Launch<span>Kit</span></a>
    <div class="left-content">
      <h2>간편하게<br>사업자료 완성</h2>
      <p>복잡한 IR 사업계획서와 홈페이지,<br>이제 간단한 인터뷰만으로 만드세요.</p>
      <div class="left-features">
        <div class="left-feat">
          <div class="left-feat-icon">💬</div>
          <span>인터랙티브 인터뷰로 정보 수집</span>
        </div>
        <div class="left-feat">
          <div class="left-feat-icon">📄</div>
          <span>전문 IR 사업계획서 자동 생성</span>
        </div>
        <div class="left-feat">
          <div class="left-feat-icon">🌐</div>
          <span>랜딩페이지 HTML 자동 생성</span>
        </div>
        <div class="left-feat">
          <div class="left-feat-icon">📥</div>
          <span>PDF & HTML 다운로드</span>
        </div>
      </div>
    </div>
    <div class="left-bottom">© 2025 LaunchKit · 제이케이네트웍스</div>
  </div>

  <!-- RIGHT -->
  <div class="right-panel">
    <div class="right-inner">
      <div class="tabs">
        <button class="tab active" id="tab-login" onclick="switchTab('login')">로그인</button>
        <button class="tab" id="tab-signup" onclick="switchTab('signup')">회원가입</button>
      </div>

      <div id="msg" class="msg"></div>

      <!-- LOGIN FORM -->
      <form id="login-form" onsubmit="doLogin(event)">
        <div class="form-group">
          <label>이메일</label>
          <input type="email" id="login-email" placeholder="email@example.com" autocomplete="username" required>
        </div>
        <div class="form-group">
          <label>비밀번호</label>
          <input type="text" id="login-pw" placeholder="비밀번호 입력" autocomplete="new-password" style="-webkit-text-security:disc" required>
        </div>
        <button type="submit" class="submit-btn" id="login-btn">로그인</button>
        <div class="form-footer">
          계정이 없으신가요? <a href="#" onclick="switchTab('signup');return false">회원가입</a>
        </div>
      </form>

      <!-- SIGNUP FORM -->
      <form id="signup-form" style="display:none" onsubmit="doSignup(event)">
        <div class="form-group">
          <label>이름</label>
          <input type="text" id="signup-name" placeholder="홍길동" autocomplete="off" required>
        </div>
        <div class="form-group">
          <label>이메일</label>
          <input type="email" id="signup-email" placeholder="email@example.com" autocomplete="off" required>
        </div>
        <div class="form-group">
          <label>비밀번호 <span style="color:#94a3b8;font-weight:400">(8자 이상)</span></label>
          <input type="text" id="signup-pw" placeholder="비밀번호 입력" autocomplete="new-password" style="-webkit-text-security:disc" required minlength="8">
        </div>
        <div class="form-group">
          <label>비밀번호 확인</label>
          <input type="text" id="signup-pw2" placeholder="비밀번호 재입력" autocomplete="new-password" style="-webkit-text-security:disc" required>
        </div>

        <div class="plan-select">
          <label>시작 플랜 선택</label>
          <div class="plan-chips" id="plan-chips-wrap">
            <div class="plan-chip selected" data-plan="free" onclick="selectPlan(this)">무료</div>
          </div>
          <input type="hidden" id="signup-plan" value="free">
        </div>

        <button type="submit" class="submit-btn" id="signup-btn">회원가입</button>
        <div class="form-footer">
          이미 계정이 있으신가요? <a href="#" onclick="switchTab('login');return false">로그인</a>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="js/env.js"></script>
<script src="js/config.js"></script>
<script>
// 플랜 칩 동적 로드
(async function(){
  try {
    const plans = await lkFetchPlans();
    if (plans.length) {
      const wrap = document.getElementById('plan-chips-wrap');
      const urlP = new URLSearchParams(location.search).get('plan');
      const selected = urlP || 'free';
      wrap.innerHTML = plans.map(p => {
        const label = p.price_monthly ? `${p.name} <span class="token-badge">${p.tokens.toLocaleString()}토큰 · ${(p.price_monthly/10000).toFixed(0)}만원</span>` : `${p.name} <span class="token-badge">${p.tokens.toLocaleString()}토큰</span>`;
        return `<div class="plan-chip ${p.plan_key === selected ? 'selected' : ''}" data-plan="${p.plan_key}" onclick="selectPlan(this)">${label}</div>`;
      }).join('');
      document.getElementById('signup-plan').value = selected;
      if (urlP) switchTab('signup');
    }
  } catch(e) {}
})();

// URL 파라미터로 플랜 자동 선택 (fallback)
const urlPlan = new URLSearchParams(location.search).get('plan');
if (urlPlan) {
  document.querySelectorAll('.plan-chip').forEach(c => {
    c.classList.toggle('selected', c.dataset.plan === urlPlan);
  });
  document.getElementById('signup-plan').value = urlPlan;
  switchTab('signup');
}

function switchTab(tab) {
  document.getElementById('login-form').style.display  = tab === 'login'  ? '' : 'none';
  document.getElementById('signup-form').style.display = tab === 'signup' ? '' : 'none';
  document.getElementById('tab-login').classList.toggle('active',  tab === 'login');
  document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
  hideMsg();
}

function selectPlan(el) {
  document.querySelectorAll('.plan-chip').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('signup-plan').value = el.dataset.plan;
}

function showMsg(type, text) {
  const el = document.getElementById('msg');
  el.className = 'msg ' + type;
  el.textContent = text;
  el.style.display = 'block';
}
function hideMsg() {
  document.getElementById('msg').style.display = 'none';
}

async function doLogin(e) {
  e.preventDefault();
  hideMsg();
  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = '로그인 중...';

  try {
    const res = await fetch(LK_CONFIG.WEBHOOK_BASE + LK_CONFIG.WEBHOOKS.LOGIN, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email:    document.getElementById('login-email').value.trim(),
        password: document.getElementById('login-pw').value,
      })
    });
    const data = await res.json();
    if (data.success) {
      LK_Auth.setToken(data.session_token);
      LK_Auth.setUser(data.user);
      location.href = 'dashboard.html';
    } else {
      showMsg('error', data.message || '이메일 또는 비밀번호가 올바르지 않습니다.');
    }
  } catch (err) {
    showMsg('error', '서버 연결 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
  }
  btn.disabled = false; btn.textContent = '로그인';
}

async function doSignup(e) {
  e.preventDefault();
  hideMsg();
  const pw  = document.getElementById('signup-pw').value;
  const pw2 = document.getElementById('signup-pw2').value;
  if (pw !== pw2) { showMsg('error', '비밀번호가 일치하지 않습니다.'); return; }

  const btn = document.getElementById('signup-btn');
  btn.disabled = true; btn.textContent = '가입 중...';

  try {
    const res = await fetch(LK_CONFIG.WEBHOOK_BASE + LK_CONFIG.WEBHOOKS.REGISTER, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name:     document.getElementById('signup-name').value.trim(),
        email:    document.getElementById('signup-email').value.trim(),
        password: pw,
        plan:     document.getElementById('signup-plan').value,
      })
    });
    const data = await res.json();
    if (data.success) {
      LK_Auth.setToken(data.session_token);
      LK_Auth.setUser(data.user);
      location.href = 'dashboard.html';
    } else {
      showMsg('error', data.message || '회원가입에 실패했습니다.');
    }
  } catch (err) {
    showMsg('error', '서버 연결 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
  }
  btn.disabled = false; btn.textContent = '회원가입';
}

// 이미 로그인되어 있으면 대시보드로
if (LK_Auth.isLoggedIn()) location.href = 'dashboard.html';
</script>
</body>
</html>
