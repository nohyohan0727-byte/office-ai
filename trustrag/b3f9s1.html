<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrustRAG Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0f172a; --bg-card: #1e293b; --bg-input: #0f172a;
      --primary: #3b82f6; --primary-glow: rgba(59,130,246,0.3);
      --accent: #8b5cf6; --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
      --text-white: #f8fafc; --text-dim: #94a3b8; --border: rgba(255,255,255,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Pretendard', -apple-system, system-ui, sans-serif; background: var(--bg-dark); color: var(--text-white); min-height: 100vh; }

    .header { background: rgba(15,23,42,0.95); border-bottom: 1px solid var(--border); padding: 0 1.5rem; height: 56px; display: flex; align-items: center; justify-content: space-between; backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; }
    .header-left { display: flex; align-items: center; gap: 0.75rem; }
    .nav-btn { display: flex; align-items: center; gap: 0.4rem; color: var(--text-dim); text-decoration: none; font-size: 0.82rem; font-weight: 500; padding: 0.3rem 0.65rem; border-radius: 6px; border: 1px solid var(--border); transition: all 0.2s; }
    .nav-btn:hover { color: var(--text-white); border-color: rgba(255,255,255,0.2); }
    .header-title { font-size: 0.95rem; font-weight: 700; }
    .header-title span { color: var(--primary); }

    .main { max-width: 1100px; margin: 0 auto; padding: 1.75rem 1.5rem; }

    label { display: block; font-size: 0.78rem; font-weight: 600; color: var(--text-dim); margin-bottom: 0.35rem; text-transform: uppercase; letter-spacing: 0.05em; }
    input, select, textarea { width: 100%; background: var(--bg-input); border: 1px solid var(--border); border-radius: 8px; color: var(--text-white); font-family: inherit; padding: 0.55rem 0.85rem; font-size: 0.875rem; transition: border-color 0.2s; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-glow); }
    select option { background: #1e293b; }

    .btn { padding: 0.55rem 1.2rem; border-radius: 8px; border: none; cursor: pointer; font-family: inherit; font-size: 0.875rem; font-weight: 600; transition: all 0.2s; display: inline-flex; align-items: center; gap: 0.45rem; white-space: nowrap; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: #2563eb; box-shadow: 0 0 14px var(--primary-glow); }
    .btn-success { background: var(--success); color: white; }
    .btn-success:hover { background: #059669; }
    .btn-secondary { background: rgba(255,255,255,0.06); color: var(--text-dim); border: 1px solid var(--border); }
    .btn-secondary:hover { color: var(--text-white); background: rgba(255,255,255,0.1); }
    .btn-danger { background: rgba(239,68,68,0.15); color: #fca5a5; border: 1px solid rgba(239,68,68,0.3); }
    .btn-danger:hover { background: rgba(239,68,68,0.25); }
    .btn-sm { padding: 0.35rem 0.75rem; font-size: 0.78rem; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Auth bar */
    .auth-bar { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 1.1rem 1.4rem; display: flex; gap: 1rem; align-items: flex-end; margin-bottom: 1.5rem; }
    .auth-bar .field { flex: 1; }

    /* User strip */
    .user-strip { background: rgba(59,130,246,0.07); border: 1px solid rgba(59,130,246,0.18); border-radius: 10px; padding: 0.85rem 1.25rem; display: flex; align-items: center; gap: 1.25rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .user-strip-item { font-size: 0.83rem; color: var(--text-dim); }
    .user-strip-item strong { color: var(--text-white); margin-left: 0.3rem; }

    .role-badge { display: inline-block; padding: 0.15rem 0.65rem; border-radius: 20px; font-size: 0.72rem; font-weight: 700; }
    .rb-super_admin { background: rgba(239,68,68,0.2); color: #fca5a5; border: 1px solid rgba(239,68,68,0.3); }
    .rb-company_admin { background: rgba(139,92,246,0.2); color: #a78bfa; border: 1px solid rgba(139,92,246,0.3); }
    .rb-group_admin { background: rgba(59,130,246,0.2); color: #93c5fd; border: 1px solid rgba(59,130,246,0.3); }
    .rb-user { background: rgba(16,185,129,0.2); color: #6ee7b7; border: 1px solid rgba(16,185,129,0.3); }

    /* Tabs */
    .tab-nav { display: flex; gap: 0.25rem; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; overflow-x: auto; }
    .tab-btn { padding: 0.6rem 1.1rem; font-size: 0.85rem; font-weight: 600; color: var(--text-dim); border: none; background: none; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.2s; white-space: nowrap; font-family: inherit; }
    .tab-btn:hover { color: var(--text-white); }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Card */
    .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 1.25rem; }
    .card-header { padding: 0.9rem 1.25rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .card-header-left { display: flex; align-items: center; gap: 0.6rem; }
    .card-title { font-size: 0.9rem; font-weight: 700; }
    .card-body { padding: 1.25rem; display: flex; flex-direction: column; gap: 0.9rem; }
    .row { display: flex; gap: 0.75rem; }
    .row .field { flex: 1; }

    /* Grid */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }
    @media (max-width: 700px) { .grid-2 { grid-template-columns: 1fr; } }

    /* Table */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    th { background: rgba(255,255,255,0.04); color: var(--text-dim); font-weight: 600; text-align: left; padding: 0.6rem 0.9rem; border-bottom: 1px solid var(--border); white-space: nowrap; }
    td { padding: 0.6rem 0.9rem; border-bottom: 1px solid rgba(255,255,255,0.04); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    /* Result box */
    .result-box { background: #0a0f1a; border: 1px solid var(--border); border-radius: 8px; padding: 0.9rem 1rem; font-family: 'Consolas', monospace; font-size: 0.78rem; line-height: 1.6; color: #94a3b8; max-height: 280px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; }
    .result-box.success { border-color: rgba(16,185,129,0.3); color: #6ee7b7; }
    .result-box.error { border-color: rgba(239,68,68,0.3); color: #fca5a5; }

    .spinner { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
    .spinner.show { display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 0.7rem 1.1rem; font-size: 0.84rem; font-weight: 600; box-shadow: 0 8px 24px rgba(0,0,0,0.4); z-index: 999; transform: translateY(80px); opacity: 0; transition: all 0.3s; }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-color: rgba(16,185,129,0.5); color: #6ee7b7; }
    .toast.error { border-color: rgba(239,68,68,0.5); color: #fca5a5; }

    /* Access denied */
    .access-denied { text-align: center; padding: 3rem 2rem; color: var(--text-dim); }
    .access-denied .icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
    .access-denied p { font-size: 0.9rem; }

    .section-sep { font-size: 0.78rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; margin: 1.5rem 0 0.75rem; display: flex; align-items: center; gap: 0.5rem; }
    .section-sep::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* 권한 관리 레이아웃 */
    .perm-layout { display: grid; grid-template-columns: 280px 1fr; gap: 1.25rem; align-items: start; }
    @media (max-width: 700px) { .perm-layout { grid-template-columns: 1fr; } }
    .perm-left { height: fit-content; }
    .perm-user-list { max-height: 480px; overflow-y: auto; }
    .perm-user-row {
      padding: 0.7rem 1.1rem; cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      transition: background 0.15s;
    }
    .perm-user-row:hover { background: rgba(255,255,255,0.03); }
    .perm-user-row.selected { background: rgba(59,130,246,0.1); border-left: 3px solid var(--primary); }
    .perm-user-info { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.2rem; }
    .perm-user-name { font-size: 0.88rem; font-weight: 600; }
    .perm-user-email { font-size: 0.75rem; color: var(--text-dim); }

    /* 카테고리 권한 체크박스 */
    .perm-cat-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.7rem 0; border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .perm-cat-row:last-child { border-bottom: none; }
    .perm-cat-main { display: flex; align-items: center; gap: 0.6rem; cursor: pointer; }
    .perm-cat-main input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; accent-color: var(--primary); }
    .perm-cat-name { font-size: 0.875rem; font-weight: 500; }
    .perm-upload-label { display: flex; align-items: center; gap: 0.4rem; cursor: pointer; font-size: 0.8rem; color: var(--text-dim); }
    .perm-upload-label input[type="checkbox"] { width: 14px; height: 14px; cursor: pointer; accent-color: var(--success); }
    .perm-upload-disabled { opacity: 0.35; pointer-events: none; }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-left">
      <a href="/trustrag/chat.html" class="nav-btn">💬 Chat</a>
      <a href="/trustrag/upload.html" class="nav-btn">📤 Upload</a>
      <span class="header-title">Trust<span>RAG</span> <span style="color:var(--text-dim);font-weight:400">Admin</span></span>
    </div>
    <div style="display:flex;gap:0.5rem;align-items:center">
      <span class="role-badge" id="role-badge-header" style="display:none"></span>
    </div>
  </header>

  <main class="main">
    <!-- 인증 -->
    <div class="auth-bar">
      <div class="field">
        <label>관리자 API Key</label>
        <input type="password" id="api-key" placeholder="trust_..." autocomplete="off">
      </div>
      <button class="btn btn-primary" onclick="validateKey()">
        <span class="spinner" id="auth-spinner"></span>
        🔐 로그인
      </button>
    </div>

    <!-- 사용자 정보 -->
    <div class="user-strip" id="user-strip" style="display:none">
      <div class="user-strip-item">👤 <strong id="u-name">—</strong></div>
      <div class="user-strip-item">📧 <strong id="u-email">—</strong></div>
      <div class="user-strip-item">🏢 <strong id="u-company">—</strong></div>
      <div class="user-strip-item">🎭 역할 <span class="role-badge" id="u-role-badge">—</span></div>
      <div class="user-strip-item">🪙 토큰 <strong id="u-tokens">—</strong></div>
    </div>

    <!-- 탭 패널 -->
    <div id="admin-panel" style="display:none">
      <nav class="tab-nav" id="tab-nav">
        <!-- 탭은 역할에 따라 동적 생성 -->
      </nav>

      <!-- 회원 관리 탭 -->
      <div class="tab-panel" id="tab-members">
        <div id="member-content"></div>
      </div>

      <!-- 카테고리 관리 탭 -->
      <div class="tab-panel" id="tab-categories">
        <div id="cat-content"></div>
      </div>

      <!-- 권한 관리 탭 -->
      <div class="tab-panel" id="tab-perms">
        <div id="perm-content"></div>
      </div>

      <!-- 감사 로그 탭 -->
      <div class="tab-panel" id="tab-audit">
        <div class="card">
          <div class="card-header">
            <div class="card-header-left"><span>📋</span><span class="card-title">감사 로그</span></div>
            <div style="display:flex;gap:0.5rem;align-items:center">
              <input type="number" id="audit-limit" value="20" min="1" max="100" style="width:70px;padding:0.3rem 0.5rem;font-size:0.8rem">
              <button class="btn btn-secondary btn-sm" onclick="loadAuditLogs()">
                <span class="spinner" id="al-spinner"></span> 조회
              </button>
            </div>
          </div>
          <div class="card-body">
            <div class="table-wrap" id="audit-table">
              <div style="padding:1.5rem;text-align:center;color:var(--text-dim)">조회 버튼을 눌러주세요</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    const N8N = 'https://jknetworks.app.n8n.cloud/webhook';
    let authData = null;
    let userList = [];
    let categoryList = [];
    let companyList = []; // super_admin용 회사 목록

    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast ${type} show`;
      setTimeout(() => t.className = 'toast', 2800);
    }

    function spin(id, on) { document.getElementById(id).className = `spinner ${on ? 'show' : ''}`; }

    function getRoleBadgeHTML(role) {
      const cls = `role-badge rb-${role}`;
      const labels = { super_admin: '운영자', company_admin: '회사관리자', group_admin: '그룹관리자', user: '사용자' };
      return `<span class="${cls}">${labels[role] || role}</span>`;
    }

    function can(role, minRole) {
      const levels = { super_admin: 4, company_admin: 3, group_admin: 2, user: 1 };
      return (levels[role] || 0) >= (levels[minRole] || 0);
    }

    async function callAdmin(action, data) {
      const apiKey = document.getElementById('api-key').value.trim();
      const res = await fetch(`${N8N}/trustrag/admin`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ api_key: apiKey, action, data })
      });
      const text = await res.text();
      if (!text || !text.trim()) return { success: false, message: '서버 응답이 없습니다' };
      try { return JSON.parse(text); }
      catch(e) { return { success: false, message: '응답 파싱 오류: ' + text.substring(0, 100) }; }
    }

    async function validateKey() {
      const apiKey = document.getElementById('api-key').value.trim();
      if (!apiKey) { showToast('API 키를 입력하세요', 'error'); return; }
      spin('auth-spinner', true);
      try {
        const res = await fetch(`${N8N}/trustrag/validate-key`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ api_key: apiKey })
        });
        const data = await res.json();
        spin('auth-spinner', false);

        if (!data.success) { showToast(data.message || '인증 실패', 'error'); return; }

        authData = data;
        const role = data.role;

        // 헤더 배지
        const hb = document.getElementById('role-badge-header');
        hb.className = `role-badge rb-${role}`;
        hb.textContent = { super_admin: '운영자', company_admin: '회사관리자', group_admin: '그룹관리자', user: '사용자' }[role] || role;
        hb.style.display = 'inline-block';

        // 사용자 스트립
        document.getElementById('u-name').textContent = data.name || '—';
        document.getElementById('u-email').textContent = data.email || '—';
        document.getElementById('u-company').textContent = data.company || data.company_id?.substring(0, 8) + '...' || '—';
        document.getElementById('u-tokens').textContent = (data.tokens_remaining || 0).toLocaleString();
        const urb = document.getElementById('u-role-badge');
        urb.className = `role-badge rb-${role}`;
        urb.textContent = { super_admin: '운영자', company_admin: '회사관리자', group_admin: '그룹관리자', user: '사용자' }[role] || role;
        document.getElementById('user-strip').style.display = 'flex';

        // 역할에 따른 탭 구성
        buildTabs(role);
        document.getElementById('admin-panel').style.display = 'block';

        // super_admin이면 회사 목록 미리 로드
        if (role === 'super_admin') {
          const cData = await callAdmin('list_companies', {});
          companyList = cData?.result || [];
        } else {
          // 본인 회사만
          companyList = [{ id: authData.company_id, name: authData.company || '내 회사' }];
        }

        // 초기 데이터 로드
        loadMembers();

        showToast(`✅ ${data.name} 로그인됨`);
      } catch (e) {
        spin('auth-spinner', false);
        showToast('연결 오류', 'error');
      }
    }

    function buildTabs(role) {
      const tabNav = document.getElementById('tab-nav');
      tabNav.innerHTML = '';
      const tabs = [];

      // 회원관리: company_admin 이상
      if (can(role, 'company_admin')) tabs.push({ id: 'members', label: '👥 회원 관리' });
      // 카테고리: company_admin 이상
      if (can(role, 'company_admin')) tabs.push({ id: 'categories', label: '📂 카테고리 관리' });
      // 권한: group_admin 이상
      if (can(role, 'group_admin')) tabs.push({ id: 'perms', label: '🔑 권한 관리' });
      // 감사로그: company_admin 이상
      if (can(role, 'company_admin')) tabs.push({ id: 'audit', label: '📋 감사 로그' });

      if (tabs.length === 0) {
        document.getElementById('admin-panel').innerHTML = `
          <div class="access-denied">
            <div class="icon">🔒</div>
            <p>관리 권한이 없습니다.<br>그룹관리자 이상의 권한이 필요합니다.</p>
          </div>`;
        return;
      }

      tabs.forEach((t, i) => {
        const btn = document.createElement('button');
        btn.className = `tab-btn${i === 0 ? ' active' : ''}`;
        btn.textContent = t.label;
        btn.onclick = () => switchTab(t.id);
        tabNav.appendChild(btn);
      });

      // 첫 탭 활성화
      switchTab(tabs[0].id);
    }

    /* ==================== 회원 관리 ==================== */
    function buildMemberTab(role) {
      const el = document.getElementById('member-content');
      let html = '';

      const noCompany = role === 'super_admin' && companyList.length === 0;

      // 회사가 없을 때 최상단에 안내 배너 + 회사 등록 섹션 먼저 표시
      if (noCompany) {
        html += `
          <div style="background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.4);border-radius:10px;padding:1rem 1.25rem;margin-bottom:1.25rem;display:flex;align-items:flex-start;gap:0.75rem">
            <span style="font-size:1.3rem;line-height:1">🏢</span>
            <div>
              <div style="font-weight:700;color:#fbbf24;margin-bottom:0.25rem">등록된 회사가 없습니다</div>
              <div style="font-size:0.84rem;color:var(--text-dim)">회원을 등록하려면 먼저 회사를 생성해야 합니다. 아래 양식에서 회사를 등록하세요.</div>
            </div>
          </div>`;
        html += buildCompanySection([]);
        html += `
          <div class="card" style="margin-top:1.25rem">
            <div class="card-header">
              <div class="card-header-left"><span>👥</span><span class="card-title">회원 목록</span></div>
              <button class="btn btn-secondary btn-sm" onclick="loadMembers()">🔄 새로고침</button>
            </div>
            <div class="table-wrap" id="members-table">
              <div style="padding:2rem;text-align:center;color:var(--text-dim)">로딩 중...</div>
            </div>
          </div>`;
        el.innerHTML = html;
        return;
      }

      // 회원 목록 (전체 보기)
      html += `
        <div class="card">
          <div class="card-header">
            <div class="card-header-left"><span>👥</span><span class="card-title">회원 목록</span></div>
            <button class="btn btn-secondary btn-sm" onclick="loadMembers()">🔄 새로고침</button>
          </div>
          <div class="table-wrap" id="members-table">
            <div style="padding:2rem;text-align:center;color:var(--text-dim)">로딩 중...</div>
          </div>
        </div>`;

      // 회사 관리 (super_admin 전용)
      if (role === 'super_admin') {
        html += buildCompanySection(companyList);
      }

      // 회원 등록 (company_admin 이상)
      if (can(role, 'company_admin')) {
        html += buildMemberRegSection(role);
      }

      el.innerHTML = html;
    }

    function companyRowHtml(c) {
      return `
          <div style="display:flex;align-items:center;gap:0.75rem;padding:0.5rem 0;border-bottom:1px solid var(--border)">
            <span>🏢</span>
            <div style="flex:1">

    function fillTokenUserDropdown(users) {
      const sel = document.getElementById('token-user-id');
      if (!sel) return;
      sel.innerHTML = '<option value="">-- 회원 선택 --</option>';
      users.forEach(u => {
        const opt = document.createElement('option');
        opt.value = u.id;
        opt.textContent = `${u.name} (${u.email}) — ${(u.tokens_remaining ?? 0).toLocaleString()}토큰`;
        sel.appendChild(opt);
      });
      sel.disabled = false;
    }

    async function onTokenCompanyChange(companyId) {
      const sel = document.getElementById('token-user-id');
      if (!companyId) {
        if (sel) { sel.innerHTML = '<option value="">-- 회사를 먼저 선택하세요 --</option>'; sel.disabled = true; }
        return;
      }
      if (sel) { sel.innerHTML = '<option value="">로딩 중...</option>'; sel.disabled = true; }
      const data = await callAdmin('list_users', { company_id: companyId });
      const users = Array.isArray(data?.result) ? data.result : (data?.result ? [data.result] : []);
      fillTokenUserDropdown(users);
    }

    async function loadMembers() {
      if (!authData) return;
      const role = authData.role;
      buildMemberTab(role);

      try {
        const data = await callAdmin('list_users', {});
        userList = Array.isArray(data?.result) ? data.result : (data?.result ? [data.result] : []);

        // non-super_admin: 토큰 드롭다운 바로 채우기
        if (role !== 'super_admin') fillTokenUserDropdown(userList);

        const canManagePerms = can(authData.role, 'group_admin');
        const isSA = authData.role === 'super_admin';
        const tbody = userList.map(u => {
          const coName = companyList.find(c => c.id === u.company_id)?.name || u.company_id?.substring(0,8) || '—';
          return `
          <tr>
            <td>${u.name || '—'}</td>
            <td style="color:var(--text-dim);font-size:0.8rem">${u.email || '—'}</td>
            ${isSA ? `<td style="font-size:0.8rem;color:var(--text-dim)">${coName}</td>` : ''}
            <td>${getRoleBadgeHTML(u.role)}</td>
            <td style="font-weight:600">${(u.tokens_remaining ?? 0).toLocaleString()}</td>
            <td>${u.is_active ? '<span style="color:var(--success)">✅</span>' : '<span style="color:var(--danger)">❌</span>'}</td>
            <td style="font-size:0.75rem;color:var(--text-dim)">${u.created_at?.substring(0,10) || '—'}</td>
            ${canManagePerms ? `<td><button class="btn btn-secondary btn-sm" onclick="goToPermTab('${u.id}')">🔑 권한</button></td>` : ''}
          </tr>`;
        }).join('');

        document.getElementById('members-table').innerHTML = userList.length
          ? `<table><thead><tr><th>이름</th><th>이메일</th>${isSA ? '<th>회사</th>' : ''}<th>역할</th><th>토큰</th><th>상태</th><th>가입일</th>${canManagePerms ? '<th></th>' : ''}</tr></thead><tbody>${tbody}</tbody></table>`
          : `<div style="padding:2rem;text-align:center;color:var(--text-dim)">등록된 회원이 없습니다</div>`;
      } catch (e) {
        document.getElementById('members-table').innerHTML = `<div style="padding:1.5rem;color:var(--danger)">로드 실패</div>`;
      }
    }

    async function createUser() {
      const companyEl = document.getElementById('new-company-id');
      const companyId = companyEl ? companyEl.value : null;
      if (authData.role === 'super_admin' && !companyId) {
        showToast('회사를 선택하세요', 'error'); return;
      }
      spin('cu-spinner', true);
      try {
        const payload = {
          email: document.getElementById('new-email').value.trim(),
          name: document.getElementById('new-name').value.trim(),
          role: document.getElementById('new-role').value,
          tokens_remaining: parseInt(document.getElementById('new-tokens').value) || 1000
        };
        // super_admin: 선택된 회사 ID, company_admin 이하: 본인 회사 ID
        if (companyId) payload.company_id = companyId;
        else if (authData.company_id) payload.company_id = authData.company_id;
        const data = await callAdmin('create_user', payload);
        spin('cu-spinner', false);
        const ok = data?.success;
        const el = document.getElementById('cu-result');
        el.style.display = 'block';
        el.className = `result-box ${ok ? 'success' : 'error'}`;
        el.textContent = ok
          ? `✅ 회원 등록 완료\n이메일: ${data.result?.email}\nAPI 키: ${data.api_key || data.result?.api_key || '(확인 필요)'}`
          : (data?.message || '등록 실패');
        if (ok) { showToast('✅ 회원 등록 완료'); loadMembers(); }
        else showToast(data?.message || '등록 실패', 'error');
      } catch (e) {
        spin('cu-spinner', false);
        showToast('오류: ' + e.message, 'error');
      }
    }

    async function addTokens() {
      const userId = document.getElementById('token-user-id').value;
      const amount = parseInt(document.getElementById('token-amount').value) || 0;
      if (!userId) { showToast('회원을 선택하세요', 'error'); return; }
      spin('tk-spinner', true);
      try {
        // add_tokens action (n8n admin 워크플로우에 없으면 create_user로 토큰 업데이트)
        const data = await callAdmin('add_tokens', { user_id: userId, amount });
        spin('tk-spinner', false);
        const el = document.getElementById('tk-result');
        el.style.display = 'block';
        el.className = `result-box ${data?.success ? 'success' : 'error'}`;
        el.textContent = data?.success ? `✅ ${amount}토큰 추가 완료` : (data?.message || '처리 실패');
        if (data?.success) { showToast(`✅ ${amount}토큰 추가됨`); loadMembers(); }
        else showToast(data?.message || '실패', 'error');
      } catch (e) {
        spin('tk-spinner', false);
        showToast('오류', 'error');
      }
    }

    function onCompanyNameEnInput(value) {
      const slugEl = document.getElementById('co-slug');
      if (!slugEl || slugEl.dataset.manuallyEdited === 'true') return;
      // 영문명으로 슬러그 자동 생성
      const auto = value.toLowerCase()
        .replace(/[^a-z0-9\s-]/g, '')
        .trim()
        .replace(/\s+/g, '-')
        .replace(/-+/g, '-');
      slugEl.value = auto;
    }

    async function createCompany() {
      const nameEn = document.getElementById('co-name-en')?.value.trim();
      const nameKo = document.getElementById('co-name')?.value.trim();
      const slug = document.getElementById('co-slug')?.value.trim();
      const plan = document.getElementById('co-plan')?.value || 'starter';
      if (!nameEn) { showToast('영문명을 입력하세요', 'error'); return; }
      if (!slug) { showToast('슬러그를 입력하세요', 'error'); return; }
      if (!/^[a-z0-9][a-z0-9-]*[a-z0-9]$/.test(slug) && slug.length > 1) {
        showToast('슬러그는 소문자·숫자·하이픈만 사용 가능합니다', 'error'); return;
      }
      spin('co-spinner', true);
      try {
        // name: 한글명 (없으면 영문명 사용), name_en: 영문명
        const name = nameKo || nameEn;
        const data = await callAdmin('create_company', { name, name_en: nameEn, slug, plan });
        spin('co-spinner', false);
        const ok = data?.success;
        const el = document.getElementById('co-result');
        el.style.display = 'block';
        el.className = `result-box ${ok ? 'success' : 'error'}`;
        el.textContent = ok
          ? `✅ 회사 생성 완료\n영문명: ${nameEn}\n한글명: ${name}\n플랜: ${data.result?.plan}`
          : (data?.message || '생성 실패');
        if (ok) {
          showToast('✅ 회사 생성 완료');
          // companyList 갱신 후 탭 전체 재빌드 (no-company 배너 제거 포함)
          const cData = await callAdmin('list_companies', {});
          companyList = cData?.result || [];
          loadMembers();
        } else {
          showToast(data?.message || '실패', 'error');
        }
      } catch (e) {
        spin('co-spinner', false);
        showToast('오류: ' + e.message, 'error');
      }
    }

    async function refreshCompanyList() {
      const cData = await callAdmin('list_companies', {});
      companyList = cData?.result || [];
      const listBody = document.getElementById('company-list-body');
      if (!listBody) return;
      listBody.innerHTML = companyList.map(companyRowHtml).join('') || '<div style="color:var(--text-dim);font-size:0.875rem">등록된 회사 없음</div>';
      showToast('✅ 회사 목록 갱신됨');
    }

    /* ==================== 카테고리 관리 ==================== */
    let catCompanyId = null; // 선택된 회사 (super_admin용)

      const el = document.getElementById('cat-content');

          <label style="margin:0;white-space:nowrap">🏢 회사 선택</label>
          <select id="cat-company-id" onchange="onCatCompanyChange(this.value)" style="flex:1;max-width:320px">
            ${companyOptions}

        </div>` : ''}

        <div class="grid-2">

              <div class="field"><label>카테고리 이름</label><input type="text" id="cat-name" placeholder="KS인증"></div>
              <div class="field"><label>설명 (선택)</label><input type="text" id="cat-desc" placeholder="KS인증 관련 문서"></div>
              <button class="btn btn-success" onclick="createCategory()" style="width:100%">
                <span class="spinner" id="cc-spinner"></span> ✅ 카테고리 생성

          </div>

              <button class="btn btn-secondary btn-sm" onclick="loadCategoryList()">🔄 새로고침</button>

      const listEl = document.getElementById('cat-list');
      if (!listEl) return;
      listEl.innerHTML = '<div style="padding:1rem;text-align:center;color:var(--text-dim)">로딩 중...</div>';
      try {
        const data = await callAdmin('list_categories', { company_id: catCompanyId });
        const cats = Array.isArray(data?.result) ? data.result : [];
        listEl.innerHTML = cats.length
          ? cats.map(c => {
              const coName = companyList.find(co => co.id === c.company_id)?.name || '—';
              return `

                <div style="flex:1">
                  <div style="font-weight:600;font-size:0.875rem">${c.name}
                    <span style="font-size:0.72rem;font-weight:400;color:var(--text-dim);margin-left:0.4rem">🏢 ${coName}</span>
                  </div>
                </div>
                ${c.is_active !== false ? '<span style="font-size:0.72rem;color:var(--success)">✅ 활성</span>' : '<span style="font-size:0.72rem;color:var(--danger)">❌ 비활성</span>'}

          : '<div style="color:var(--text-dim);font-size:0.875rem">카테고리 없음</div>';

        listEl.innerHTML = '<div style="color:var(--danger);font-size:0.875rem">로드 실패</div>';

    async function createCategory() {
      if (!catCompanyId) { showToast('회사를 선택하세요', 'error'); return; }
      const catName = document.getElementById('cat-name').value.trim();
      if (!catName) { showToast('카테고리 이름을 입력하세요', 'error'); return; }
      spin('cc-spinner', true);
      try {
        const data = await callAdmin('create_category', {
          company_id: catCompanyId,
          name: catName,
          description: document.getElementById('cat-desc').value.trim()
        });
        spin('cc-spinner', false);
        const ok = data?.success;
        const el = document.getElementById('cc-result');
        el.style.display = 'block';
        el.className = `result-box ${ok ? 'success' : 'error'}`;
        el.textContent = ok
          ? `✅ 카테고리 생성 완료\n이름: ${data.result?.name || catName}`
          : (data?.message || '생성 실패');
        if (ok) {
          showToast('✅ 카테고리 생성 완료');
          document.getElementById('cat-name').value = '';
          document.getElementById('cat-desc').value = '';
          loadCategoryList();

          showToast(data?.message || '실패', 'error');

        showToast('오류', 'error');

      userId: null, userName: '', userCompanyId: null,
      categories: [],
      originalRole: null, currentRole: null,
      originalActive: null, currentActive: null,
      original: {}, current: {}
      // original/current: { [categoryId]: { access: bool, can_upload: bool } }
    };

    function goToPermTab(userId) {
      permState.userId = null; // 기존 선택 초기화 (race condition 방지)
      switchTab('perms');
      selectPermUser(userId);
    }

    let permCompanyFilter = null; // super_admin용 회사 필터

      const el = document.getElementById('perm-content');
      const isSuperAdmin = authData?.role === 'super_admin';

      // super_admin: 회사 필터 기본값 설정 (첫 진입 여부 추적)
      const wasFilterEmpty = !permCompanyFilter;

        permCompanyFilter = companyList[0].id;
      }

      // 현재 필터에 맞는 유저만 표시
      const visibleUsers = isSuperAdmin
        ? userList.filter(u => u.company_id === permCompanyFilter)
        : userList;

      const userRows = visibleUsers.map(u => {
        const coName = companyList.find(c => c.id === u.company_id)?.name || '';
        return `
        <div class="perm-user-row" id="perm-row-${u.id}" onclick="selectPermUser('${u.id}')">

          <div style="display:flex;justify-content:space-between;align-items:center;margin-top:0.15rem">
            <span class="perm-user-email">${u.email}</span>
            ${coName ? `<span style="font-size:0.7rem;color:var(--text-dim)">🏢 ${coName}</span>` : ''}
          </div>
        </div>`;
      }).join('') || '<div style="padding:1rem;color:var(--text-dim);font-size:0.85rem">회원 없음</div>';

      // super_admin: 회사 필터 드롭다운
      const companyFilter = isSuperAdmin ? `
        <div style="padding:0.75rem 1.1rem;border-bottom:1px solid var(--border)">
          <select id="perm-company-filter" onchange="onPermCompanyFilter(this.value)"
            style="width:100%;background:var(--bg-input);border:1px solid var(--border);border-radius:6px;color:var(--text-white);padding:0.4rem 0.65rem;font-size:0.82rem;font-family:inherit">
            ${companyList.map(c => `<option value="${c.id}" ${c.id === permCompanyFilter ? 'selected' : ''}>${c.name}</option>`).join('')}
          </select>
        </div>` : '';

      el.innerHTML = `
        <div class="perm-layout">
          <div class="card perm-left">
            <div class="card-header">
              <div class="card-header-left"><span>👥</span><span class="card-title">회원 선택</span></div>
            </div>
            ${companyFilter}
            <div class="perm-user-list" id="perm-user-list">${userRows}</div>
          </div>

          <div class="card perm-right">
            <div class="card-header">
              <div class="card-header-left">
                <span>🔑</span>
                <span class="card-title" id="perm-panel-title">회원을 선택하세요</span>
              </div>
              <div id="perm-save-area" style="display:none">
                <button class="btn btn-primary btn-sm" onclick="savePermissions()">
                  <span class="spinner" id="perm-save-spinner"></span> 💾 저장
                </button>
              </div>
            </div>
            <div id="perm-panel-body" class="card-body">
              <div style="padding:2rem;text-align:center;color:var(--text-dim)">
                <div style="font-size:2rem;margin-bottom:0.5rem">👈</div>
                왼쪽에서 회원을 선택하면<br>역할 및 카테고리 권한을 설정할 수 있습니다
              </div>
            </div>
            <div class="result-box" id="perm-result" style="display:none;margin:1rem 1.25rem"></div>
          </div>
        </div>`;

      // 이미 선택된 유저가 있으면 복원
      if (permState.userId && visibleUsers.find(u => u.id === permState.userId)) {
        selectPermUser(permState.userId);
      }

      // super_admin 최초 진입: 첫 회사의 유저를 자동 로드 (유저가 없을 경우)
      if (isSuperAdmin && wasFilterEmpty && permCompanyFilter && visibleUsers.length === 0) {
        onPermCompanyFilter(permCompanyFilter);
      }
    }

    async function onPermCompanyFilter(companyId) {
      permCompanyFilter = companyId;
      // 해당 회사 유저 로드 (userList에 없을 수 있으므로 새로 조회)
      const data = await callAdmin('list_users', { company_id: companyId });
      const newUsers = Array.isArray(data?.result) ? data.result : [];
      // userList에 병합 (중복 제거)
      newUsers.forEach(u => {
        if (!userList.find(x => x.id === u.id)) userList.push(u);
        else Object.assign(userList.find(x => x.id === u.id), u);
      });
      permState.userId = null; // 선택 초기화
      buildPermTab();
    }

    async function selectPermUser(userId) {
      const user = userList.find(u => u.id === userId);
      if (!user) return;

      permState.userId = userId;
      permState.userName = user.name || user.email;
      permState.userCompanyId = user.company_id || authData.company_id;
      permState.originalRole = user.role;
      permState.currentRole = user.role;
      permState.originalActive = user.is_active !== false;
      permState.currentActive = user.is_active !== false;

      // 유저 행 하이라이트
      document.querySelectorAll('.perm-user-row').forEach(r => r.classList.remove('selected'));
      const row = document.getElementById(`perm-row-${userId}`);
      if (row) row.classList.add('selected');

      // 제목 업데이트
      const title = document.getElementById('perm-panel-title');
      if (title) title.textContent = `${permState.userName} 권한 설정`;

      // 패널 로딩 상태
      const body = document.getElementById('perm-panel-body');
      if (body) body.innerHTML = '<div style="padding:1.5rem;text-align:center;color:var(--text-dim)">권한 조회 중...</div>';

      try {
        // 유저 회사의 카테고리 + 유저 현재 권한을 병렬 조회
        const [catData, permData] = await Promise.all([
          callAdmin('list_categories', { company_id: permState.userCompanyId }),
          callAdmin('get_user_permissions', { user_id: userId })
        ]);

        permState.categories = Array.isArray(catData?.result) ? catData.result : [];

        const perms = permData?.result || [];
        permState.original = {};
        permState.current = {};
        perms.forEach(p => {
          permState.original[p.category_id] = { access: true, can_upload: p.can_upload };
          permState.current[p.category_id] = { access: true, can_upload: p.can_upload };
        });

        renderPermCheckboxes();

        const saveArea = document.getElementById('perm-save-area');
        if (saveArea) saveArea.style.display = 'block';
        const result = document.getElementById('perm-result');
        if (result) result.style.display = 'none';
      } catch (e) {
        if (body) body.innerHTML = '<div style="padding:1.5rem;color:var(--danger)">권한 조회 실패</div>';
      }
    }

    function renderPermCheckboxes() {
      const cats = permState.categories;
      const body = document.getElementById('perm-panel-body');
      if (!body) return;

      // 역할 옵션: 현재 관리자가 부여할 수 있는 역할만 표시
      const adminRole = authData.role;
      const assignableRoles = [
        { value: 'user', label: '사용자' },
        { value: 'group_admin', label: '그룹관리자' },
        { value: 'company_admin', label: '회사관리자', onlyFor: 'super_admin' },
      ].filter(r => !r.onlyFor || adminRole === r.onlyFor);

      // 현재 유저의 역할이 부여 가능 목록에 없으면 역할 변경 불가 (강등 방지)
      const canChangeRole = assignableRoles.some(r => r.value === permState.currentRole);
      const roleLabels = { super_admin: '운영자', company_admin: '회사관리자', group_admin: '그룹관리자', user: '사용자' };
      const roleOptions = canChangeRole
        ? assignableRoles.map(r => `<option value="${r.value}" ${permState.currentRole === r.value ? 'selected' : ''}>${r.label}</option>`).join('')
        : `<option value="${permState.currentRole}" selected>${roleLabels[permState.currentRole] || permState.currentRole}</option>`;

      const catRows = cats.length
        ? cats.map(c => {
            const catId = c.id || c.category_id;
            const state = permState.current[catId] || { access: false, can_upload: false };
            return `
            <div class="perm-cat-row" id="perm-cat-${catId}">
              <label class="perm-cat-main">
                <input type="checkbox" class="perm-access-cb" data-cat="${catId}"
                  ${state.access ? 'checked' : ''} onchange="onPermAccessChange('${catId}', this.checked)">
                <span class="perm-cat-name">📂 ${c.name}</span>
              </label>
              <label class="perm-upload-label ${state.access ? '' : 'perm-upload-disabled'}" id="perm-upload-label-${catId}">
                <input type="checkbox" class="perm-upload-cb" data-cat="${catId}"
                  ${state.can_upload ? 'checked' : ''} ${state.access ? '' : 'disabled'}
                  onchange="onPermUploadChange('${catId}', this.checked)">
                <span>📤 업로드</span>
              </label>
            </div>`;
          }).join('')
        : '<div style="padding:0.75rem 0;color:var(--text-dim);font-size:0.875rem">이 회사에 등록된 카테고리가 없습니다</div>';

      body.innerHTML = `
        <div style="padding-bottom:1rem;margin-bottom:1rem;border-bottom:1px solid var(--border)">
          <div style="font-size:0.78rem;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.65rem">역할 및 계정 상태</div>
          <div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap">
            <div class="field" style="flex:1;min-width:160px;margin:0">
              <label>역할</label>
              <select id="perm-role-sel" onchange="permState.currentRole=this.value" ${canChangeRole ? '' : 'disabled title="현재 역할을 변경할 권한이 없습니다"'}>${roleOptions}</select>
              ${!canChangeRole ? `<div style="font-size:0.72rem;color:var(--warning);margin-top:0.25rem">⚠️ 상위 역할 — 변경 불가</div>` : ''}
            </div>
            <div style="display:flex;flex-direction:column;gap:0.25rem">
              <label>계정 상태</label>
              <label style="display:flex;align-items:center;gap:0.5rem;cursor:pointer;font-size:0.875rem;font-weight:500">
                <input type="checkbox" id="perm-active-cb"
                  ${permState.currentActive ? 'checked' : ''}
                  onchange="permState.currentActive=this.checked"
                  style="width:16px;height:16px;accent-color:var(--success)">
                활성 계정
              </label>
            </div>
          </div>
        </div>
        <div style="font-size:0.78rem;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.65rem">카테고리 접근 권한</div>
        ${catRows}`;
    }

    function onPermAccessChange(catId, checked) {
      if (!permState.current[catId]) permState.current[catId] = { access: false, can_upload: false };
      permState.current[catId].access = checked;
      if (!checked) {
        permState.current[catId].can_upload = false;
        const uploadCb = document.querySelector(`.perm-upload-cb[data-cat="${catId}"]`);
        if (uploadCb) { uploadCb.checked = false; uploadCb.disabled = true; }
        const uploadLabel = document.getElementById(`perm-upload-label-${catId}`);
        if (uploadLabel) uploadLabel.classList.add('perm-upload-disabled');
      } else {
        const uploadCb = document.querySelector(`.perm-upload-cb[data-cat="${catId}"]`);
        if (uploadCb) uploadCb.disabled = false;
        const uploadLabel = document.getElementById(`perm-upload-label-${catId}`);
        if (uploadLabel) uploadLabel.classList.remove('perm-upload-disabled');
      }
    }

    function onPermUploadChange(catId, checked) {
      if (!permState.current[catId]) permState.current[catId] = { access: false, can_upload: false };
      permState.current[catId].can_upload = checked;
    }

    async function savePermissions() {
      if (!permState.userId) return;
      spin('perm-save-spinner', true);

      const cats = permState.categories;
      const ops = [];

      cats.forEach(c => {
        const catId = c.id || c.category_id;
        const orig = permState.original[catId] || { access: false, can_upload: false };
        const curr = permState.current[catId] || { access: false, can_upload: false };

        if (!orig.access && curr.access) {
          // 새로 권한 부여
          ops.push({ type: 'grant', catId, can_upload: curr.can_upload });
        } else if (orig.access && !curr.access) {
          // 권한 제거
          ops.push({ type: 'revoke', catId });
        } else if (orig.access && curr.access && orig.can_upload !== curr.can_upload) {
          // 업로드 권한 변경 (재부여로 upsert)
          ops.push({ type: 'grant', catId, can_upload: curr.can_upload });
        }
      });

      // 역할/상태 변경 여부 확인
      const roleChanged = permState.currentRole !== permState.originalRole;
      const activeChanged = permState.currentActive !== permState.originalActive;

      if (ops.length === 0 && !roleChanged && !activeChanged) {
        spin('perm-save-spinner', false);
        showToast('변경 사항이 없습니다', '');
        return;
      }

      try {
        const allOps = [];

        // 역할 또는 상태 변경
        if (roleChanged || activeChanged) {
          const payload = { user_id: permState.userId };
          if (roleChanged) payload.role = permState.currentRole;
          if (activeChanged) payload.is_active = permState.currentActive;
          allOps.push(callAdmin('update_user', payload));
        }

        // 카테고리 권한 변경
        ops.forEach(op => {
          if (op.type === 'grant') {
            allOps.push(callAdmin('grant_permission', { user_id: permState.userId, category_id: op.catId, can_upload: op.can_upload }));
          } else {
            allOps.push(callAdmin('revoke_permission', { user_id: permState.userId, category_id: op.catId }));
          }
        });

        const results = await Promise.all(allOps);
        spin('perm-save-spinner', false);
        const failed = results.filter(r => !r?.success);
        const el = document.getElementById('perm-result');
        el.style.display = 'block';

        if (failed.length === 0) {
          el.className = 'result-box success';
          const msgs = [];
          if (roleChanged || activeChanged) msgs.push(`역할/상태 변경 완료`);
          if (ops.length > 0) msgs.push(`카테고리 권한 ${ops.length}건 저장`);
          el.textContent = '✅ ' + msgs.join(' · ');
          showToast('✅ 저장 완료');
          // 동기화
          permState.originalRole = permState.currentRole;
          permState.originalActive = permState.currentActive;
          permState.original = JSON.parse(JSON.stringify(permState.current));
          // userList 내 해당 유저 정보 갱신
          const u = userList.find(u => u.id === permState.userId);
          if (u) { u.role = permState.currentRole; u.is_active = permState.currentActive; }
        } else {
          el.className = 'result-box error';
          el.textContent = `⚠️ ${allOps.length - failed.length}건 성공, ${failed.length}건 실패`;
          showToast('일부 저장 실패', 'error');
        }
      } catch (e) {
        spin('perm-save-spinner', false);
        showToast('저장 오류', 'error');
      }
    }

    /* ==================== 감사 로그 ==================== */
    async function loadAuditLogs() {
      spin('al-spinner', true);
      try {
        const data = await callAdmin('get_audit_logs', { limit: parseInt(document.getElementById('audit-limit').value) || 20 });
        spin('al-spinner', false);
        const logs = Array.isArray(data?.result) ? data.result : (data?.result ? [data.result] : []);
        if (logs.length === 0) {
          document.getElementById('audit-table').innerHTML = '<div style="padding:2rem;text-align:center;color:var(--text-dim)">로그가 없습니다</div>';
          return;
        }
        const tbody = logs.map(l => `
          <tr>
            <td style="font-size:0.75rem;color:var(--text-dim)">${l.created_at?.substring(0,19).replace('T',' ') || '—'}</td>
            <td>${l.user_name || l.user_id?.substring(0,8) || '—'}</td>
            <td><span style="font-size:0.75rem;background:rgba(59,130,246,0.15);color:#93c5fd;padding:0.15rem 0.5rem;border-radius:4px">${l.action || '—'}</span></td>
            <td style="max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:0.8rem">${l.query_text || '—'}</td>
            <td style="font-size:0.75rem;color:var(--text-dim)">${l.session_id?.substring(0,12) || '—'}</td>
          </tr>`).join('');
        document.getElementById('audit-table').innerHTML = `<table><thead><tr><th>시간</th><th>회원</th><th>액션</th><th>내용</th><th>세션</th></tr></thead><tbody>${tbody}</tbody></table>`;
      } catch (e) {
        spin('al-spinner', false);
        document.getElementById('audit-table').innerHTML = `<div style="padding:1.5rem;color:var(--danger)">로드 실패</div>`;
      }
    }

    /* 탭 전환 시 컨텐츠 빌드 */
    function switchTab(id) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      const labels = { members: '👥 회원 관리', categories: '📂 카테고리 관리', perms: '🔑 권한 관리', audit: '📋 감사 로그' };
      document.querySelectorAll('.tab-btn').forEach(b => { if (b.textContent === labels[id]) b.classList.add('active'); });
      const panel = document.getElementById(`tab-${id}`);
      if (panel) panel.classList.add('active');

      if (id === 'members' && authData) loadMembers();
      if (id === 'categories' && authData) buildCategoryTab();
      if (id === 'perms' && authData) buildPermTab();
    }

    document.getElementById('api-key').addEventListener('keydown', e => { if (e.key === 'Enter') validateKey(); });
  </script>
</body>
</html>
