<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrustRAG Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0f172a;
      --bg-card: #1e293b;
      --bg-input: #0f172a;
      --primary: #3b82f6;
      --primary-glow: rgba(59,130,246,0.3);
      --accent: #8b5cf6;
      --success: #10b981;
      --danger: #ef4444;
      --text-white: #f8fafc;
      --text-dim: #94a3b8;
      --border: rgba(255,255,255,0.08);
      --msg-user: rgba(59,130,246,0.12);
      --msg-bot: rgba(255,255,255,0.04);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Pretendard', -apple-system, system-ui, sans-serif;
      background: var(--bg-dark);
      color: var(--text-white);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      background: rgba(15,23,42,0.95);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      height: 56px;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
      backdrop-filter: blur(10px);
    }
    .header-left { display: flex; align-items: center; gap: 0.75rem; }
    .nav-btn {
      display: flex; align-items: center; gap: 0.4rem;
      color: var(--text-dim); text-decoration: none;
      font-size: 0.82rem; font-weight: 500;
      padding: 0.3rem 0.65rem;
      border-radius: 6px; border: 1px solid var(--border);
      transition: all 0.2s;
    }
    .nav-btn:hover { color: var(--text-white); border-color: rgba(255,255,255,0.2); }
    .header-title { font-size: 0.95rem; font-weight: 700; }
    .header-title span { color: var(--primary); }

    /* Auth panel */
    .auth-panel {
      border-bottom: 1px solid var(--border);
      background: var(--bg-card);
      padding: 0.75rem 1.5rem;
      flex-shrink: 0;
    }
    .auth-inner {
      max-width: 680px;
      margin: 0 auto;
      display: flex; gap: 0.6rem; align-items: flex-end;
    }
    .auth-inner .field { flex: 1; }
    label {
      display: block; font-size: 0.7rem; font-weight: 600;
      color: var(--text-dim); margin-bottom: 0.25rem;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    input {
      width: 100%; background: var(--bg-input);
      border: 1px solid var(--border); border-radius: 7px;
      color: var(--text-white); font-family: inherit;
      padding: 0.45rem 0.75rem; font-size: 0.85rem;
      transition: border-color 0.2s;
    }
    input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 2px var(--primary-glow); }

    .btn {
      padding: 0.48rem 1rem; border-radius: 7px;
      border: none; cursor: pointer; font-family: inherit;
      font-size: 0.85rem; font-weight: 600;
      transition: all 0.2s; display: inline-flex;
      align-items: center; gap: 0.4rem; white-space: nowrap;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: #2563eb; box-shadow: 0 0 12px var(--primary-glow); }
    .btn-sm { padding: 0.38rem 0.8rem; font-size: 0.8rem; }
    .btn-ghost { background: transparent; color: var(--text-dim); border: 1px solid var(--border); }
    .btn-ghost:hover { color: var(--text-white); border-color: rgba(255,255,255,0.2); }

    /* Auth status */
    .auth-status {
      display: flex; align-items: center; gap: 0.4rem;
      font-size: 0.78rem; white-space: nowrap;
    }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #4b5563; flex-shrink: 0;
    }
    .status-dot.ok { background: var(--success); box-shadow: 0 0 5px rgba(16,185,129,0.5); }
    .status-dot.fail { background: var(--danger); }

    /* Token badge */
    .token-badge {
      display: flex; align-items: center; gap: 0.3rem;
      font-size: 0.75rem; color: var(--text-dim);
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 0.18rem 0.65rem;
    }
    .token-badge.low { color: var(--danger); border-color: rgba(239,68,68,0.3); }

    /* Category panel */
    .cat-panel {
      border-bottom: 1px solid var(--border);
      background: rgba(15,23,42,0.6);
      padding: 0.55rem 1.5rem;
      flex-shrink: 0;
      display: none;
    }
    .cat-panel.visible { display: block; }
    .cat-inner {
      max-width: 680px;
      margin: 0 auto;
      display: flex; align-items: center; gap: 0.6rem;
      flex-wrap: wrap;
    }
    .cat-label {
      font-size: 0.7rem; font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase; letter-spacing: 0.05em;
      white-space: nowrap;
    }
    .cat-list { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .cat-item {
      display: flex; align-items: center; gap: 0.35rem;
      cursor: pointer; user-select: none;
    }
    .cat-item input[type="checkbox"] {
      display: none;
    }
    .cat-chip {
      display: inline-flex; align-items: center; gap: 0.3rem;
      padding: 0.22rem 0.65rem;
      border-radius: 20px;
      font-size: 0.78rem; font-weight: 500;
      border: 1px solid var(--border);
      color: var(--text-dim);
      background: transparent;
      transition: all 0.15s;
      cursor: pointer;
    }
    .cat-item input:checked + .cat-chip {
      background: rgba(59,130,246,0.15);
      border-color: rgba(59,130,246,0.4);
      color: #93c5fd;
    }
    .cat-chip.all-chip {
      border-style: dashed;
    }
    .cat-item input:checked + .cat-chip.all-chip {
      background: rgba(16,185,129,0.12);
      border-color: rgba(16,185,129,0.4);
      color: #6ee7b7;
    }
    .cat-divider {
      width: 1px; height: 18px;
      background: var(--border);
      flex-shrink: 0;
    }

    /* Chat Area */
    .chat-wrap {
      flex: 1; overflow: hidden; display: flex; flex-direction: column;
    }
    .chat-area {
      flex: 1; overflow-y: auto; padding: 1.25rem 1.5rem;
      display: flex; flex-direction: column; gap: 1rem;
      max-width: 680px; width: 100%; margin: 0 auto;
    }
    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-track { background: transparent; }
    .chat-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    /* Messages */
    .msg { display: flex; gap: 0.65rem; }
    .msg.user { flex-direction: row-reverse; }

    .avatar {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem; flex-shrink: 0;
    }
    .avatar.bot { background: rgba(59,130,246,0.2); border: 1px solid rgba(59,130,246,0.3); }
    .avatar.user { background: rgba(139,92,246,0.2); border: 1px solid rgba(139,92,246,0.3); }

    .bubble {
      max-width: calc(100% - 90px);
      border-radius: 14px;
      padding: 0.8rem 1rem;
      line-height: 1.65;
      font-size: 0.875rem;
    }
    .msg.bot .bubble { background: var(--msg-bot); border: 1px solid var(--border); border-top-left-radius: 4px; }
    .msg.user .bubble { background: var(--msg-user); border: 1px solid rgba(59,130,246,0.2); border-top-right-radius: 4px; }
    .msg.error .bubble { background: rgba(239,68,68,0.08); border-color: rgba(239,68,68,0.25); color: #fca5a5; }

    /* Sources */
    .sources { margin-top: 0.6rem; display: flex; flex-wrap: wrap; gap: 0.35rem; }
    .source-tag {
      display: flex; align-items: center; gap: 0.3rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 0.2rem 0.55rem;
      font-size: 0.72rem; color: var(--text-dim);
    }
    .source-tag .sim { color: var(--primary); }
    .source-tag .cat-name { color: var(--accent); font-size: 0.68rem; }

    /* Typing */
    .typing { display: flex; align-items: center; gap: 0.3rem; padding: 0.8rem 1rem; }
    .typing span {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--text-dim);
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
      30% { transform: translateY(-4px); opacity: 1; }
    }

    /* Input Area */
    .input-area {
      border-top: 1px solid var(--border);
      background: rgba(15,23,42,0.98);
      padding: 0.85rem 1.5rem;
      flex-shrink: 0;
    }
    .input-row {
      max-width: 680px; margin: 0 auto;
      display: flex; gap: 0.6rem; align-items: flex-end;
    }
    .input-box { flex: 1; }
    textarea {
      width: 100%; background: var(--bg-card);
      border: 1px solid var(--border); border-radius: 10px;
      color: var(--text-white); font-family: inherit;
      padding: 0.7rem 0.9rem; font-size: 0.875rem;
      resize: none; line-height: 1.5;
      min-height: 44px; max-height: 140px;
      transition: border-color 0.2s; overflow-y: auto;
    }
    textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 2px var(--primary-glow); }
    textarea::placeholder { color: var(--text-dim); }
    .send-btn {
      width: 44px; height: 44px; border-radius: 10px;
      background: var(--primary); border: none;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 1rem; flex-shrink: 0; transition: all 0.2s;
    }
    .send-btn:hover { background: #2563eb; box-shadow: 0 0 12px var(--primary-glow); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Empty state */
    .empty-chat {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 2rem;
    }
    .empty-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
    .empty-title { font-size: 1.15rem; font-weight: 700; margin-bottom: 0.4rem; }
    .empty-sub { color: var(--text-dim); font-size: 0.875rem; line-height: 1.6; }

    .toast {
      position: fixed; bottom: 5rem; right: 1.5rem;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 10px; padding: 0.65rem 1rem;
      font-size: 0.83rem; font-weight: 600;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      z-index: 999; transform: translateY(60px); opacity: 0;
      transition: all 0.3s;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.error { border-color: rgba(239,68,68,0.4); color: #fca5a5; }
    .toast.success { border-color: rgba(16,185,129,0.4); color: #6ee7b7; }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <a href="/trustrag/upload.html" class="nav-btn">📤 Upload</a>
      <a href="/trustrag/b3f9s1.html" class="nav-btn">⚙️ Admin</a>
      <span class="header-title">Trust<span>RAG</span></span>
    </div>
    <div style="display:flex;align-items:center;gap:0.6rem">
      <div class="token-badge" id="token-display" style="display:none">
        🪙 <span id="token-count">—</span>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="clearChat()">🗑 초기화</button>
    </div>
  </header>

  <!-- Auth Panel -->
  <div class="auth-panel">
    <div class="auth-inner">
      <div class="field">
        <label>API Key</label>
        <input type="password" id="api-key" placeholder="trust_..." autocomplete="off">
      </div>
      <div style="display:flex;align-items:center;gap:0.5rem;padding-bottom:1px">
        <button class="btn btn-primary btn-sm" onclick="validateKey()">🔐 연결</button>
        <div class="auth-status">
          <div class="status-dot" id="status-dot"></div>
          <span id="status-text" style="color:var(--text-dim);font-size:0.75rem">미연결</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Category Panel (연결 후 표시) -->
  <div class="cat-panel" id="cat-panel">
    <div class="cat-inner">
      <span class="cat-label">검색 범위</span>
      <div class="cat-list" id="cat-list"></div>
    </div>
  </div>

  <!-- Chat -->
  <div class="chat-wrap">
    <div class="chat-area" id="chat-area">
      <div class="empty-chat" id="empty-chat">
        <div class="empty-icon">🤖</div>
        <div class="empty-title">TrustRAG 채팅</div>
        <div class="empty-sub">
          API 키를 입력하고 연결하면<br>
          내부 문서 기반 AI 답변을 받을 수 있습니다
        </div>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-row">
      <div class="input-box">
        <textarea id="msg-input"
          placeholder="질문을 입력하세요 (Enter: 전송, Shift+Enter: 줄바꿈)"
          rows="1" disabled></textarea>
      </div>
      <button class="send-btn" id="send-btn" onclick="sendMessage()" disabled>➤</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const N8N = 'https://jknetworks.app.n8n.cloud/webhook';
    let isAuthenticated = false;
    let isLoading = false;
    let sessionId = 'session-' + Date.now().toString(36);
    let allCategories = []; // { name, table_name, id }

    function showToast(msg, type = '') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast ${type} show`;
      setTimeout(() => t.className = 'toast', 2800);
    }

    function setAuthStatus(ok, label) {
      const dot = document.getElementById('status-dot');
      const text = document.getElementById('status-text');
      dot.className = `status-dot ${ok ? 'ok' : ok === false ? 'fail' : ''}`;
      text.textContent = label;
      text.style.color = ok ? 'var(--success)' : ok === false ? 'var(--danger)' : 'var(--text-dim)';
    }

    async function validateKey() {
      const apiKey = document.getElementById('api-key').value.trim();
      if (!apiKey) { showToast('API 키를 입력하세요', 'error'); return; }
      setAuthStatus(null, '확인 중...');
      try {
        const res = await fetch(`${N8N}/trustrag/validate-key`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ api_key: apiKey })
        });
        const data = await res.json();
        if (!data.success) {
          setAuthStatus(false, '인증 실패');
          showToast(data.message || '인증 실패', 'error');
          return;
        }

        isAuthenticated = true;
        setAuthStatus(true, data.name);
        allCategories = data.categories || [];

        // 토큰 표시
        const td = document.getElementById('token-display');
        td.style.display = 'flex';
        document.getElementById('token-count').textContent = (data.tokens_remaining || 0).toLocaleString();
        if ((data.tokens_remaining || 0) < 10) td.className = 'token-badge low';

        // 카테고리 체크박스 렌더링
        renderCategoryPanel(allCategories);

        document.getElementById('msg-input').disabled = false;
        document.getElementById('send-btn').disabled = false;
        showToast(`✅ ${data.name} 연결됨`, 'success');
        document.getElementById('msg-input').focus();
      } catch (e) {
        setAuthStatus(false, '연결 실패');
        showToast('연결 오류', 'error');
      }
    }

    function renderCategoryPanel(cats) {
      const panel = document.getElementById('cat-panel');
      const list = document.getElementById('cat-list');
      list.innerHTML = '';

      if (cats.length === 0) {
        panel.classList.add('visible');
        list.innerHTML = '<span style="color:var(--text-dim);font-size:0.78rem">접근 가능한 카테고리 없음</span>';
        return;
      }

      // 전체선택 칩
      const allItem = document.createElement('label');
      allItem.className = 'cat-item';
      allItem.innerHTML = `
        <input type="checkbox" id="cat-all" checked onchange="onAllToggle(this)">
        <span class="cat-chip all-chip">✓ 전체</span>`;
      list.appendChild(allItem);

      // 구분선
      const divider = document.createElement('div');
      divider.className = 'cat-divider';
      list.appendChild(divider);

      // 개별 카테고리 칩
      cats.forEach(cat => {
        const item = document.createElement('label');
        item.className = 'cat-item';
        item.innerHTML = `
          <input type="checkbox" class="cat-cb" value="${cat.table_name}" checked onchange="onCatToggle()">
          <span class="cat-chip">${cat.name}</span>`;
        list.appendChild(item);
      });

      panel.classList.add('visible');
    }

    function onAllToggle(checkbox) {
      const cbs = document.querySelectorAll('.cat-cb');
      cbs.forEach(cb => cb.checked = checkbox.checked);
    }

    function onCatToggle() {
      const cbs = document.querySelectorAll('.cat-cb');
      const allChecked = [...cbs].every(cb => cb.checked);
      const allCb = document.getElementById('cat-all');
      if (allCb) allCb.checked = allChecked;
    }

    // 선택된 카테고리 이름 배열 반환
    // 전체 선택 또는 전체 체크된 경우 [] (빈 배열 = 서버에서 전체 검색)
    function getSelectedCategories() {
      const allCb = document.getElementById('cat-all');
      if (allCb && allCb.checked) return [];

      const cbs = document.querySelectorAll('.cat-cb:checked');
      return [...cbs].map(cb => cb.value);
    }

    function addMessage(content, type = 'bot', sources = []) {
      const chatArea = document.getElementById('chat-area');
      const empty = document.getElementById('empty-chat');
      if (empty) empty.remove();

      const msg = document.createElement('div');
      msg.className = `msg ${type}`;

      const avatar = document.createElement('div');
      avatar.className = `avatar ${type === 'user' ? 'user' : 'bot'}`;
      avatar.textContent = type === 'user' ? '👤' : type === 'error' ? '⚠️' : '🤖';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';

      const text = document.createElement('div');
      text.style.whiteSpace = 'pre-wrap';
      text.textContent = content;
      bubble.appendChild(text);

      if (sources && sources.length > 0) {
        const srcDiv = document.createElement('div');
        srcDiv.className = 'sources';
        sources.forEach(s => {
          const tag = document.createElement('div');
          tag.className = 'source-tag';
          const simPct = Math.round((s.similarity || 0) * 100);
          const catPart = s.category_name ? `<span class="cat-name">[${s.category_name}]</span> ` : '';
          tag.innerHTML = `${getFileIcon(s.filename)}${catPart}${s.filename} <span class="sim">${simPct}%</span>`;
          srcDiv.appendChild(tag);
        });
        bubble.appendChild(srcDiv);
      }

      msg.appendChild(avatar);
      msg.appendChild(bubble);
      chatArea.appendChild(msg);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function addTyping() {
      const chatArea = document.getElementById('chat-area');
      const msg = document.createElement('div');
      msg.className = 'msg bot';
      msg.id = 'typing-indicator';
      msg.innerHTML = `<div class="avatar bot">🤖</div>
        <div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
      chatArea.appendChild(msg);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function removeTyping() {
      const t = document.getElementById('typing-indicator');
      if (t) t.remove();
    }

    function getFileIcon(filename) {
      if (!filename) return '📄';
      const ext = (filename.split('.').pop() || '').toLowerCase();
      const icons = { xlsx: '📊', xls: '📊', csv: '📊', docx: '📝', doc: '📝', pdf: '📕', pptx: '📊', ppt: '📊', hwp: '📝', hwpx: '📝', txt: '📄' };
      return icons[ext] || '📄';
    }

    async function sendMessage() {
      if (!isAuthenticated || isLoading) return;

      const input = document.getElementById('msg-input');
      const msg = input.value.trim();
      if (!msg) return;

      const categories = getSelectedCategories();
      if (allCategories.length > 0) {
        const checked = document.querySelectorAll('.cat-cb:checked');
        if (checked.length === 0) {
          showToast('검색할 카테고리를 하나 이상 선택하세요', 'error');
          return;
        }
      }

      const apiKey = document.getElementById('api-key').value.trim();
      input.value = '';
      input.style.height = 'auto';
      addMessage(msg, 'user');
      addTyping();
      isLoading = true;
      document.getElementById('send-btn').disabled = true;

      try {
        const res = await fetch(`${N8N}/trustrag/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ api_key: apiKey, session_id: sessionId, message: msg, categories })
        });
        const text = await res.text();
        removeTyping();

        if (!text || !text.trim()) {
          addMessage('서버 응답이 없습니다. 잠시 후 다시 시도하세요.', 'error');
          return;
        }

        const data = JSON.parse(text);
        if (!data.success) {
          addMessage(data.message || '오류가 발생했습니다', 'error');
          showToast(data.message || '오류', 'error');
        } else {
          addMessage(data.response || '(빈 응답)', 'bot', data.sources || []);
          if (data.tokens_remaining !== undefined) {
            document.getElementById('token-count').textContent = data.tokens_remaining.toLocaleString();
          }
        }
      } catch (e) {
        removeTyping();
        addMessage('네트워크 오류가 발생했습니다.', 'error');
        showToast('연결 오류', 'error');
      } finally {
        isLoading = false;
        document.getElementById('send-btn').disabled = false;
      }
    }

    function clearChat() {
      const chatArea = document.getElementById('chat-area');
      chatArea.innerHTML = `
        <div class="empty-chat" id="empty-chat">
          <div class="empty-icon">🤖</div>
          <div class="empty-title">TrustRAG 채팅</div>
          <div class="empty-sub">API 키를 입력하고 연결하면<br>내부 문서 기반 AI 답변을 받을 수 있습니다</div>
        </div>`;
      sessionId = 'session-' + Date.now().toString(36);
    }

    const textarea = document.getElementById('msg-input');
    textarea.addEventListener('input', () => {
      textarea.style.height = 'auto';
      textarea.style.height = Math.min(textarea.scrollHeight, 140) + 'px';
    });
    textarea.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
    document.getElementById('api-key').addEventListener('keydown', e => {
      if (e.key === 'Enter') validateKey();
    });
  </script>
</body>
</html>
