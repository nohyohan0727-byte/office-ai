<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrustRAG Upload</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0f172a; --bg-card: #1e293b; --bg-input: #0f172a;
      --primary: #3b82f6; --primary-glow: rgba(59,130,246,0.3);
      --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
      --text-white: #f8fafc; --text-dim: #94a3b8; --border: rgba(255,255,255,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Pretendard', -apple-system, system-ui, sans-serif; background: var(--bg-dark); color: var(--text-white); min-height: 100vh; display: flex; flex-direction: column; }

    .header { background: rgba(15,23,42,0.95); border-bottom: 1px solid var(--border); padding: 0 1.5rem; height: 56px; display: flex; align-items: center; justify-content: space-between; backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; }
    .header-left { display: flex; align-items: center; gap: 0.75rem; }
    .nav-btn { display: flex; align-items: center; gap: 0.4rem; color: var(--text-dim); text-decoration: none; font-size: 0.82rem; font-weight: 500; padding: 0.3rem 0.65rem; border-radius: 6px; border: 1px solid var(--border); transition: all 0.2s; }
    .nav-btn:hover { color: var(--text-white); border-color: rgba(255,255,255,0.2); }
    .header-title { font-size: 0.95rem; font-weight: 700; }
    .header-title span { color: var(--primary); }

    .main { max-width: 760px; margin: 0 auto; padding: 1.75rem 1.5rem; width: 100%; }

    label { display: block; font-size: 0.78rem; font-weight: 600; color: var(--text-dim); margin-bottom: 0.35rem; text-transform: uppercase; letter-spacing: 0.05em; }
    input, select { width: 100%; background: var(--bg-input); border: 1px solid var(--border); border-radius: 8px; color: var(--text-white); font-family: inherit; padding: 0.55rem 0.85rem; font-size: 0.875rem; transition: border-color 0.2s; }
    input:focus, select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-glow); }
    select option { background: #1e293b; }
    select:disabled { opacity: 0.5; }

    .btn { padding: 0.6rem 1.25rem; border-radius: 8px; border: none; cursor: pointer; font-family: inherit; font-size: 0.875rem; font-weight: 600; transition: all 0.2s; display: inline-flex; align-items: center; gap: 0.5rem; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: #2563eb; box-shadow: 0 0 16px var(--primary-glow); }
    .btn-secondary { background: rgba(255,255,255,0.06); color: var(--text-dim); border: 1px solid var(--border); }
    .btn-secondary:hover { color: var(--text-white); background: rgba(255,255,255,0.1); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 1.25rem; }
    .card-header { padding: 0.9rem 1.25rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 0.75rem; }
    .card-title { font-size: 0.9rem; font-weight: 700; }
    .card-body { padding: 1.25rem; display: flex; flex-direction: column; gap: 1rem; }

    /* Auth status */
    .auth-status { display: flex; align-items: center; gap: 0.4rem; font-size: 0.8rem; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #4b5563; flex-shrink: 0; }
    .status-dot.ok { background: var(--success); box-shadow: 0 0 5px rgba(16,185,129,0.5); }
    .status-dot.fail { background: var(--danger); }

    .row { display: flex; gap: 0.75rem; }
    .row .field { flex: 1; }

    /* Drop Zone */
    .drop-zone { border: 2px dashed var(--border); border-radius: 12px; padding: 2.5rem 2rem; text-align: center; cursor: pointer; transition: all 0.2s; position: relative; }
    .drop-zone:hover, .drop-zone.drag-over { border-color: var(--primary); background: rgba(59,130,246,0.05); }
    .drop-zone input[type="file"] { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
    .drop-icon { font-size: 2.2rem; margin-bottom: 0.6rem; }
    .drop-text { font-size: 0.95rem; font-weight: 600; margin-bottom: 0.35rem; }
    .drop-sub { font-size: 0.82rem; color: var(--text-dim); }

    /* File List */
    .file-list { display: flex; flex-direction: column; gap: 0.45rem; }
    .file-item { background: var(--bg-input); border: 1px solid var(--border); border-radius: 8px; padding: 0.7rem 1rem; display: flex; align-items: center; gap: 0.7rem; transition: border-color 0.2s; }
    .file-item.done { border-color: rgba(16,185,129,0.25); }
    .file-item.error { border-color: rgba(239,68,68,0.25); }
    .file-icon { font-size: 1.2rem; flex-shrink: 0; }
    .file-info { flex: 1; min-width: 0; }
    .file-name { font-size: 0.85rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-size { font-size: 0.73rem; color: var(--text-dim); margin-top: 0.1rem; }
    .file-status { font-size: 0.78rem; font-weight: 700; flex-shrink: 0; }
    .file-status.pending { color: var(--text-dim); }
    .file-status.uploading { color: var(--warning); }
    .file-status.done { color: var(--success); }
    .file-status.error { color: var(--danger); }

    .progress-bar { height: 3px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; margin-top: 0.35rem; }
    .progress-fill { height: 100%; background: var(--primary); border-radius: 2px; transition: width 0.3s; width: 0%; }
    .progress-fill.done { background: var(--success); }
    .progress-fill.error { background: var(--danger); }

    /* Summary */
    .upload-summary { display: flex; gap: 1rem; padding: 0.9rem 1.25rem; border-radius: 10px; font-size: 0.85rem; font-weight: 600; }
    .upload-summary.success { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.25); color: #6ee7b7; }
    .upload-summary.partial { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.25); color: #fcd34d; }
    .upload-summary.fail { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25); color: #fca5a5; }

    .empty-state { text-align: center; padding: 1.75rem; color: var(--text-dim); font-size: 0.875rem; }

    .spinner { width: 15px; height: 15px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
    .spinner.show { display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 0.7rem 1.1rem; font-size: 0.85rem; font-weight: 600; box-shadow: 0 8px 24px rgba(0,0,0,0.4); z-index: 999; transform: translateY(80px); opacity: 0; transition: all 0.3s; }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-color: rgba(16,185,129,0.5); color: #6ee7b7; }
    .toast.error { border-color: rgba(239,68,68,0.5); color: #fca5a5; }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-left">
      <a href="/trustrag/chat.html" class="nav-btn">💬 Chat</a>
      <a href="/trustrag/admin.html" class="nav-btn">⚙️ Admin</a>
      <span class="header-title">Trust<span>RAG</span> <span style="color:var(--text-dim);font-weight:400">Upload</span></span>
    </div>
  </header>

  <main class="main">
    <!-- 인증 -->
    <div class="card">
      <div class="card-header">
        <span>🔐</span>
        <span class="card-title">인증 & 카테고리 선택</span>
      </div>
      <div class="card-body">
        <div class="row">
          <div class="field">
            <label>API Key</label>
            <input type="password" id="api-key" placeholder="trust_..." autocomplete="off">
          </div>
          <div class="field">
            <label>업로드 카테고리</label>
            <select id="category-select" disabled>
              <option value="">-- 연결 후 선택 --</option>
            </select>
          </div>
          <div style="display:flex;flex-direction:column;justify-content:flex-end;gap:0.4rem">
            <button class="btn btn-primary" onclick="validateKey()" style="white-space:nowrap">
              <span class="spinner" id="auth-spinner"></span>
              🔐 연결
            </button>
            <div class="auth-status">
              <div class="status-dot" id="status-dot"></div>
              <span id="status-text" style="color:var(--text-dim)">미연결</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 파일 선택 -->
    <div class="card">
      <div class="card-header">
        <span>📤</span>
        <span class="card-title">파일 선택</span>
      </div>
      <div class="card-body">
        <div class="drop-zone" id="drop-zone">
          <input type="file" id="file-input" multiple
            accept=".pdf,.docx,.doc,.xlsx,.xls,.hwp,.hwpx,.txt,.csv,.pptx,.ppt">
          <div class="drop-icon">📁</div>
          <div class="drop-text">파일을 드래그하거나 클릭하여 선택</div>
          <div class="drop-sub">PDF, DOCX, XLSX, HWP, TXT, CSV 등 · 파일당 최대 50MB</div>
        </div>

        <div id="file-list" class="file-list">
          <div class="empty-state">선택된 파일이 없습니다</div>
        </div>

        <div style="display:flex;gap:0.75rem;justify-content:flex-end;align-items:center">
          <button class="btn btn-secondary" onclick="clearFiles()">🗑 초기화</button>
          <button class="btn btn-primary" id="upload-btn" onclick="uploadAll()" disabled>
            <span class="spinner" id="up-spinner"></span>
            📤 전체 업로드
          </button>
        </div>
      </div>
    </div>

    <!-- 결과 요약 -->
    <div id="summary-area" style="display:none"></div>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    const N8N = 'https://jknetworks.app.n8n.cloud/webhook';
    let selectedFiles = [];
    let isUploading = false;
    let categoryMap = {}; // name → table_name

    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast ${type} show`;
      setTimeout(() => t.className = 'toast', 2800);
    }

    async function validateKey() {
      const apiKey = document.getElementById('api-key').value.trim();
      if (!apiKey) { showToast('API 키를 입력하세요', 'error'); return; }
      document.getElementById('auth-spinner').className = 'spinner show';
      try {
        const res = await fetch(`${N8N}/trustrag/validate-key`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ api_key: apiKey })
        });
        const data = await res.json();
        document.getElementById('auth-spinner').className = 'spinner';

        if (!data.success) {
          document.getElementById('status-dot').className = 'status-dot fail';
          document.getElementById('status-text').textContent = '인증 실패';
          showToast(data.message || '인증 실패', 'error'); return;
        }

        document.getElementById('status-dot').className = 'status-dot ok';
        document.getElementById('status-text').textContent = data.name;

        // 업로드 가능한 카테고리만 필터
        const sel = document.getElementById('category-select');
        sel.innerHTML = '';
        categoryMap = {};
        const cats = (data.categories || []).filter(c => c.can_upload !== false);
        if (cats.length === 0) {
          sel.innerHTML = '<option value="">업로드 가능한 카테고리 없음</option>';
        } else {
          cats.forEach((c, i) => {
            categoryMap[c.name] = c.table_name;
            const opt = document.createElement('option');
            opt.value = c.name;
            opt.textContent = c.name;
            if (i === 0) opt.selected = true;
            sel.appendChild(opt);
          });
        }
        sel.disabled = false;
        document.getElementById('upload-btn').disabled = selectedFiles.length === 0;
        showToast(`✅ ${data.name} 연결됨`, 'success');
      } catch (e) {
        document.getElementById('auth-spinner').className = 'spinner';
        document.getElementById('status-dot').className = 'status-dot fail';
        document.getElementById('status-text').textContent = '연결 실패';
        showToast('연결 오류', 'error');
      }
    }

    function getSelectedTableName() {
      const sel = document.getElementById('category-select');
      return categoryMap[sel.value] || sel.value;
    }

    function getFileIcon(filename) {
      if (!filename) return '📄';
      const ext = filename.split('.').pop().toLowerCase();
      return { xlsx:'📊', xls:'📊', csv:'📊', docx:'📝', doc:'📝', pdf:'📕', pptx:'📊', ppt:'📊', hwp:'📝', hwpx:'📝', txt:'📄' }[ext] || '📄';
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / 1048576).toFixed(1) + ' MB';
    }

    function renderFileList() {
      const container = document.getElementById('file-list');
      const uploadBtn = document.getElementById('upload-btn');
      if (selectedFiles.length === 0) {
        container.innerHTML = '<div class="empty-state">선택된 파일이 없습니다</div>';
        uploadBtn.disabled = true;
        return;
      }
      uploadBtn.disabled = isUploading;
      container.innerHTML = selectedFiles.map((f, i) => `
        <div class="file-item ${f.status}" id="file-item-${i}">
          <span class="file-icon">${getFileIcon(f.file.name)}</span>
          <div class="file-info">
            <div class="file-name">${f.file.name}</div>
            <div class="file-size">${formatSize(f.file.size)}${f.msg ? ' · <span style="color:' + (f.status === 'done' ? 'var(--success)' : 'var(--danger)') + '">' + f.msg + '</span>' : ''}</div>
            <div class="progress-bar"><div class="progress-fill ${f.status}" style="width:${f.progress}%"></div></div>
          </div>
          <span class="file-status ${f.status}">
            ${f.status === 'pending' ? '⏳ 대기' : f.status === 'uploading' ? '🔄 업로드 중' : f.status === 'done' ? '✅ 완료' : '❌ 실패'}
          </span>
          ${f.status === 'pending' || f.status === 'error' ? `<button onclick="removeFile(${i})" style="background:none;border:none;cursor:pointer;color:var(--text-dim);font-size:0.9rem;flex-shrink:0" title="제거">✕</button>` : ''}
        </div>`).join('');
    }

    function removeFile(i) {
      if (isUploading) return;
      selectedFiles.splice(i, 1);
      renderFileList();
    }

    function onFilesSelected(files) {
      const newFiles = Array.from(files).map(f => ({ file: f, status: 'pending', progress: 0, msg: '' }));
      selectedFiles = [...selectedFiles, ...newFiles];
      renderFileList();
      document.getElementById('summary-area').style.display = 'none';
    }

    document.getElementById('file-input').addEventListener('change', e => { onFilesSelected(e.target.files); e.target.value = ''; });

    const dropZone = document.getElementById('drop-zone');
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag-over'); onFilesSelected(e.dataTransfer.files); });

    function clearFiles() {
      if (isUploading) return;
      selectedFiles = [];
      renderFileList();
      document.getElementById('summary-area').style.display = 'none';
    }

    async function uploadFile(index) {
      const f = selectedFiles[index];
      const apiKey = document.getElementById('api-key').value.trim();
      const tableName = getSelectedTableName();

      if (!apiKey || !tableName) { f.status = 'error'; f.msg = 'API 키/카테고리 없음'; return { success: false }; }

      f.status = 'uploading'; f.progress = 20;
      renderFileList();

      try {
        const filedata = await new Promise((res, rej) => {
          const reader = new FileReader();
          reader.onload = e => res(e.target.result.split(',')[1]);
          reader.onerror = rej;
          reader.readAsDataURL(f.file);
        });

        f.progress = 55; renderFileList();

        const resp = await fetch(`${N8N}/trustrag/upload`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ api_key: apiKey, category: tableName, filename: f.file.name, filedata, filesize: f.file.size, mimetype: f.file.type || 'application/octet-stream' })
        });
        const data = await resp.json();
        f.progress = 100;
        f.status = data.success ? 'done' : 'error';
        f.msg = data.success ? `${data.chunks || 1}개 청크 저장` : (data.message || '업로드 실패');
        renderFileList();
        return data;
      } catch (e) {
        f.status = 'error'; f.progress = 100; f.msg = e.message;
        renderFileList();
        return { success: false };
      }
    }

    async function uploadAll() {
      const apiKey = document.getElementById('api-key').value.trim();
      const tableName = getSelectedTableName();
      if (!apiKey) { showToast('먼저 API 키로 연결하세요', 'error'); return; }
      if (!tableName) { showToast('카테고리를 선택하세요', 'error'); return; }
      if (selectedFiles.length === 0) { showToast('파일을 선택하세요', 'error'); return; }

      isUploading = true;
      document.getElementById('up-spinner').className = 'spinner show';
      document.getElementById('upload-btn').disabled = true;
      document.getElementById('summary-area').style.display = 'none';

      const pending = selectedFiles.map((f, i) => i).filter(i => selectedFiles[i].status !== 'done');
      const results = [];
      for (const i of pending) {
        const r = await uploadFile(i);
        results.push({ file: selectedFiles[i].file.name, ...r });
      }

      isUploading = false;
      document.getElementById('up-spinner').className = 'spinner';
      document.getElementById('upload-btn').disabled = false;

      const success = results.filter(r => r.success).length;
      const fail = results.length - success;

      const summaryEl = document.getElementById('summary-area');
      summaryEl.style.display = 'block';
      const cls = fail === 0 ? 'success' : success === 0 ? 'fail' : 'partial';
      const icon = fail === 0 ? '✅' : success === 0 ? '❌' : '⚠️';
      const msg = fail === 0 ? `${success}개 파일 업로드 완료` : success === 0 ? '모든 파일 업로드 실패' : `${success}개 완료, ${fail}개 실패`;
      summaryEl.innerHTML = `<div class="upload-summary ${cls}">${icon} ${msg}</div>`;

      if (fail === 0) showToast(`✅ ${success}개 완료`, 'success');
      else if (success === 0) showToast('❌ 업로드 실패', 'error');
      else showToast(`⚠️ 일부 실패 (${fail}개)`, 'error');
    }

    document.getElementById('api-key').addEventListener('keydown', e => { if (e.key === 'Enter') validateKey(); });
  </script>
</body>
</html>
